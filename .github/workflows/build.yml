            bool _handleBack() {
              if (_isSel) {
                setState(() { _sel.clear(); _isSel = false; });
                return true;
              }
              if (_focus.hasFocus) {
                _focus.unfocus();
                return true;
              }
              if (_sc.text.isNotEmpty) {
                _sc.clear();
                return true;
              }
              return false;
            }

            @override
            Widget build(BuildContext context) => PopScope(
                  canPop: !_isSel && !_focus.hasFocus && _sc.text.isEmpty,
                  onPopInvoked: (didPop) { if (!didPop) _handleBack(); },
                  child: Scaffold(
                  appBar: AppBar(
                    leading: _isSel
                        ? Semantics(
                            label: 'close selection button',
                            button: true,
                            excludeSemantics: true,
                            child: IconButton(
                                icon: const Icon(Icons.close),
                                onPressed: () =>
                                    setState(() { _sel.clear(); _isSel = false; })))
                        : null,
                    title: _isSel
                        ? Text('${_sel.length} Selected')
                        : TextField(
                            controller: _sc,
                            focusNode: _focus,
                            decoration: InputDecoration(
                              hintText: 'Search in folder...',
                              border: InputBorder.none,
                              suffixIcon: _sc.text.isNotEmpty
                                  ? Semantics(
                                      label: 'clear search button',
                                      button: true,
                                      container: true,
                                      excludeSemantics: true,
                                      child: IconButton(
                                        icon: const Icon(Icons.clear),
                                        onPressed: () => _sc.clear(),
                                      ),
                                    )
                                  : null,
                            ),
                          ),
                    actions: _isSel
                        ? [
                            Semantics(
                              label: 'select all button',
                              button: true,
                              excludeSemantics: true,
                              child: IconButton(
                                icon: const Icon(Icons.select_all),
                                onPressed: () => setState(() =>
                                    _sel.addAll(Iterable.generate(_filtered.length))),
                              ),
                            ),
                            Semantics(
                              label: 'play selected songs button',
                              button: true,
                              excludeSemantics: true,
                              child: IconButton(
                                icon: const Icon(Icons.play_circle),
                                onPressed: () => Navigator.push(context,
                                    MaterialPageRoute(builder: (_) => PlayerScreen(
                                        songs: _sel.map((i) => _filtered[i]).toList(),
                                        initialIndex: 0))),
                              ),
                            ),
                          ]
                        : null,
                  ),
                  floatingActionButtonLocation:
                      FloatingActionButtonLocation.startFloat,
                  floatingActionButton: Semantics(
                    label: 'play last button',
                    button: true,
                    excludeSemantics: true,
                    child: FloatingActionButton.extended(
                      backgroundColor: const Color(0xFF00D4FF),
                      foregroundColor: const Color(0xFF0A0E1A),
                      icon: const Icon(Icons.history),
                      label: const Text('Play Last',
                          style: TextStyle(fontWeight: FontWeight.w700)),
                      onPressed: () async {
                        final folderName = widget.folder.name;
                        final last = await LastPlayedService.load(folder: folderName);
                        if (last == null) {
                          if (context.mounted)
                            ScaffoldMessenger.of(context).showSnackBar(
                                const SnackBar(content: Text('No last played in this folder.')));
                          return;
                        }
                        final path  = last['path'] as String;
                        final ms    = last['ms']   as int;
                        final title = last['title'] as String? ?? path.split('/').last;
                        if (!context.mounted) return;
                        if (isVideo(path)) {
                          Navigator.push(context, MaterialPageRoute(
                              builder: (_) => VideoPlayerScreen(
                                  path: path, title: title, seekMs: ms)));
                        } else {
                          final song = widget.folder.songs.firstWhere(
                            (s) => s.data == path,
                            orElse: () => widget.folder.songs.first,
                          );
                          final idx = widget.folder.songs.indexOf(song);
                          Navigator.push(context, MaterialPageRoute(
                              builder: (_) => PlayerScreen(
                                  songs: widget.folder.songs,
                                  initialIndex: idx,
                                  seekOnStartMs: ms)));
                        }
                      },
                    ),
                  ),
                  body: ListView.builder(
                    itemCount: _filtered.length + _filteredVideos.length,
                    itemBuilder: (_, i) {
                      // Audio items first, then video items
                      if (i < _filtered.length) {
                        final isS = _sel.contains(i);
                        final song = _filtered[i];
                        final total = _filtered.length + _filteredVideos.length;
                        return ValueListenableBuilder<bool>(
                          valueListenable: showPositionNotifier,
                          builder: (ctx, showPos, _) => AnimatedContainer(
                            duration: const Duration(milliseconds: 200),
                            decoration: BoxDecoration(
                              color: isS
                                  ? const Color(0xFF00D4FF).withOpacity(0.08)
                                  : Colors.transparent,
                              border: isS
                                  ? const Border(left: BorderSide(
                                      color: Color(0xFF00D4FF), width: 3))
                                  : null,
                            ),
                            child: ListTile(
                              leading: Icon(
                                isS ? Icons.check_circle : Icons.music_note,
                                color: i % 2 == 0
                                    ? const Color(0xFF00D4FF)
                                    : const Color(0xFF00D4FF).withOpacity(0.4)),
                            title: Text(
                                fmtMs(song.duration) + '  ' +
                                (showPos
                                  ? song.title + '  ' + (i + 1).toString() + ' of ' + total.toString()
                                  : song.title),
                                maxLines: 1),
                            trailing: _isSel ? null : Semantics(
                              label: 'more button',
                              button: true,
                              container: true,
                              excludeSemantics: true,
                              child: IconButton(
                                icon: const Icon(Icons.more_vert, color: Colors.grey),
                                onPressed: () => _showSongOptions(context, song),
                              ),
                            ),
                            onLongPress: () =>
                                setState(() { _sel.add(i); _isSel = true; }),
                            onTap: () {
                              if (_isSel) {
                                setState(() {
                                  if (isS) _sel.remove(i); else _sel.add(i);
                                  _isSel = _sel.isNotEmpty;
                                });
                              } else {
                                Navigator.push(context, MaterialPageRoute(
                                    builder: (_) => PlayerScreen(
                                        songs: _filtered, initialIndex: i)));
                              }
                            },
                          ),
                          ),
                        );
                      } else {
                        // Video item
                        final vi = i - _filtered.length;
                        final path = _filteredVideos[vi];
                        final name = path.split('/').last;
                        final total = _filtered.length + _filteredVideos.length;
                        final vDur = _videoDurations[path];
                        return ValueListenableBuilder<bool>(
                          valueListenable: showPositionNotifier,
                          builder: (ctx, showPos, _) => ListTile(
                            leading: Icon(Icons.videocam,
                                color: i % 2 == 0 ? const Color(0xFF00D4FF) : Colors.grey),
                            title: Text(
                                fmtMs(vDur) + '  ' +
                                (showPos
                                  ? name + '  ' + (i + 1).toString() + ' of ' + total.toString()
                                  : name),
                                maxLines: 1),
                            trailing: Semantics(
                              label: 'more button',
                              button: true,
                              container: true,
                              excludeSemantics: true,
                              child: IconButton(
                                icon: const Icon(Icons.more_vert, color: Colors.grey),
                                onPressed: () => _showVideoOptions(context, path, name),
                              ),
                            ),
                            onTap: () => Navigator.push(context, MaterialPageRoute(
                                builder: (_) => VideoPlayerScreen(
                                    path: path, title: name, seekMs: 0))),
                          ),
                        );
                      }
                    },
                  ),
                ));
          }

          // ─────────────────────────────────────────────────────────────────────
          //  Video Player Screen
          // ─────────────────────────────────────────────────────────────────────
          class VideoPlayerScreen extends StatefulWidget {
            final String path;
            final String title;
            final int seekMs;
            const VideoPlayerScreen({super.key, required this.path, required this.title, this.seekMs = 0});
            @override
            State<VideoPlayerScreen> createState() => _VideoPlayerScreenState();
          }

          class _VideoPlayerScreenState extends State<VideoPlayerScreen> {
            late VideoPlayerController _ctrl;
            bool _initialized = false;
            bool _showControls = true;
            bool _isFullscreen = false;
            double _brightness = 0.5;
            double _volume = 1.0;
            double _speed = 1.0;
            Timer? _hideTimer;

            @override
            void initState() {
              super.initState();
              _ctrl = VideoPlayerController.file(File(widget.path))
                ..initialize().then((_) {
                  setState(() => _initialized = true);
                  if (widget.seekMs > 0) {
                    _ctrl.seekTo(Duration(milliseconds: widget.seekMs));
                  }
                  _ctrl.play();
                });
              _ctrl.addListener(() { if (mounted) setState(() {}); });
            }

            @override
            void dispose() {
              _hideTimer?.cancel();
              // Save last played position for video
              final posMs = _ctrl.value.position.inMilliseconds;
              if (posMs > 0) {
                final folder = File(widget.path).parent.path.split('/').last;
                _ch.invokeMethod('setLastPlayed', {
                  'path':   widget.path,
                  'ms':     posMs,
                  'title':  widget.title,
                  'folder': folder,
                }).catchError((_) {});
              }
              _ctrl.dispose();
              super.dispose();
            }

            void _hideControls() {
              _hideTimer?.cancel();
              setState(() => _showControls = false);
              // If fullscreen, re-apply immersive mode to prevent orientation reset
              if (_isFullscreen) {
                SystemChrome.setEnabledSystemUIMode(SystemUiMode.immersiveSticky);
              }
            }

            void _showControlsAgain() {
              setState(() => _showControls = true);
              // If fullscreen, maintain landscape orientation
              if (_isFullscreen) {
                SystemChrome.setEnabledSystemUIMode(SystemUiMode.immersiveSticky);
              }
            }

            void _toggleFullscreen() {
              setState(() {
                _isFullscreen = !_isFullscreen;
                // Keep controls visible when toggling fullscreen
              });
              if (_isFullscreen) {
                SystemChrome.setEnabledSystemUIMode(SystemUiMode.immersiveSticky);
                SystemChrome.setPreferredOrientations([
                  DeviceOrientation.landscapeLeft,
                  DeviceOrientation.landscapeRight,
                ]);
              } else {
                SystemChrome.setEnabledSystemUIMode(SystemUiMode.edgeToEdge);
                SystemChrome.setPreferredOrientations([DeviceOrientation.portraitUp]);
              }
            }

            void _seek(int seconds) {
              final pos = _ctrl.value.position + Duration(seconds: seconds);
              _ctrl.seekTo(pos.isNegative ? Duration.zero : pos);
            }

