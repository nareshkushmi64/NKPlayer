name: NKPlayer - Bug Fix & Android 16 Support
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'

      - name: Generate and Fix Project Structure
        run: |
          # 1. Force V2 Embedding structure
          rm -rf android/
          flutter create --org com.nareshkushmi --project-name nkplayer .
          
          # 2. Update pubspec.yaml (Version 1.0.9+17)
          cat <<EOF > pubspec.yaml
          name: nkplayer
          description: NKPlayer Pro - Ultimate Compatibility.
          version: 1.0.9+17
          publish_to: 'none'
          environment:
            sdk: '>=3.3.0 <4.0.0'
          dependencies:
            flutter:
              sdk: flutter
            just_audio: ^0.9.38
            audio_service: ^0.18.15
            on_audio_query: ^2.9.0
            permission_handler: ^11.3.0
            speech_to_text: ^6.6.2
            rxdart: ^0.27.7
          flutter:
            uses-material-design: true
          EOF

          # 3. Update Android Manifest (With V2 Tag & Legacy Storage)
          cat <<EOF > android/app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET"/>
              <uses-permission android:name="android.permission.RECORD_AUDIO" />
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE_MEDIA_PLAYBACK" />
              <uses-permission android:name="android.permission.READ_MEDIA_AUDIO" />
              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" android:maxSdkVersion="32" />
              <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" android:maxSdkVersion="29" />

              <queries>
                  <intent-filter>
                      <action android:name="android.speech.RecognitionService" />
                  </intent-filter>
              </queries>

              <application
                  android:label="NKPlayer"
                  android:name="\${applicationName}"
                  android:icon="@mipmap/ic_launcher"
                  android:requestLegacyExternalStorage="true"
                  android:usesCleartextTraffic="true">
                  <activity
                      android:name="com.nareshkushmi.nkplayer.MainActivity"
                      android:exported="true"
                      android:launchMode="singleTop"
                      android:theme="@style/LaunchTheme"
                      android:configChanges="orientation|keyboardHidden|keyboard|screenSize|smallestScreenSize|locale|layoutDirection|fontScale|screenLayout|density|uiMode"
                      android:hardwareAccelerated="true"
                      android:windowSoftInputMode="adjustResize">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
                  <service android:name="com.ryanheise.audioservice.AudioService"
                      android:foregroundServiceType="mediaPlayback"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MEDIA_BUTTON" />
                      </intent-filter>
                  </service>
                  <meta-data android:name="flutterEmbedding" android:value="2" />
              </application>
          </manifest>
          EOF

          # 4. Set Target SDK 35 (Android 16 Ready)
          python3 -c "
          import os
          path = 'android/app/build.gradle'
          with open(path, 'r') as f: content = f.read()
          content = content.replace('compileSdkVersion flutter.compileSdkVersion', 'compileSdkVersion 35')
          content = content.replace('targetSdkVersion flutter.targetSdkVersion', 'targetSdkVersion 35')
          with open(path, 'w') as f: f.write(content)
          "

          # 5. Fix MainActivity.kt
          mkdir -p android/app/src/main/kotlin/com/nareshkushmi/nkplayer
          cat <<EOF > android/app/src/main/kotlin/com/nareshkushmi/nkplayer/MainActivity.kt
          package com.nareshkushmi.nkplayer
          import io.flutter.embedding.android.FlutterActivity
          class MainActivity: FlutterActivity() {}
          EOF

          # 6. Corrected main.dart (Fixed just_audio & audio_service syntax)
          cat <<'EOF' > lib/main.dart
          import 'dart:async';
          import 'dart:io';
          import 'package:flutter/material.dart';
          import 'package:just_audio/just_audio.dart';
          import 'package:audio_service/audio_service.dart';
          import 'package:on_audio_query/on_audio_query.dart';
          import 'package:permission_handler/permission_handler.dart';
          import 'package:speech_to_text/speech_to_text.dart';

          late AudioHandler _handler;
          final _query = OnAudioQuery();

          Future<void> main() async {
            WidgetsFlutterBinding.ensureInitialized();
            _handler = await AudioService.init(
              builder: () => MyAudioHandler(),
              config: const AudioServiceConfig(
                androidNotificationChannelId: 'com.nareshkushmi.nkplayer.audio',
                androidNotificationChannelName: 'NKPlayer Music',
                androidNotificationOngoing: true,
              ),
            );
            runApp(const MaterialApp(home: PermissionGate(), debugShowCheckedModeBanner: false));
          }

          class MyAudioHandler extends BaseAudioHandler with QueueHandler, SeekHandler {
            final _player = AudioPlayer();
            MyAudioHandler() {
              // Fixed: playerStateStream is the correct getter
              _player.playerStateStream.map(_transformEvent).pipe(playbackState);
              _player.currentIndexStream.listen((i) {
                if (i != null && queue.value.isNotEmpty) mediaItem.add(queue.value[i]);
              });
            }
            PlaybackState _transformEvent(PlayerState event) => PlaybackState(
              controls: [MediaControl.skipToPrevious, if (_player.playing) MediaControl.pause else MediaControl.play, MediaControl.skipToNext],
              systemActions: const {MediaAction.seek},
              // Fixed: androidCompactActionIndices is the correct parameter name
              androidCompactActionIndices: const [0, 1, 2],
              processingState: const {
                ProcessingState.idle: AudioProcessingState.idle,
                ProcessingState.loading: AudioProcessingState.loading,
                ProcessingState.buffering: AudioProcessingState.buffering,
                ProcessingState.ready: AudioProcessingState.ready,
                ProcessingState.completed: AudioProcessingState.completed,
              }[_player.processingState]!,
              playing: _player.playing,
              updatePosition: _player.position,
              bufferedPosition: _player.bufferedPosition,
            );
            @override Future<void> play() => _player.play();
            @override Future<void> pause() => _player.pause();
            @override Future<void> skipToNext() => _player.seekToNext();
            @override Future<void> skipToPrevious() => _player.seekToPrevious();
            @override Future<void> seek(Duration p) => _player.seek(p);

            Future<void> load(List<MediaItem> items, int index) async {
              final sources = items.map((i) => AudioSource.file(i.extras!['path'])).toList();
              queue.add(items);
              await _player.setAudioSource(ConcatenatingAudioSource(children: sources), initialIndex: index);
              _player.play();
            }
          }

          class PermissionGate extends StatefulWidget {
            const PermissionGate({super.key});
            @override State<PermissionGate> createState() => _PermissionGateState();
          }

          class _PermissionGateState extends State<PermissionGate> {
            @override void initState() { super.initState(); _check(); }
            _check() async {
              if (Platform.isAndroid) {
                await [Permission.storage, Permission.microphone, Permission.audio].request();
              }
              if (mounted) Navigator.pushReplacement(context, MaterialPageRoute(builder: (_) => const Folders()));
            }
            @override Widget build(BuildContext context) => const Scaffold(body: Center(child: CircularProgressIndicator()));
          }

          class Folders extends StatelessWidget {
            const Folders({super.key});
            @override Widget build(BuildContext context) {
              return Scaffold(
                appBar: AppBar(title: const Text("NKPlayer"), actions: [IconButton(icon: const Icon(Icons.search), onPressed: () => showSearch(context: context, delegate: MusicSearch()))]),
                body: FutureBuilder<List<AlbumModel>>(
                  future: _query.queryAlbums(),
                  builder: (context, snap) {
                    if (!snap.hasData) return const Center(child: CircularProgressIndicator());
                    return ListView.builder(
                      itemCount: snap.data!.length,
                      itemBuilder: (context, i) => ListTile(
                        leading: const Icon(Icons.folder, color: Colors.blueAccent),
                        title: Text(snap.data![i].album),
                        onTap: () => Navigator.push(context, MaterialPageRoute(builder: (_) => SongsPage(album: snap.data![i]))),
                      ),
                    );
                  },
                ),
              );
            }
          }

          class SongsPage extends StatefulWidget {
            final AlbumModel album;
            const SongsPage({super.key, required this.album});
            @override State<SongsPage> createState() => _SongsPageState();
          }

          class _SongsPageState extends State<SongsPage> {
            final Set<int> _selected = {};
            bool _isMulti = false;

            @override Widget build(BuildContext context) {
              return FutureBuilder<List<SongModel>>(
                future: _query.queryAudiosFrom(AudiosFromType.ALBUM_ID, widget.album.id),
                builder: (context, snap) {
                  if (!snap.hasData) return const Scaffold(body: Center(child: CircularProgressIndicator()));
                  final songs = snap.data!;
                  return Scaffold(
                    appBar: AppBar(
                      leading: _isMulti ? IconButton(icon: const Icon(Icons.close), onPressed: () => setState(() { _isMulti = false; _selected.clear(); })) : null,
                      title: Text(_isMulti ? "${_selected.length} Selected" : widget.album.album),
                      actions: [
                        if (_isMulti) IconButton(icon: const Icon(Icons.delete), onPressed: () => _delete(context, songs))
                        else IconButton(icon: const Icon(Icons.search), onPressed: () => showSearch(context: context, delegate: MusicSearch(folderSongs: songs))),
                      ],
                    ),
                    body: ListView.builder(
                      itemCount: songs.length,
                      itemBuilder: (context, i) => ListTile(
                        selected: _selected.contains(i),
                        leading: Icon(_isMulti ? (_selected.contains(i) ? Icons.check_circle : Icons.radio_button_unchecked) : Icons.music_note),
                        title: Text(songs[i].title),
                        onLongPress: () => setState(() { _isMulti = true; _selected.add(i); }),
                        onTap: () {
                          if (_isMulti) setState(() => _selected.contains(i) ? _selected.remove(i) : _selected.add(i));
                          else Navigator.push(context, MaterialPageRoute(builder: (_) => Player(songs: songs, index: i)));
                        },
                      ),
                    ),
                  );
                },
              );
            }

            void _delete(BuildContext context, List<SongModel> list) {
              showDialog(context: context, builder: (ctx) => AlertDialog(
                title: const Text("Delete Permanently?"),
                content: Text("${_selected.length == 1 ? 'This media' : 'All media'} will be deleted permanently."),
                actions: [
                  TextButton(onPressed: () => Navigator.pop(ctx), child: const Text("Cancel")),
                  TextButton(onPressed: () {
                    for (var i in _selected) { try { File(list[i].data).deleteSync(); } catch (_) {} }
                    Navigator.pop(ctx);
                    setState(() { _isMulti = false; _selected.clear(); });
                  }, child: const Text("OK", style: TextStyle(color: Colors.red))),
                ],
              ));
            }
          }

          class MusicSearch extends SearchDelegate {
            final List<SongModel>? folderSongs;
            final SpeechToText _speech = SpeechToText();
            MusicSearch({this.folderSongs});

            @override List<Widget> buildActions(BuildContext context) => [
              IconButton(icon: const Icon(Icons.mic), onPressed: () async {
                if (await _speech.initialize()) {
                  _speech.listen(onResult: (val) { query = val.recognizedWords; if (val.finalResult) _speech.stop(); });
                }
              }),
              if (query.isNotEmpty) IconButton(icon: const Icon(Icons.clear), onPressed: () => query = ""),
            ];
            @override Widget buildLeading(BuildContext context) => IconButton(icon: const Icon(Icons.arrow_back), onPressed: () => close(context, null));
            @override Widget buildResults(BuildContext context) => _search();
            @override Widget buildSuggestions(BuildContext context) => _search();

            Widget _search() {
              return FutureBuilder<List<SongModel>>(
                future: folderSongs != null ? Future.value(folderSongs) : _query.querySongs(),
                builder: (context, snap) {
                  if (!snap.hasData) return const SizedBox.shrink();
                  final res = snap.data!.where((s) => s.title.toLowerCase().contains(query.toLowerCase())).toList();
                  return ListView.builder(itemCount: res.length, itemBuilder: (c, i) => ListTile(title: Text(res[i].title), onTap: () => Navigator.push(c, MaterialPageRoute(builder: (_) => Player(songs: res, index: i)))));
                },
              );
            }
          }

          class Player extends StatelessWidget {
            final List<SongModel> songs;
            final int index;
            const Player({super.key, required this.songs, required this.index});
            @override Widget build(BuildContext context) {
              final items = songs.map((s) => MediaItem(id: s.id.toString(), title: s.title, artist: s.artist, extras: {'path': s.data})).toList();
              (_handler as MyAudioHandler).load(items, index);
              return Scaffold(
                appBar: AppBar(title: const Text("Now Playing")),
                body: StreamBuilder<MediaItem?>(
                  stream: _handler.mediaItem,
                  builder: (context, snap) {
                    final item = snap.data;
                    if (item == null) return const Center(child: CircularProgressIndicator());
                    return Column(
                      mainAxisAlignment: MainAxisAlignment.center,
                      children: [
                        const Icon(Icons.music_note, size: 100, color: Colors.blueAccent),
                        Padding(padding: const EdgeInsets.all(20), child: Text(item.title, style: const TextStyle(fontSize: 18, fontWeight: FontWeight.bold), textAlign: TextAlign.center)),
                        const PlayerControlButtons(),
                      ],
                    );
                  },
                ),
              );
            }
          }

          class PlayerControlButtons extends StatelessWidget {
            const PlayerControlButtons({super.key});
            @override Widget build(BuildContext context) {
              return StreamBuilder<PlaybackState>(
                stream: _handler.playbackState,
                builder: (context, snap) {
                  final playing = snap.data?.playing ?? false;
                  return Row(
                    mainAxisAlignment: MainAxisAlignment.spaceEvenly,
                    children: [
                      IconButton(icon: const Icon(Icons.skip_previous, size: 50), onPressed: _handler.skipToPrevious),
                      IconButton(icon: Icon(playing ? Icons.pause_circle : Icons.play_circle, size: 70), onPressed: playing ? _handler.pause : _handler.play),
                      IconButton(icon: const Icon(Icons.skip_next, size: 50), onPressed: _handler.skipToNext),
                    ],
                  );
                },
              );
            }
          }
          EOF

      - name: Build APK
        run: |
          flutter pub get
          flutter build apk --release

      - name: Upload NKPlayer APK
        uses: actions/upload-artifact@v4
        with:
          name: NKPlayer-v1.0.9-Pro-Final
          path: build/app/outputs/flutter-apk/app-release.apk
