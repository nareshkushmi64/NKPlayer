          import 'package:share_plus/share_plus.dart';
          import 'package:video_player/video_player.dart';

          const _ch = MethodChannel('com.nareshkushmi.nkplayer/music');

          bool isVideo(String path) {
            final ext = path.toLowerCase().split('.').last;
            const exts = {'mp4','mkv','avi','mov','wmv','flv','webm','3gp','m4v','ts','mts','m2ts','vob','rmvb','rm','asf','divx','f4v','ogv','mxf','m2v','mpg','mpeg','mp2','m1v','m4b','3g2','3gpp','3gpp2','amv','nsv','nuv','qt'};
            return exts.contains(ext);
          }

          // Format milliseconds → "mm:ss"
          String fmtMs(int? ms) {
            if (ms == null || ms <= 0) return '--:--';
            final d = Duration(milliseconds: ms);
            final m = d.inMinutes.remainder(60).toString().padLeft(2, '0');
            final s = d.inSeconds.remainder(60).toString().padLeft(2, '0');
            return '$m:$s';
          }

          Future<void> startMusic(List<SongModel> songs, int index) async {
            try {
              await _ch.invokeMethod('start', {
                'paths':   songs.map((s) => s.data).toList(),
                'titles':  songs.map((s) => s.title).toList(),
                'artists': songs.map((s) => s.artist ?? 'Unknown').toList(),
                'index':   index,
              });
            } catch (e) { debugPrint('startMusic: $e'); }
          }

          Future<void> stopMusic() async {
            try { await _ch.invokeMethod('stop'); } catch (_) {}
          }

          Future<void> togglePlayPause() async {
            try { await _ch.invokeMethod('togglePlayPause'); } catch (_) {}
          }

          Future<void> setPlaybackSpeed(double speed) async {
            try { await _ch.invokeMethod('setSpeed', {'speed': speed}); } catch (_) {}
          }

          // Global setting: show item position (1 of 25)
          final showPositionNotifier = ValueNotifier<bool>(false);

          // Global EQ state (persisted in Kotlin SharedPreferences)
          class EqService {
            static Future<Map<String, dynamic>?> getInfo() async {
              try {
                final r = await _ch.invokeMethod<Map>('getEqInfo');
                if (r == null) return null;
                return {
                  'bands':    r['bands']    as int,
                  'minLevel': r['minLevel'] as int,
                  'maxLevel': r['maxLevel'] as int,
                  'freqs':    List<int>.from(r['freqs']  as List),
                  'levels':   List<int>.from(r['levels'] as List),
                };
              } catch (_) { return null; }
            }
            static Future<void> setBand(int band, int level) async {
              try { await _ch.invokeMethod('setEqBand', {'band': band, 'level': level}); }
              catch (_) {}
            }
          }

          // ── Last Played Service (Kotlin saves, Dart reads via MethodChannel) ─
          class LastPlayedService {
            static Future<Map<String, dynamic>?> load({String? folder}) async {
              try {
                final result = await _ch.invokeMethod<Map>('getLastPlayed');
                if (result == null) return null;
                final path  = result['path']   as String?;
                final ms    = result['ms']      as int?;
                final saved = result['folder']  as String?;
                if (path == null || ms == null) return null;
                if (folder != null && saved != folder) return null;
                return {
                  'path':   path,
                  'ms':     ms,
                  'title':  result['title'] ?? '',
                  'folder': saved ?? '',
                };
              } catch (_) { return null; }
            }
          }

