name: NKPlayer - Welcome Dialogue and Accessibility
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'

      - name: Generate NKPlayer Project
        run: |
          flutter create --org com.nareshkushmi --project-name nkplayer .
          
          # App name set to NKPlayer
          sed -i 's/android:label="nkplayer"/android:label="NKPlayer"/' android/app/src/main/AndroidManifest.xml

          cat <<EOF > pubspec.yaml
          name: nkplayer
          description: NKPlayer with Welcome Dialogue.
          version: 1.0.0+1
          publish_to: 'none'
          environment:
            sdk: '>=3.0.0 <4.0.0'
          dependencies:
            flutter:
              sdk: flutter
            audioplayers: ^5.2.1
            on_audio_query: ^2.9.0
            permission_handler: ^11.3.0
            google_fonts: ^6.1.0
            shared_preferences: ^2.2.2
          flutter:
            uses-material-design: true
          EOF

          # Permissions logic
          python3 -c "
          import os
          path = 'android/app/src/main/AndroidManifest.xml'
          with open(path, 'r') as f:
              content = f.read()
          perms = '    <uses-permission android:name=\"android.permission.READ_EXTERNAL_STORAGE\" />\n    <uses-permission android:name=\"android.permission.READ_MEDIA_AUDIO\" />\n'
          new_content = content.replace('<application', perms + '    <application')
          with open(path, 'w') as f:
              f.write(new_content)
          "

          cat <<'EOF' > lib/main.dart
          import 'dart:io';
          import 'package:flutter/material.dart';
          import 'package:on_audio_query/on_audio_query.dart';
          import 'package:audioplayers/audioplayers.dart';
          import 'package:permission_handler/permission_handler.dart';
          import 'package:google_fonts/google_fonts.dart';
          import 'package:shared_preferences/shared_preferences.dart';

          void main() => runApp(MaterialApp(
                title: 'NKPlayer',
                debugShowCheckedModeBanner: false,
                theme: ThemeData.dark().copyWith(
                  primaryColor: Colors.blueAccent,
                  scaffoldBackgroundColor: const Color(0xFF0F0F0F),
                ),
                home: const MainEntryScreen(),
              ));

          // Step 1: Handle Logic to show Dialogue only once
          class MainEntryScreen extends StatefulWidget {
            const MainEntryScreen({super.key});
            @override
            State<MainEntryScreen> createState() => _MainEntryScreenState();
          }

          class _MainEntryScreenState extends State<MainEntryScreen> {
            @override
            void initState() {
              super.initState();
              WidgetsBinding.instance.addPostFrameCallback((_) => _checkFirstTime());
            }

            Future<void> _checkFirstTime() async {
              SharedPreferences prefs = await SharedPreferences.getInstance();
              bool isFirstTime = prefs.getBool('first_time') ?? true;

              if (isFirstTime) {
                _showWelcomeDialog(prefs);
              } else {
                _checkPermissions();
              }
            }

            void _showWelcomeDialog(SharedPreferences prefs) {
              showDialog(
                context: context,
                barrierDismissible: false,
                builder: (context) => AlertDialog(
                  title: const Text("Welcome to NKPlayer", textAlign: TextAlign.center),
                  content: SingleChildScrollView(
                    child: Column(
                      crossAxisAlignment: CrossAxisAlignment.start,
                      children: [
                        const Text("An accessible media player app developed by the Hamro Prayash team.\n"),
                        const Text("This app has been built with a special focus on visually impaired users, ensuring that there is no compromise on accessibility.\n"),
                        const Text("Developed by:", style: TextStyle(fontWeight: FontWeight.bold)),
                        const Text(" • Naresh Kushmi\n"),
                        const Text("Huge thanks to:", style: TextStyle(fontWeight: FontWeight.bold)),
                        const Text(" • Sushil Chaudhary\n • Ashutosh Chaudhary\n • Bijay Thapa Magar\n"),
                        const Text("Special thanks to:", style: TextStyle(fontWeight: FontWeight.bold)),
                        const Text(" • All Hamro Prayash members.\n"),
                        const Text("As this is the first public release of the app, there may be some bugs. We kindly ask you to share any issues or feedback you find within our various groups. We are committed to improving the app and adding new features in future updates.\n"),
                        const Text("Hamro Prayash: Always one step ahead.", style: TextStyle(fontStyle: FontStyle.italic)),
                      ],
                    ),
                  ),
                  actions: [
                    Semantics(
                      label: "Next button, proceed to file access",
                      button: true,
                      child: TextButton(
                        onPressed: () async {
                          await prefs.setBool('first_time', false);
                          if (mounted) {
                            Navigator.pop(context);
                            _checkPermissions();
                          }
                        },
                        child: const Text("Next", style: TextStyle(fontSize: 18, color: Colors.blueAccent)),
                      ),
                    ),
                  ],
                ),
              );
            }

            Future<void> _checkPermissions() async {
              if (await Permission.audio.request().isGranted || await Permission.storage.request().isGranted) {
                if (mounted) Navigator.of(context).pushReplacement(MaterialPageRoute(builder: (_) => const FolderListScreen()));
              }
            }

            @override
            Widget build(BuildContext context) {
              return const Scaffold(body: Center(child: CircularProgressIndicator()));
            }
          }

          // Step 2: Custom Folder Logic (unchanged but cleaned)
          class CustomFolder {
            final String name;
            final String path;
            final List<SongModel> songs;
            CustomFolder({required this.name, required this.path, required this.songs});
          }

          class FolderListScreen extends StatefulWidget {
            const FolderListScreen({super.key});
            @override
            State<FolderListScreen> createState() => _FolderListScreenState();
          }

          class _FolderListScreenState extends State<FolderListScreen> {
            final OnAudioQuery _audioQuery = OnAudioQuery();

            Future<List<CustomFolder>> _getFolders() async {
              List<SongModel> allSongs = await _audioQuery.querySongs();
              Map<String, List<SongModel>> parentPaths = {};
              for (var song in allSongs) {
                if (song.data == null) continue;
                final parentPath = File(song.data).parent.path;
                if (!parentPaths.containsKey(parentPath)) parentPaths[parentPath] = [];
                parentPaths[parentPath]!.add(song);
              }
              List<CustomFolder> folders = [];
              parentPaths.forEach((path, songs) {
                final folderName = path.split(Platform.pathSeparator).last;
                folders.add(CustomFolder(name: folderName, path: path, songs: songs));
              });
              folders.sort((a, b) => a.name.toLowerCase().compareTo(b.name.toLowerCase()));
              return folders;
            }

            @override
            Widget build(BuildContext context) {
              return Scaffold(
                appBar: AppBar(title: Text("Folders", style: GoogleFonts.poppins(fontWeight: FontWeight.bold))),
                body: FutureBuilder<List<CustomFolder>>(
                  future: _getFolders(),
                  builder: (context, item) {
                    if (item.data == null) return const Center(child: CircularProgressIndicator());
                    return ListView.builder(
                      itemCount: item.data!.length,
                      itemBuilder: (context, index) {
                        final folder = item.data![index];
                        return ListTile(
                          leading: const Icon(Icons.folder_rounded, color: Colors.amber, size: 30),
                          title: Text(folder.name),
                          subtitle: Text("${folder.songs.length} media files"),
                          onTap: () {
                            folder.songs.sort((a, b) => a.title.toLowerCase().compareTo(b.title.toLowerCase()));
                            Navigator.push(context, MaterialPageRoute(builder: (_) => SongListScreen(folder: folder)));
                          },
                        );
                      },
                    );
                  },
                ),
              );
            }
          }

          class SongListScreen extends StatelessWidget {
            final CustomFolder folder;
            const SongListScreen({super.key, required this.folder});
            @override
            Widget build(BuildContext context) {
              return Scaffold(
                appBar: AppBar(title: Text(folder.name)),
                body: ListView.builder(
                  itemCount: folder.songs.length,
                  itemBuilder: (context, index) {
                    final song = folder.songs[index];
                    return ListTile(
                      leading: const Icon(Icons.music_note_rounded, color: Colors.blueAccent),
                      title: Text(song.title, maxLines: 1),
                      onTap: () => Navigator.push(context, MaterialPageRoute(builder: (_) => PlayerScreen(songs: folder.songs, initialIndex: index))),
                    );
                  },
                ),
              );
            }
          }

          class PlayerScreen extends StatefulWidget {
            final List<SongModel> songs;
            final int initialIndex;
            const PlayerScreen({super.key, required this.songs, required this.initialIndex});
            @override
            State<PlayerScreen> createState() => _PlayerScreenState();
          }

          class _PlayerScreenState extends State<PlayerScreen> {
            final AudioPlayer _player = AudioPlayer();
            late int _currentIndex;
            bool _isPlaying = false;
            Duration _position = Duration.zero;
            Duration _duration = Duration.zero;

            @override
            void initState() {
              super.initState();
              _currentIndex = widget.initialIndex;
              _playSong();
              _player.onPositionChanged.listen((p) => setState(() => _position = p));
              _player.onDurationChanged.listen((d) => setState(() => _duration = d));
              _player.onPlayerComplete.listen((_) => _next());
            }

            void _playSong() async {
              await _player.stop();
              await _player.play(DeviceFileSource(widget.songs[_currentIndex].data));
              setState(() => _isPlaying = true);
            }

            void _next() { if (_currentIndex < widget.songs.length - 1) { _currentIndex++; _playSong(); } }
            void _prev() { if (_currentIndex > 0) { _currentIndex--; _playSong(); } }

            @override
            void dispose() { _player.dispose(); super.dispose(); }

            @override
            Widget build(BuildContext context) {
              final song = widget.songs[_currentIndex];
              return Scaffold(
                appBar: AppBar(title: const Text("Now Playing")),
                body: Padding(
                  padding: const EdgeInsets.all(25),
                  child: Column(
                    mainAxisAlignment: MainAxisAlignment.center,
                    children: [
                      const Icon(Icons.music_note_rounded, size: 100, color: Colors.blueAccent),
                      const SizedBox(height: 20),
                      Text(song.title, textAlign: TextAlign.center, style: const TextStyle(fontSize: 20, fontWeight: FontWeight.bold)),
                      Slider(
                        value: _position.inSeconds.toDouble(),
                        max: _duration.inSeconds.toDouble() > 0 ? _duration.inSeconds.toDouble() : 1.0,
                        onChanged: (v) => _player.seek(Duration(seconds: v.toInt())),
                      ),
                      Row(
                        mainAxisAlignment: MainAxisAlignment.spaceEvenly,
                        children: [
                          Semantics(label: "Previous button", button: true, excludeSemantics: true, child: IconButton(icon: const Icon(Icons.skip_previous_rounded, size: 50), onPressed: _prev)),
                          Semantics(label: _isPlaying ? "Pause button" : "Play button", button: true, excludeSemantics: true, child: IconButton(icon: Icon(_isPlaying ? Icons.pause_circle_filled : Icons.play_circle_filled, size: 70), onPressed: () { if (_isPlaying) _player.pause(); else _player.resume(); setState(() => _isPlaying = !_isPlaying); })),
                          Semantics(label: "Next button", button: true, excludeSemantics: true, child: IconButton(icon: const Icon(Icons.skip_next_rounded, size: 50), onPressed: _next)),
                        ],
                      ),
                    ],
                  ),
                ),
              );
            }
          }
          EOF

      - name: Build APK
        run: |
          flutter pub get
          flutter build apk --release

      - name: Upload NKPlayer APK
        uses: actions/upload-artifact@v4
        with:
          name: NKPlayer-Official-v1
          path: build/app/outputs/flutter-apk/app-release.apk
