            // Custom folder browser — reads /storage/emulated/0 directly
            Future<String?> _browseFolders(BuildContext context, String title, String op) async {
              String currentPath = '/storage/emulated/0';
              String? selected;

              await showModalBottomSheet(
                context: context,
                isScrollControlled: true,
                backgroundColor: const Color(0xFF1E1E1E),
                shape: const RoundedRectangleBorder(
                  borderRadius: BorderRadius.vertical(top: Radius.circular(16)),
                ),
                builder: (ctx) => StatefulBuilder(
                  builder: (ctx, setModal) {
                    List<FileSystemEntity> dirs = [];
                    try {
                      dirs = Directory(currentPath)
                          .listSync()
                          .whereType<Directory>()
                          .where((d) {
                            final name = d.path.split('/').last;
                            return !name.startsWith('.');
                          })
                          .toList()
                          ..sort((a, b) => a.path
                              .split('/').last
                              .compareTo(b.path.split('/').last));
                    } catch (_) {}

                    final parts = currentPath
                        .replaceFirst('/storage/emulated/0', 'Storage')
                        .split('/');

                    return SizedBox(
                      height: MediaQuery.of(context).size.height * 0.75,
                      child: Column(
                        children: [
                          // Header
                          Padding(
                            padding: const EdgeInsets.fromLTRB(16, 16, 16, 0),
                            child: Row(children: [
                              Expanded(
                                child: Text(title,
                                    style: const TextStyle(
                                        fontSize: 16,
                                        fontWeight: FontWeight.bold)),
                              ),
                              TextButton(
                                onPressed: () {
                                  selected = currentPath;
                                  Navigator.pop(ctx);
                                },
                                child: Text(op == 'copy' ? 'Copy here' : 'Move here',
                                    style: const TextStyle(color: Colors.blueAccent)),
                              ),
                            ]),
                          ),
                          // Breadcrumb
                          SingleChildScrollView(
                            scrollDirection: Axis.horizontal,
                            padding: const EdgeInsets.symmetric(
                                horizontal: 16, vertical: 4),
                            child: Row(
                              children: parts.asMap().entries.map((e) {
                                final idx = e.key;
                                final part = e.value;
                                final isLast = idx == parts.length - 1;
                                return GestureDetector(
                                  onTap: isLast ? null : () {
                                    // Navigate to that breadcrumb level
                                    final newParts = parts.sublist(0, idx + 1);
                                    String newPath = newParts.join('/');
                                    if (newPath == 'Storage') {
                                      newPath = '/storage/emulated/0';
                                    } else {
                                      newPath = newPath.replaceFirst(
                                          'Storage', '/storage/emulated/0');
                                    }
                                    setModal(() => currentPath = newPath);
                                  },
                                  child: Row(children: [
                                    Text(part,
                                        style: TextStyle(
                                            color: isLast
                                                ? Colors.white
                                                : Colors.blueAccent,
                                            fontSize: 13)),
                                    if (!isLast)
                                      const Icon(Icons.chevron_right,
                                          size: 16, color: Colors.grey),
                                  ]),
                                );
                              }).toList(),
                            ),
                          ),
                          const Divider(height: 1),
                          // Folder list
                          Expanded(
                            child: dirs.isEmpty
                                ? const Center(
                                    child: Text('No subfolders',
                                        style: TextStyle(color: Colors.grey)))
                                : ListView.builder(
                                    itemCount: dirs.length,
                                    itemBuilder: (_, i) {
                                      final name =
                                          dirs[i].path.split('/').last;
                                      return ListTile(
                                        leading: const Icon(Icons.folder,
                                            color: Colors.amber),
                                        title: Text(name),
                                        trailing: const Icon(
                                            Icons.chevron_right,
                                            color: Colors.grey),
                                        onTap: () => setModal(
                                            () => currentPath = dirs[i].path),
                                      );
                                    },
                                  ),
                          ),
                        ],
                      ),
                    );
                  },
                ),
              );
              return selected;
            }

            Future<void> _pickFolderAndOperate(
                BuildContext context, SongModel song, String op) async {
              final destDir = await _browseFolders(
                context,
                op == 'copy' ? 'Copy to folder' : 'Move to folder',
                op,
              );
              if (destDir == null || !context.mounted) return;
              try {
                final srcFile  = File(song.data);
                final fileName = srcFile.uri.pathSegments.last;
                final destFile = File(destDir + '/' + fileName);
                if (op == 'copy') {
                  await srcFile.copy(destFile.path);
                  // Scan new file so media library picks it up with metadata
                  try { await _ch.invokeMethod('scanFile', {'path': destFile.path}); } catch (_) {}
                  if (context.mounted)
                    ScaffoldMessenger.of(context).showSnackBar(
                        const SnackBar(content: Text('Copied successfully')));
                } else {
                  await srcFile.rename(destFile.path);
                  try { await _ch.invokeMethod('scanFile', {'path': destFile.path}); } catch (_) {}
                  setState(() => _filtered.removeWhere((s) => s.data == song.data));
                  if (context.mounted)
                    ScaffoldMessenger.of(context).showSnackBar(
                        const SnackBar(content: Text('Moved successfully')));
                }
              } catch (e) {
                if (context.mounted)
                  ScaffoldMessenger.of(context).showSnackBar(
                      SnackBar(content: Text('Error: ' + e.toString())));
              }
            }

            // Confirm and delete
            Future<void> _confirmDelete(BuildContext context, SongModel song) async {
              final confirmed = await showDialog<bool>(
                context: context,
                builder: (dctx) => AlertDialog(
                  backgroundColor: const Color(0xFF1E1E1E),
                  title: const Text('Delete'),
                  content: Text('Delete "' + song.title + '"? This cannot be undone.'),
                  actions: [
                    TextButton(
                      onPressed: () => Navigator.pop(dctx, false),
                      child: const Text('Cancel'),
                    ),
                    TextButton(
                      onPressed: () => Navigator.pop(dctx, true),
                      child: const Text('Delete',
                          style: TextStyle(color: Colors.red)),
                    ),
                  ],
                ),
              );
              if (confirmed != true || !context.mounted) return;
              try {
                await File(song.data).delete();
                setState(() {
                  _filtered.removeWhere((s) => s.data == song.data);
                });
                if (context.mounted)
                  ScaffoldMessenger.of(context).showSnackBar(
                      const SnackBar(content: Text('Deleted successfully')));
              } catch (e) {
                if (context.mounted)
                  ScaffoldMessenger.of(context).showSnackBar(
                      SnackBar(content: Text('Cannot delete: $e')));
              }
            }

            bool _handleBack() {
              if (_isSel) {
                setState(() { _sel.clear(); _isSel = false; });
                return true;
              }
              if (_focus.hasFocus) {
                _focus.unfocus();
                return true;
              }
              if (_sc.text.isNotEmpty) {
                _sc.clear();
                return true;
              }
              return false;
            }

            @override
            Widget build(BuildContext context) => PopScope(
                  canPop: !_isSel && !_focus.hasFocus && _sc.text.isEmpty,
                  onPopInvoked: (didPop) { if (!didPop) _handleBack(); },
                  child: Scaffold(
                  appBar: AppBar(
                    leading: _isSel
                        ? Semantics(
                            label: 'close selection button',
                            button: true,
                            excludeSemantics: true,
                            child: IconButton(
                                icon: const Icon(Icons.close),
                                onPressed: () =>
                                    setState(() { _sel.clear(); _isSel = false; })))
                        : null,
                    title: _isSel
                        ? Text('${_sel.length} Selected')
                        : TextField(
                            controller: _sc,
                            focusNode: _focus,
                            decoration: InputDecoration(
                              hintText: 'Search in folder...',
                              border: InputBorder.none,
                              suffixIcon: _sc.text.isNotEmpty
                                  ? Semantics(
                                      label: 'clear search button',
                                      button: true,
                                      container: true,
                                      excludeSemantics: true,
                                      child: IconButton(
                                        icon: const Icon(Icons.clear),
                                        onPressed: () => _sc.clear(),
                                      ),
                                    )
                                  : null,
                            ),
                          ),
                    actions: _isSel
                        ? [
                            Semantics(
                              label: 'select all button',
                              button: true,
                              excludeSemantics: true,
                              child: IconButton(
                                icon: const Icon(Icons.select_all),
                                onPressed: () => setState(() =>
                                    _sel.addAll(Iterable.generate(_filtered.length))),
                              ),
                            ),
                            Semantics(
                              label: 'play selected songs button',
                              button: true,
                              excludeSemantics: true,
                              child: IconButton(
                                icon: const Icon(Icons.play_circle),
                                onPressed: () => Navigator.push(context,
                                    MaterialPageRoute(builder: (_) => PlayerScreen(
                                        songs: _sel.map((i) => _filtered[i]).toList(),
                                        initialIndex: 0))),
                              ),
                            ),
                          ]
                        : null,
                  ),
                  floatingActionButtonLocation:
                      FloatingActionButtonLocation.startFloat,
                  floatingActionButton: Semantics(
                    label: 'play last button',
                    button: true,
                    excludeSemantics: true,
                    child: FloatingActionButton.extended(
                      backgroundColor: Colors.blueAccent,
                      icon: const Icon(Icons.history),
                      label: const Text('Play Last'),
                      onPressed: () async {
                        final folderName = widget.folder.name;
                        final last = await LastPlayedService.load(folder: folderName);
                        if (last == null) {
                          if (context.mounted)
                            ScaffoldMessenger.of(context).showSnackBar(
                                const SnackBar(content: Text('No last played in this folder.')));
                          return;
                        }
                        final path = last['path'] as String;
                        final ms   = last['ms']   as int;
                        final song = widget.folder.songs.firstWhere(
                          (s) => s.data == path,
                          orElse: () => widget.folder.songs.first,
                        );
                        final idx = widget.folder.songs.indexOf(song);
                        if (context.mounted)
                          Navigator.push(context, MaterialPageRoute(
                              builder: (_) => PlayerScreen(
                                  songs: widget.folder.songs,
                                  initialIndex: idx,
                                  seekOnStartMs: ms)));
                      },
                    ),
                  ),
                  body: ListView.builder(
                    itemCount: _filtered.length,
                    itemBuilder: (_, i) {
                      final isS = _sel.contains(i);
                      final song = _filtered[i];
                      return ValueListenableBuilder<bool>(
                        valueListenable: showPositionNotifier,
                        builder: (ctx, showPos, _) => ListTile(
                          tileColor: isS ? Colors.blueAccent.withOpacity(0.1) : null,
                          leading: Icon(isS ? Icons.check_circle : Icons.music_note,
                              color: i % 2 == 0 ? Colors.blueAccent : Colors.grey),
                          title: Text(
                              fmtMs(song.duration) + '  ' +
                              (showPos
                                ? song.title + '  ' + (i + 1).toString() + ' of ' + _filtered.length.toString()
                                : song.title),
                              maxLines: 1),
                          trailing: _isSel ? null : Semantics(
                            label: 'more button',
                            button: true,
                            container: true,
                            excludeSemantics: true,
                            child: IconButton(
                              icon: const Icon(Icons.more_vert,
                                  color: Colors.grey),
                              onPressed: () =>
                                  _showSongOptions(context, song),
                            ),
                          ),
                          onLongPress: () =>
                              setState(() { _sel.add(i); _isSel = true; }),
                          onTap: () {
                            if (_isSel) {
                              setState(() {
                                if (isS) _sel.remove(i); else _sel.add(i);
                                _isSel = _sel.isNotEmpty;
                              });
                            } else {
                              Navigator.push(context, MaterialPageRoute(
                                  builder: (_) => PlayerScreen(
                                      songs: _filtered, initialIndex: i)));
                            }
                          },
                        ),
                      );
                    },
                  ),
                ));
          }

          class PlayerScreen extends StatefulWidget {
            final List<SongModel> songs;
            final int initialIndex;
            final int seekOnStartMs;
            const PlayerScreen({
              super.key,
              required this.songs,
              required this.initialIndex,
              this.seekOnStartMs = 0,
            });
            @override
            State<PlayerScreen> createState() => _PlayerScreenState();
          }

          class _PlayerScreenState extends State<PlayerScreen> {
            late int _idx;
            bool _playing = true;
            Duration _pos = Duration.zero;
            Duration _dur = Duration.zero;
            double _speed = 1.0;
            bool _seekDone = false;

            @override
            void initState() {
              super.initState();
              _idx = widget.initialIndex;
              startMusic(widget.songs, _idx);
              _ch.setMethodCallHandler((call) async {
                if (!mounted) return;
                if (call.method == 'onSongChanged') {
                  setState(() {
                    _idx     = call.arguments['index']     as int;
                    _playing = call.arguments['isPlaying'] as bool;
                    _pos = Duration.zero;
                  });
                } else if (call.method == 'onPosition') {
                  final ms = call.arguments['ms'] as int;
                  setState(() { _pos = Duration(milliseconds: ms); });

                } else if (call.method == 'onDuration') {
                  final durMs = call.arguments['ms'] as int;
                  setState(() { _dur = Duration(milliseconds: durMs); });
                  // Seek to saved position once duration is known (song is ready)
                  if (!_seekDone && widget.seekOnStartMs > 0 && durMs > 0) {
                    _seekDone = true;
                    await _ch.invokeMethod('seek', {'ms': widget.seekOnStartMs});
                  }
                }
              });
            }

            String _fmt(Duration d) {
              final m = d.inMinutes.remainder(60).toString().padLeft(2, '0');
              final s = d.inSeconds.remainder(60).toString().padLeft(2, '0');
              return m + ':' + s;
            }

            void _showSpeedSheet() {
              // slider: 0.0–1.0 maps to 0.5x–2x, default 0.5 = 1x
              double pendingSpeed = _speed;
              showModalBottomSheet(
                context: context,
                backgroundColor: const Color(0xFF1E1E1E),
                shape: const RoundedRectangleBorder(
                  borderRadius: BorderRadius.vertical(top: Radius.circular(20)),
                ),
                builder: (ctx) => StatefulBuilder(
                  builder: (ctx, setSheetState) {
                    // Convert speed (0.5–2.0) to slider value (0.0–1.0)
                    final sliderVal = (pendingSpeed - 0.5) / 1.5;
                    final pct = (sliderVal * 100).round();
                    final speedLabel = pendingSpeed.toStringAsFixed(2) + 'x';
                    return Padding(
                      padding: const EdgeInsets.fromLTRB(24, 20, 24, 32),
                      child: Column(
                        mainAxisSize: MainAxisSize.min,
                        children: [
                          // Title
                          Text('Playback Speed',
                              style: GoogleFonts.poppins(
                                  fontSize: 18, fontWeight: FontWeight.bold,
                                  color: Colors.white)),
                          const SizedBox(height: 4),
                          // Current speed label
                          Text(speedLabel,
                              style: TextStyle(
                                  fontSize: 28, fontWeight: FontWeight.bold,
                                  color: Colors.blueAccent)),
                          const SizedBox(height: 8),
                          // Slow / Fast labels
                          Row(
                            mainAxisAlignment: MainAxisAlignment.spaceBetween,
                            children: const [
                              Text('0.5x Slow', style: TextStyle(color: Colors.grey, fontSize: 12)),
                              Text('2x Fast',   style: TextStyle(color: Colors.grey, fontSize: 12)),
                            ],
                          ),
                          // Slider — 50% = 1x
                          Semantics(
                            label: 'playback speed slider',
                            slider: true,
                            value: pct.toString() + '%',
                            child: Slider(
                              value: sliderVal,
                              min: 0.0,
                              max: 1.0,
                              divisions: 30,
                              semanticFormatterCallback: (v) {
                                final p = (v * 100).round();
                                return p.toString() + '%';
                              },
                              onChanged: (v) {
                                setSheetState(() {
                                  pendingSpeed = 0.5 + v * 1.5;
                                });
                              },
                            ),
                          ),
                          const SizedBox(height: 16),
                          // Apply / Cancel buttons
                          Row(
                            children: [
                              Expanded(
                                child: Semantics(
                                  label: 'cancel button',
                                  button: true,
                                  excludeSemantics: true,
                                  child: OutlinedButton(
                                    onPressed: () => Navigator.pop(ctx),
                                    child: const Text('Cancel',
                                        style: TextStyle(color: Colors.grey)),
                                  ),
                                ),
                              ),
                              const SizedBox(width: 16),
                              Expanded(
                                child: Semantics(
                                  label: 'apply button',
                                  button: true,
                                  excludeSemantics: true,
                                  child: ElevatedButton(
                                    style: ElevatedButton.styleFrom(
                                        backgroundColor: Colors.blueAccent),
                                    onPressed: () async {
                                      setState(() => _speed = pendingSpeed);
                                      await setPlaybackSpeed(pendingSpeed);
                                      if (ctx.mounted) Navigator.pop(ctx);
                                    },
                                    child: const Text('Apply',
                                        style: TextStyle(color: Colors.white)),
                                  ),
                                ),
                              ),
                            ],
                          ),
                        ],
                      ),
                    );
                  },
                ),
              );
            }

            @override
            Widget build(BuildContext context) {
              final song = widget.songs[_idx];
              final maxSec = _dur.inSeconds.toDouble() > 0 ? _dur.inSeconds.toDouble() : 1.0;
              final curSec = _pos.inSeconds.toDouble().clamp(0.0, maxSec);
              return Scaffold(
                appBar: AppBar(
                  title: const Text('Now Playing'),
                  actions: [
                    Semantics(
                      label: 'more button',
                      button: true,
                      excludeSemantics: true,
                      child: PopupMenuButton<String>(
                        icon: const Icon(Icons.more_vert),
                        tooltip: 'More options',
                        onSelected: (value) {
                          if (value == 'speed') _showSpeedSheet();
                        },
                        itemBuilder: (ctx) => [
                          const PopupMenuItem(
                            value: 'speed',
                            child: Row(
                              children: [
                                Icon(Icons.speed, color: Colors.blueAccent),
                                SizedBox(width: 12),
                                Text('Playback Speed'),
                              ],
                            ),
                          ),
                        ],
                      ),
                    ),
                  ],
                ),
                body: Column(
                  children: [
                    const Spacer(),
                    const Icon(Icons.music_note, size: 100, color: Colors.blueAccent),
                    const SizedBox(height: 24),
                    Padding(
                      padding: const EdgeInsets.symmetric(horizontal: 16),
                      child: Text(song.title,
                          textAlign: TextAlign.center,
                          maxLines: 2,
                          style: GoogleFonts.poppins(
                              fontSize: 18, fontWeight: FontWeight.bold)),
                    ),
                    const SizedBox(height: 8),
                    Text(song.artist ?? 'Unknown Artist',
                        style: const TextStyle(color: Colors.grey, fontSize: 14)),
                    const Spacer(),
                    // ── Slider ───────────────────────────────────────────
                    Slider(
                      value: curSec,
                      max: maxSec,
                      semanticFormatterCallback: (v) {
                        final pct = maxSec > 0 ? (v / maxSec * 100).round() : 0;
                        return pct.toString() + '%';
                      },
                      onChanged: (v) {
                        setState(() => _pos = Duration(seconds: v.toInt()));
                      },
                      onChangeEnd: (v) async {
                        try {
                          await _ch.invokeMethod('seek', {'ms': (v * 1000).toInt()});
                        } catch (_) {}
                      },
                    ),
                    Padding(
                      padding: const EdgeInsets.symmetric(horizontal: 20),
                      child: Row(
                        mainAxisAlignment: MainAxisAlignment.spaceBetween,
                        children: [
                          Text(_fmt(_pos),
                              style: const TextStyle(color: Colors.grey, fontSize: 12)),
                          Text(_fmt(_dur),
                              style: const TextStyle(color: Colors.grey, fontSize: 12)),
                        ],
                      ),
                    ),
                    const SizedBox(height: 20),
                    // ── Controls ─────────────────────────────────────────
                    Row(
                      mainAxisAlignment: MainAxisAlignment.spaceEvenly,
                      children: [
                        // Previous
                        Semantics(
                          label: 'previous button',
                          button: true,
                          excludeSemantics: true,
                          child: IconButton(
                            icon: const Icon(Icons.skip_previous, size: 36),
                            onPressed: _idx > 0
                                ? () => startMusic(widget.songs, _idx - 1)
                                : null,
                          ),
                        ),
                        // Rewind 10s
                        Semantics(
                          label: 'rewind 10 seconds button',
                          button: true,
                          excludeSemantics: true,
                          child: IconButton(
                            icon: const Icon(Icons.replay_10, size: 36),
                            onPressed: () async {
                              try { await _ch.invokeMethod('rewind'); } catch (_) {}
                            },
                          ),
                        ),
                        // Play/Pause
                        Semantics(
                          label: _playing ? 'pause button' : 'play button',
                          button: true,
                          excludeSemantics: true,
                          child: FloatingActionButton(
                            backgroundColor: Colors.blueAccent,
                            onPressed: () => togglePlayPause(),
                            child: Icon(
                                _playing ? Icons.pause : Icons.play_arrow,
                                size: 40),
                          ),
                        ),
                        // Forward 10s
                        Semantics(
                          label: 'fast forward 10 seconds button',
                          button: true,
                          excludeSemantics: true,
                          child: IconButton(
                            icon: const Icon(Icons.forward_10, size: 36),
                            onPressed: () async {
                              try { await _ch.invokeMethod('forward'); } catch (_) {}
                            },
                          ),
                        ),
                        // Next
                        Semantics(
                          label: 'next button',
                          button: true,
                          excludeSemantics: true,
                          child: IconButton(
                            icon: const Icon(Icons.skip_next, size: 36),
                            onPressed: _idx < widget.songs.length - 1
                                ? () => startMusic(widget.songs, _idx + 1)
                                : null,
                          ),
                        ),
                      ],
                    ),
                    const SizedBox(height: 40),
                  ],
                ),
              );
            }
          }
          DART

      - name: Build APK
        run: |
          flutter pub get
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: NKPlayer-v1.0.102
          path: build/app/outputs/flutter-apk/app-release.apk
