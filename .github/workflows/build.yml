name: NKPlayer Pro - Local File Support
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'

      - name: Generate NKPlayer Project
        run: |
          flutter create --org com.nareshkushmi --project-name nkplayer .

          # 1. Update pubspec.yaml with File Picker and Permission Handler
          cat <<EOF > pubspec.yaml
          name: nkplayer
          description: Professional local audio player by Naresh Kushmi.
          version: 1.0.0+1
          publish_to: 'none'
          environment:
            sdk: '>=3.0.0 <4.0.0'
          dependencies:
            flutter:
              sdk: flutter
            audioplayers: ^5.2.1
            file_picker: ^8.0.0
            permission_handler: ^11.3.0
            google_fonts: ^6.1.0
          flutter:
            uses-material-design: true
          EOF

          # 2. Add Storage Permissions to AndroidManifest.xml
          sed -i '/<application/i \    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />\n    <uses-permission android:name="android.permission.READ_MEDIA_AUDIO" />' android/app/src/main/AndroidManifest.xml

          # 3. Create powerful main.dart with Local File Access
          cat <<EOF > lib/main.dart
          import 'package:flutter/material.dart';
          import 'package:audioplayers/audioplayers.dart';
          import 'package:file_picker/file_picker.dart';
          import 'package:permission_handler/permission_handler.dart';
          import 'package:google_fonts/google_fonts.dart';

          void main() => runApp(const MaterialApp(
                title: 'NK Player',
                debugShowCheckedModeBanner: false,
                home: NKPlayerHome(),
              ));

          class NKPlayerHome extends StatefulWidget {
            const NKPlayerHome({super.key});
            @override
            State<NKPlayerHome> createState() => _NKPlayerHomeState();
          }

          class _NKPlayerHomeState extends State<NKPlayerHome> {
            final player = AudioPlayer();
            bool isPlaying = false;
            Duration duration = Duration.zero;
            Duration position = Duration.zero;
            String fileName = "No file selected";

            @override
            void initState() {
              super.initState();
              _setupAudioListeners();
            }

            void _setupAudioListeners() {
              player.onPositionChanged.listen((p) => setState(() => position = p));
              player.onDurationChanged.listen((d) => setState(() => duration = d));
              player.onPlayerComplete.listen((_) => setState(() {
                    isPlaying = false;
                    position = Duration.zero;
                  }));
            }

            // Function to Pick and Play Local File
            Future<void> _pickAndPlayFile() async {
              // Request permission first
              var status = await Permission.audio.request();
              if (status.isDenied) {
                status = await Permission.storage.request();
              }

              if (status.isGranted || status.isLimited) {
                FilePickerResult? result = await FilePicker.platform.pickFiles(
                  type: FileType.audio,
                );

                if (result != null && result.files.single.path != null) {
                  String filePath = result.files.single.path!;
                  setState(() {
                    fileName = result.files.single.name;
                  });
                  await player.stop();
                  await player.play(DeviceFileSource(filePath));
                  setState(() => isPlaying = true);
                }
              } else {
                ScaffoldMessenger.of(context).showSnackBar(
                  const SnackBar(content: Text("Permission Denied! Please allow storage access.")),
                );
              }
            }

            Future<void> _handlePlayPause() async {
              if (isPlaying) {
                await player.pause();
              } else {
                await player.resume();
              }
              setState(() => isPlaying = !isPlaying);
            }

            String _formatTime(Duration d) {
              return d.toString().split('.').first.padLeft(8, "0").substring(2);
            }

            @override
            Widget build(BuildContext context) {
              return Scaffold(
                backgroundColor: const Color(0xFF0A0A0A),
                appBar: AppBar(
                  title: Text("NK Player", style: GoogleFonts.poppins(fontWeight: FontWeight.w600)),
                  centerTitle: true,
                  backgroundColor: Colors.transparent,
                  elevation: 0,
                  actions: [
                    IconButton(
                      icon: const Icon(Icons.folder_open, color: Colors.blueAccent),
                      onPressed: _pickAndPlayFile,
                      tooltip: "Open Audio File",
                    )
                  ],
                ),
                body: Semantics(
                  label: "Local Audio Player Interface",
                  child: Padding(
                    padding: const EdgeInsets.symmetric(horizontal: 25.0),
                    child: Column(
                      mainAxisAlignment: MainAxisAlignment.center,
                      children: [
                        // Dynamic Visualization
                        Container(
                          height: 280,
                          width: double.infinity,
                          decoration: BoxDecoration(
                            gradient: LinearGradient(
                              colors: isPlaying 
                                ? [Colors.blueAccent, Colors.purpleAccent] 
                                : [Colors.grey[900]!, Colors.grey[800]!],
                              begin: Alignment.topLeft,
                              end: Alignment.bottomRight,
                            ),
                            borderRadius: BorderRadius.circular(30),
                            boxShadow: [
                              BoxShadow(
                                color: isPlaying ? Colors.blueAccent.withOpacity(0.3) : Colors.black,
                                blurRadius: 20,
                              )
                            ],
                          ),
                          child: Icon(
                            isPlaying ? Icons.music_note_rounded : Icons.audiotrack_outlined, 
                            size: 150, 
                            color: Colors.white
                          ),
                        ),
                        const SizedBox(height: 40),

                        // File Information
                        Text(fileName, 
                          textAlign: TextAlign.center,
                          maxLines: 2,
                          overflow: TextOverflow.ellipsis,
                          style: GoogleFonts.poppins(fontSize: 20, fontWeight: FontWeight.bold, color: Colors.white)),
                        Text("Local Device Audio", 
                          style: GoogleFonts.poppins(fontSize: 14, color: Colors.grey[500])),
                        
                        const SizedBox(height: 30),

                        // Progress Control
                        Slider(
                          activeColor: Colors.blueAccent,
                          inactiveColor: Colors.grey[800],
                          min: 0,
                          max: duration.inSeconds.toDouble() > 0 ? duration.inSeconds.toDouble() : 1.0,
                          value: position.inSeconds.toDouble().clamp(0, duration.inSeconds.toDouble() > 0 ? duration.inSeconds.toDouble() : 1.0),
                          onChanged: (val) async => await player.seek(Duration(seconds: val.toInt())),
                        ),
                        Padding(
                          padding: const EdgeInsets.symmetric(horizontal: 15),
                          child: Row(
                            mainAxisAlignment: MainAxisAlignment.spaceBetween,
                            children: [
                              Text(_formatTime(position), style: const TextStyle(color: Colors.white70)),
                              Text(_formatTime(duration), style: const TextStyle(color: Colors.white70)),
                            ],
                          ),
                        ),
                        const SizedBox(height: 30),

                        // Playback Controls
                        Row(
                          mainAxisAlignment: MainAxisAlignment.center,
                          children: [
                            Semantics(
                              label: isPlaying ? "Pause" : "Play",
                              child: FloatingActionButton.large(
                                backgroundColor: Colors.blueAccent,
                                onPressed: isPlaying || fileName != "No file selected" ? _handlePlayPause : _pickAndPlayFile,
                                child: Icon(
                                  isPlaying ? Icons.pause_rounded : Icons.play_arrow_rounded,
                                  size: 60,
                                  color: Colors.white,
                                ),
                              ),
                            ),
                          ],
                        ),
                        const SizedBox(height: 20),
                        TextButton.icon(
                          onPressed: _pickAndPlayFile,
                          icon: const Icon(Icons.add_circle_outline, color: Colors.blueAccent),
                          label: const Text("Select Music from Device", style: TextStyle(color: Colors.blueAccent)),
                        )
                      ],
                    ),
                  ),
                ),
              );
            }
          }
          EOF

      - name: Build APK
        run: |
          flutter pub get
          flutter build apk --release

      - name: Upload NKPlayer APK
        uses: actions/upload-artifact@v4
        with:
          name: NKPlayer-Local-v1
          path: build/app/outputs/flutter-apk/app-release.apk
