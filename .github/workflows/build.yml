                        final song = _all.firstWhere(
                          (s) => s.data == path,
                          orElse: () => _all.first,
                        );
                        final idx = _all.indexOf(song);
                        Navigator.push(context, MaterialPageRoute(
                            builder: (_) => PlayerScreen(
                                songs: _all,
                                initialIndex: idx,
                                seekOnStartMs: ms)));
                      }
                    },
                  ),
                ),
                ));
          }

