                        ],
                      ),
                    ),
                  ],
                ),
                body: Container(
                  decoration: const BoxDecoration(
                    gradient: LinearGradient(
                      begin: Alignment.topCenter,
                      end: Alignment.bottomCenter,
                      colors: [Color(0xFF0D1830), Color(0xFF0A0E1A)],
                    ),
                  ),
                  child: Column(
                  children: [
                    const Spacer(),
                    Container(
                      width: 180, height: 180,
                      decoration: BoxDecoration(
                        shape: BoxShape.circle,
                        gradient: const LinearGradient(
                          colors: [Color(0xFF00D4FF), Color(0xFFBD00FF)],
                        ),
                        boxShadow: [BoxShadow(
                          color: Color(0xFF00D4FF).withOpacity(0.3),
                          blurRadius: 40, spreadRadius: 5)],
                      ),
                      child: Padding(
                        padding: const EdgeInsets.all(4),
                        child: Container(
                          decoration: const BoxDecoration(
                            shape: BoxShape.circle,
                            color: Color(0xFF0A0E1A),
                          ),
                          child: const Icon(Icons.music_note,
                              size: 80, color: Color(0xFF00D4FF)),
                        ),
                      ),
                    ),
                    const SizedBox(height: 32),
                    Padding(
                      padding: const EdgeInsets.symmetric(horizontal: 24),
                      child: Text(song.title,
                          textAlign: TextAlign.center,
                          maxLines: 2,
                          overflow: TextOverflow.ellipsis,
                          style: GoogleFonts.poppins(
                              fontSize: 18, fontWeight: FontWeight.w700,
                              color: Colors.white)),
                    ),
                    const SizedBox(height: 6),
                    Text(song.artist ?? 'Unknown Artist',
                        style: TextStyle(
                            color: Colors.white.withOpacity(0.5),
                            fontSize: 14, letterSpacing: 0.5)),
                    const Spacer(),
                    // ── Slider ───────────────────────────────────────────
                    Padding(
                      padding: const EdgeInsets.symmetric(horizontal: 8),
                      child: Slider(
                      value: curSec,
                      max: maxSec,
                      semanticFormatterCallback: (v) {
                        final pct = maxSec > 0 ? (v / maxSec * 100).round() : 0;
                        return pct.toString() + '%';
                      },
                      onChanged: (v) {
                        setState(() => _pos = Duration(seconds: v.toInt()));
                      },
                      onChangeEnd: (v) async {
                        try {
                          await _ch.invokeMethod('seek', {'ms': (v * 1000).toInt()});
                        } catch (_) {}
                      },
                      ),
                    ),
                    Padding(
                      padding: const EdgeInsets.symmetric(horizontal: 20),
                      child: Row(
                        mainAxisAlignment: MainAxisAlignment.spaceBetween,
                        children: [
                          Text(fmtMs(_pos.inMilliseconds),
                              style: const TextStyle(color: Colors.grey, fontSize: 12)),
                          Text(fmtMs(_dur.inMilliseconds),
                              style: const TextStyle(color: Colors.grey, fontSize: 12)),
                        ],
                      ),
                    ),
                    const SizedBox(height: 20),
                    // ── Controls ─────────────────────────────────────────
                    Row(
                      mainAxisAlignment: MainAxisAlignment.spaceEvenly,
                      children: [
                        // Previous
                        Semantics(
                          label: 'previous button',
                          button: true,
                          excludeSemantics: true,
                          child: IconButton(
                            icon: const Icon(Icons.skip_previous, size: 36),
                            onPressed: _idx > 0
                                ? () => startMusic(widget.songs, _idx - 1)
                                : null,
                          ),
                        ),
                        // Rewind 10s
                        Semantics(
                          label: 'Rewind 10 seconds button',
                          button: true,
                          excludeSemantics: true,
                          child: IconButton(
                            icon: const Icon(Icons.replay_10, size: 36),
                            onPressed: () async {
                              try { await _ch.invokeMethod('rewind'); } catch (_) {}
                            },
                          ),
                        ),
                        // Play/Pause
                        Semantics(
                          label: _playing ? 'pause button' : 'play button',
                          button: true,
                          excludeSemantics: true,
                          child: Container(
                            width: 72, height: 72,
                            decoration: BoxDecoration(
                              shape: BoxShape.circle,
                              gradient: const LinearGradient(
                                colors: [Color(0xFF00D4FF), Color(0xFF0090B8)],
                              ),
                              boxShadow: [BoxShadow(
                                color: Color(0xFF00D4FF).withOpacity(0.4),
                                blurRadius: 20, spreadRadius: 2)],
                            ),
                            child: IconButton(
                              onPressed: () => togglePlayPause(),
                              icon: Icon(
                                  _playing ? Icons.pause : Icons.play_arrow,
                                  size: 38, color: Color(0xFF0A0E1A)),
                            ),
                          ),
                        ),
                        // Forward 10s
                        Semantics(
                          label: 'Fast forward 10 seconds button',
                          button: true,
                          excludeSemantics: true,
                          child: IconButton(
                            icon: const Icon(Icons.forward_10, size: 36),
                            onPressed: () async {
                              try { await _ch.invokeMethod('forward'); } catch (_) {}
                            },
                          ),
                        ),
                        // Next
                        Semantics(
                          label: 'next button',
                          button: true,
                          excludeSemantics: true,
                          child: IconButton(
                            icon: const Icon(Icons.skip_next, size: 36),
                            onPressed: _idx < widget.songs.length - 1
                                ? () => startMusic(widget.songs, _idx + 1)
                                : null,
                          ),
                        ),
                      ],
                    ),
                    const SizedBox(height: 40),
                  ],
                  ),
                ),
              );
            }
          }
          DART

      - name: Build APK
        run: |
          flutter pub get
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: NKPlayer-v1.2.9
          path: build/app/outputs/flutter-apk/app-release.apk
