name: NKPlayer - Final Playback & Permission Fix (v1.0.28)
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'

      - name: Generate NKPlayer Project
        run: |
          flutter create --org com.nareshkushmi --project-name nkplayer .
          
          # App Label and Target SDK 35 (Stable Android 15 Support)
          sed -i 's/android:label="nkplayer"/android:label="NKPlayer"/' android/app/src/main/AndroidManifest.xml
          sed -i 's/targetSdkVersion .*/targetSdkVersion 35/' android/app/build.gradle || true
          
          # Force Jetifier & AndroidX settings
          echo "android.useAndroidX=true" >> android/gradle.properties
          echo "android.enableJetifier=true" >> android/gradle.properties

          cat <<EOF > pubspec.yaml
          name: nkplayer
          description: NKPlayer Pro - Accessible Media Player.
          version: 1.0.28+118
          publish_to: 'none'
          environment:
            sdk: '>=3.0.0 <4.0.0'
          dependencies:
            flutter:
              sdk: flutter
            just_audio: ^0.9.36
            just_audio_background: ^0.0.1-beta.11
            on_audio_query: ^2.9.0
            permission_handler: ^11.3.0
            google_fonts: ^6.1.0
            device_info_plus: ^10.1.0
          flutter:
            uses-material-design: true
          EOF

          # Critical Permissions for Audio and Scoped Storage
          python3 -c "
          import os
          path = 'android/app/src/main/AndroidManifest.xml'
          with open(path, 'r') as f:
              content = f.read()
          
          perms = '''    <uses-permission android:name=\"android.permission.READ_EXTERNAL_STORAGE\" android:maxSdkVersion=\"32\" />
              <uses-permission android:name=\"android.permission.WRITE_EXTERNAL_STORAGE\" android:maxSdkVersion=\"32\" />
              <uses-permission android:name=\"android.permission.READ_MEDIA_AUDIO\" />
              <uses-permission android:name=\"android.permission.MANAGE_EXTERNAL_STORAGE\" />
              <uses-permission android:name=\"android.permission.POST_NOTIFICATIONS\" />
              <uses-permission android:name=\"android.permission.FOREGROUND_SERVICE\" />
              <uses-permission android:name=\"android.permission.FOREGROUND_SERVICE_MEDIA_PLAYBACK\" />\n'''
          
          service_tag = '''
                  <service android:name=\"com.ryanheise.audioservice.AudioService\"
                      android:foregroundServiceType=\"mediaPlayback\"
                      android:exported=\"true\">
                      <intent-filter>
                          <action android:name=\"android.media.browse.MediaBrowserService\" />
                      </intent-filter>
                  </service>\n'''
          
          content = content.replace('<application', perms + '    <application android:requestLegacyExternalStorage=\"true\" android:usesCleartextTraffic=\"true\"')
          content = content.replace('</activity>', '</activity>' + service_tag)
          
          with open(path, 'w') as f:
              f.write(content)
          "

          cat <<'EOF' > lib/main.dart
          import 'dart:io';
          import 'package:flutter/material.dart';
          import 'package:on_audio_query/on_audio_query.dart';
          import 'package:just_audio/just_audio.dart';
          import 'package:just_audio_background/just_audio_background.dart';
          import 'package:permission_handler/permission_handler.dart';
          import 'package:google_fonts/google_fonts.dart';
          import 'package:device_info_plus/device_info_plus.dart';

          class PlayerManager {
            static final AudioPlayer player = AudioPlayer();
            static List<SongModel> currentPlaylist = [];
          }

          Future<void> main() async {
            try {
              WidgetsFlutterBinding.ensureInitialized();
              await JustAudioBackground.init(
                androidNotificationChannelId: 'com.nareshkushmi.nkplayer.channel.audio',
                androidNotificationChannelName: 'NKPlayer Audio Playback',
                androidNotificationOngoing: true,
                androidShowNotificationBadge: true,
              );
            } catch (e) {
              debugPrint("Init Error: $e");
            }
            runApp(const NKPlayerApp());
          }

          class NKPlayerApp extends StatelessWidget {
            const NKPlayerApp({super.key});
            @override
            Widget build(BuildContext context) {
              return MaterialApp(
                title: 'NKPlayer',
                debugShowCheckedModeBanner: false,
                theme: ThemeData.dark().copyWith(
                  primaryColor: Colors.blueAccent,
                  scaffoldBackgroundColor: const Color(0xFF0F0F0F),
                  appBarTheme: const AppBarTheme(backgroundColor: Color(0xFF0F0F0F), elevation: 0),
                ),
                home: const PermissionHandlerScreen(),
              );
            }
          }

          class PermissionHandlerScreen extends StatefulWidget {
            const PermissionHandlerScreen({super.key});
            @override
            State<PermissionHandlerScreen> createState() => _PermissionHandlerScreenState();
          }

          class _PermissionHandlerScreenState extends State<PermissionHandlerScreen> {
            @override
            void initState() {
              super.initState();
              _checkPermissions();
            }

            Future<void> _checkPermissions() async {
              if (Platform.isAndroid) {
                final info = await DeviceInfoPlugin().androidInfo;
                if (info.version.sdkInt >= 33) {
                  await [Permission.audio, Permission.notification].request();
                } else if (info.version.sdkInt >= 30) {
                  await Permission.manageExternalStorage.request();
                } else {
                  await Permission.storage.request();
                }
              }
              if (mounted) Navigator.pushReplacement(context, MaterialPageRoute(builder: (_) => const FolderListScreen()));
            }

            @override
            Widget build(BuildContext context) => const Scaffold(body: Center(child: CircularProgressIndicator(color: Colors.blueAccent)));
          }

          class CustomFolder {
            final String name;
            final List<SongModel> songs;
            CustomFolder({required this.name, required this.songs});
          }

          class FolderListScreen extends StatefulWidget {
            const FolderListScreen({super.key});
            @override
            State<FolderListScreen> createState() => _FolderListScreenState();
          }

          class _FolderListScreenState extends State<FolderListScreen> {
            final TextEditingController _searchCtrl = TextEditingController();
            bool _isSearching = false;
            List<CustomFolder> _folders = [];
            List<SongModel> _allSongs = [];
            List<SongModel> _filteredSongs = [];
            bool _loading = true;

            @override
            void initState() {
              super.initState();
              _loadData();
              _searchCtrl.addListener(() {
                setState(() {
                  _filteredSongs = _allSongs.where((s) => s.title.toLowerCase().contains(_searchCtrl.text.toLowerCase())).toList();
                });
              });
            }

            Future<void> _loadData() async {
              List<SongModel> songs = await OnAudioQuery().querySongs();
              Map<String, List<SongModel>> paths = {};
              for (var s in songs) {
                if (s.data == null) continue;
                paths.putIfAbsent(File(s.data).parent.path, () => []).add(s);
              }
              setState(() {
                _allSongs = songs;
                _folders = paths.entries.map((e) => CustomFolder(name: e.key.split('/').last, songs: e.value)).toList();
                _loading = false;
              });
            }

            @override
            Widget build(BuildContext context) {
              return Scaffold(
                appBar: AppBar(
                  title: _isSearching
                      ? TextField(
                          controller: _searchCtrl,
                          autofocus: true,
                          style: const TextStyle(color: Colors.white),
                          decoration: const InputDecoration(hintText: "Search songs...", border: InputBorder.none, hintStyle: TextStyle(color: Colors.grey)),
                        )
                      : Text("NKPlayer Folders", style: GoogleFonts.poppins(fontWeight: FontWeight.w600)),
                  actions: [
                    IconButton(
                      icon: Icon(_isSearching ? Icons.close : Icons.search),
                      onPressed: () => setState(() { _isSearching = !_isSearching; if (!_isSearching) _searchCtrl.clear(); }),
                    )
                  ],
                ),
                body: _loading
                    ? const Center(child: CircularProgressIndicator())
                    : _isSearching
                        ? ListView.builder(
                            itemCount: _filteredSongs.length,
                            itemBuilder: (context, i) => ListTile(
                              leading: const Icon(Icons.music_note, color: Colors.blueAccent),
                              title: Text(_filteredSongs[i].title, maxLines: 1, overflow: TextOverflow.ellipsis),
                              onTap: () => Navigator.push(context, MaterialPageRoute(builder: (_) => PlayerScreen(songs: _filteredSongs, initialIndex: i))),
                            ),
                          )
                        : ListView.builder(
                            itemCount: _folders.length,
                            itemBuilder: (context, i) {
                              final f = _folders[i];
                              return ListTile(
                                leading: const Icon(Icons.folder, color: Colors.amber, size: 35),
                                title: Text(f.name, style: const TextStyle(fontWeight: FontWeight.w500)),
                                subtitle: Text("${f.songs.length} songs"),
                                onTap: () => Navigator.push(context, MaterialPageRoute(builder: (_) => SongListScreen(folder: f))),
                              );
                            },
                          ),
              );
            }
          }

          class SongListScreen extends StatefulWidget {
            final CustomFolder folder;
            const SongListScreen({super.key, required this.folder});
            @override
            State<SongListScreen> createState() => _SongListScreenState();
          }

          class _SongListScreenState extends State<SongListScreen> {
            @override
            Widget build(BuildContext context) {
              return Scaffold(
                appBar: AppBar(title: Text(widget.folder.name)),
                body: ListView.builder(
                  itemCount: widget.folder.songs.length,
                  itemBuilder: (context, i) {
                    final song = widget.folder.songs[i];
                    return ListTile(
                      leading: const Icon(Icons.music_note, color: Colors.blueAccent),
                      title: Text(song.title, maxLines: 1, overflow: TextOverflow.ellipsis),
                      subtitle: Text(song.artist ?? "Unknown Artist", maxLines: 1),
                      onTap: () => Navigator.push(context, MaterialPageRoute(builder: (_) => PlayerScreen(songs: widget.folder.songs, initialIndex: i))),
                    );
                  },
                ),
              );
            }
          }

          class PlayerScreen extends StatefulWidget {
            final List<SongModel> songs;
            final int initialIndex;
            const PlayerScreen({super.key, required this.songs, required this.initialIndex});
            @override
            State<PlayerScreen> createState() => _PlayerScreenState();
          }

          class _PlayerScreenState extends State<PlayerScreen> {
            @override
            void initState() {
              super.initState();
              _initPlayer();
            }

            // FIX: Smart initialization to prevent loading lag and 00:00 bug
            Future<void> _initPlayer() async {
              try {
                // If same playlist is already loaded, just seek. Don't re-load everything.
                if (PlayerManager.currentPlaylist.length == widget.songs.length && 
                    PlayerManager.player.currentIndex == widget.initialIndex &&
                    PlayerManager.player.playing) {
                  return;
                }

                PlayerManager.currentPlaylist = widget.songs;
                final playlist = ConcatenatingAudioSource(
                  children: widget.songs.map((s) => AudioSource.uri(
                    Uri.parse(s.uri!),
                    tag: MediaItem(id: s.id.toString(), title: s.title, artist: s.artist, album: s.album),
                  )).toList(),
                );

                await PlayerManager.player.setAudioSource(playlist, initialIndex: widget.initialIndex);
                PlayerManager.player.play();
              } catch (e) {
                debugPrint("Playback Error: $e");
              }
            }

            String _formatDuration(Duration d) => d.toString().split('.').first.padLeft(8, "0").substring(2);

            @override
            Widget build(BuildContext context) {
              return Scaffold(
                appBar: AppBar(title: const Text("Now Playing")),
                body: StreamBuilder<SequenceState?>(
                  stream: PlayerManager.player.sequenceStateStream,
                  builder: (context, snapshot) {
                    final state = snapshot.data;
                    if (state == null) return const Center(child: CircularProgressIndicator());
                    final meta = state.currentSource!.tag as MediaItem;

                    return Padding(
                      padding: const EdgeInsets.symmetric(horizontal: 20),
                      child: Column(
                        mainAxisAlignment: MainAxisAlignment.center,
                        children: [
                          Container(
                            height: 250, width: 250,
                            decoration: BoxDecoration(color: Colors.blueAccent.withOpacity(0.1), borderRadius: BorderRadius.circular(20)),
                            child: const Icon(Icons.music_note, size: 120, color: Colors.blueAccent),
                          ),
                          const SizedBox(height: 40),
                          Text(meta.title, textAlign: TextAlign.center, style: GoogleFonts.poppins(fontSize: 20, fontWeight: FontWeight.bold), maxLines: 2),
                          const SizedBox(height: 8),
                          Text(meta.artist ?? "Unknown Artist", style: const TextStyle(color: Colors.grey, fontSize: 16)),
                          const SizedBox(height: 30),
                          StreamBuilder<Duration>(
                            stream: PlayerManager.player.positionStream,
                            builder: (context, posSnap) {
                              final pos = posSnap.data ?? Duration.zero;
                              final dur = PlayerManager.player.duration ?? Duration.zero;
                              return Column(
                                children: [
                                  Slider(
                                    activeColor: Colors.blueAccent,
                                    inactiveColor: Colors.grey.withOpacity(0.3),
                                    value: pos.inSeconds.toDouble(),
                                    max: dur.inSeconds.toDouble() > 0 ? dur.inSeconds.toDouble() : 1.0,
                                    onChanged: (v) => PlayerManager.player.seek(Duration(seconds: v.toInt())),
                                  ),
                                  Row(
                                    mainAxisAlignment: MainAxisAlignment.spaceBetween,
                                    children: [Text(_formatDuration(pos)), Text(_formatDuration(dur))],
                                  ),
                                ],
                              );
                            },
                          ),
                          const SizedBox(height: 40),
                          Row(
                            mainAxisAlignment: MainAxisAlignment.spaceEvenly,
                            children: [
                              IconButton(icon: const Icon(Icons.skip_previous, size: 45), onPressed: () => PlayerManager.player.seekToPrevious()),
                              StreamBuilder<PlayerState>(
                                stream: PlayerManager.player.playerStateStream,
                                builder: (context, psSnap) {
                                  final playing = psSnap.data?.playing ?? false;
                                  final processing = psSnap.data?.processingState;
                                  if (processing == ProcessingState.buffering || processing == ProcessingState.loading) {
                                    return const CircularProgressIndicator();
                                  }
                                  return FloatingActionButton.large(
                                    backgroundColor: Colors.blueAccent,
                                    onPressed: playing ? PlayerManager.player.pause : PlayerManager.player.play,
                                    child: Icon(playing ? Icons.pause : Icons.play_arrow, size: 50, color: Colors.white),
                                  );
                                },
                              ),
                              IconButton(icon: const Icon(Icons.skip_next, size: 45), onPressed: () => PlayerManager.player.seekToNext()),
                            ],
                          ),
                        ],
                      ),
                    );
                  },
                ),
              );
            }
          }
          EOF

      - name: Build APK
        run: |
          flutter pub get
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: NKPlayer-v1.0.28
          path: build/app/outputs/flutter-apk/app-release.apk
