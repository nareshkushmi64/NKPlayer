name: NKPlayer - Folder Library Fixed
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'

      - name: Generate NKPlayer Project
        run: |
          # 1. Create project
          flutter create --org com.nareshkushmi --project-name nkplayer .

          # 2. Update pubspec.yaml
          cat <<EOF > pubspec.yaml
          name: nkplayer
          description: Professional folder-based audio player by Naresh Kushmi.
          version: 1.0.0+1
          publish_to: 'none'
          environment:
            sdk: '>=3.0.0 <4.0.0'
          dependencies:
            flutter:
              sdk: flutter
            audioplayers: ^5.2.1
            on_audio_query: ^2.9.0
            permission_handler: ^11.3.0
            google_fonts: ^6.1.0
          flutter:
            uses-material-design: true
          EOF

          # 3. Add Permissions safely (Android 13+ support)
          # We use a simple replacement that won't trigger shell errors
          python3 -c "
          import os
          path = 'android/app/src/main/AndroidManifest.xml'
          with open(path, 'r') as f:
              content = f.read()
          perms = '    <uses-permission android:name=\"android.permission.READ_EXTERNAL_STORAGE\" />\n    <uses-permission android:name=\"android.permission.READ_MEDIA_AUDIO\" />\n'
          new_content = content.replace('<application', perms + '    <application')
          with open(path, 'w') as f:
              f.write(new_content)
          "

          # 4. Create the final main.dart (escaped for shell safety)
          cat <<'EOF' > lib/main.dart
          import 'package:flutter/material.dart';
          import 'package:on_audio_query/on_audio_query.dart';
          import 'package:audioplayers/audioplayers.dart';
          import 'package:permission_handler/permission_handler.dart';
          import 'package:google_fonts/google_fonts.dart';

          void main() => runApp(MaterialApp(
                title: 'NK Player',
                debugShowCheckedModeBanner: false,
                theme: ThemeData.dark(),
                home: const PermissionHandlerScreen(),
              ));

          class PermissionHandlerScreen extends StatefulWidget {
            const PermissionHandlerScreen({super.key});
            @override
            State<PermissionHandlerScreen> createState() => _PermissionHandlerScreenState();
          }

          class _PermissionHandlerScreenState extends State<PermissionHandlerScreen> {
            @override
            void initState() {
              super.initState();
              _checkPermissions();
            }

            Future<void> _checkPermissions() async {
              var status = await Permission.audio.request();
              if (status.isGranted || await Permission.storage.request().isGranted) {
                if (mounted) Navigator.of(context).pushReplacement(MaterialPageRoute(builder: (_) => const FolderListScreen()));
              }
            }

            @override
            Widget build(BuildContext context) {
              return const Scaffold(body: Center(child: CircularProgressIndicator()));
            }
          }

          class FolderListScreen extends StatefulWidget {
            const FolderListScreen({super.key});
            @override
            State<FolderListScreen> createState() => _FolderListScreenState();
          }

          class _FolderListScreenState extends State<FolderListScreen> {
            final OnAudioQuery _audioQuery = OnAudioQuery();

            @override
            Widget build(BuildContext context) {
              return Scaffold(
                appBar: AppBar(title: Text("NK Folders", style: GoogleFonts.poppins())),
                body: FutureBuilder<List<AlbumModel>>(
                  future: _audioQuery.queryAlbums(sortType: AlbumSortType.ALBUM, orderType: OrderType.ASC_OR_SMALLER),
                  builder: (context, item) {
                    if (item.data == null) return const Center(child: CircularProgressIndicator());
                    if (item.data!.isEmpty) return const Center(child: Text("No Music Folders Found"));
                    return ListView.builder(
                      itemCount: item.data!.length,
                      itemBuilder: (context, index) {
                        return ListTile(
                          leading: const Icon(Icons.folder, color: Colors.amber),
                          title: Text(item.data![index].album),
                          subtitle: Text("${item.data![index].numOfSongs} Songs"),
                          onTap: () => Navigator.push(context, MaterialPageRoute(
                            builder: (_) => SongListScreen(album: item.data![index])
                          )),
                        );
                      },
                    );
                  },
                ),
              );
            }
          }

          class SongListScreen extends StatelessWidget {
            final AlbumModel album;
            const SongListScreen({super.key, required this.album});

            @override
            Widget build(BuildContext context) {
              return Scaffold(
                appBar: AppBar(title: Text(album.album)),
                body: FutureBuilder<List<SongModel>>(
                  future: OnAudioQuery().queryAudiosFrom(AudiosFromType.ALBUM_ID, album.id, sortType: SongSortType.TITLE, orderType: OrderType.ASC_OR_SMALLER),
                  builder: (context, item) {
                    if (item.data == null) return const Center(child: CircularProgressIndicator());
                    return ListView.builder(
                      itemCount: item.data!.length,
                      itemBuilder: (context, index) {
                        return ListTile(
                          leading: const Icon(Icons.music_note),
                          title: Text(item.data![index].title),
                          subtitle: Text(item.data![index].artist ?? "Unknown"),
                          onTap: () => Navigator.push(context, MaterialPageRoute(
                            builder: (_) => PlayerScreen(songs: item.data!, initialIndex: index)
                          )),
                        );
                      },
                    );
                  },
                ),
              );
            }
          }

          class PlayerScreen extends StatefulWidget {
            final List<SongModel> songs;
            final int initialIndex;
            const PlayerScreen({super.key, required this.songs, required this.initialIndex});
            @override
            State<PlayerScreen> createState() => _PlayerScreenState();
          }

          class _PlayerScreenState extends State<PlayerScreen> {
            final AudioPlayer _player = AudioPlayer();
            late int _currentIndex;
            bool _isPlaying = false;
            Duration _position = Duration.zero;
            Duration _duration = Duration.zero;

            @override
            void initState() {
              super.initState();
              _currentIndex = widget.initialIndex;
              _playCurrentSong();
              _player.onPositionChanged.listen((p) => setState(() => _position = p));
              _player.onDurationChanged.listen((d) => setState(() => _duration = d));
              _player.onPlayerComplete.listen((_) => _nextSong());
            }

            Future<void> _playCurrentSong() async {
              await _player.stop();
              await _player.play(DeviceFileSource(widget.songs[_currentIndex].data));
              setState(() => _isPlaying = true);
            }

            void _togglePlay() async {
              if (_isPlaying) { await _player.pause(); } 
              else { await _player.resume(); }
              setState(() => _isPlaying = !_isPlaying);
            }

            void _nextSong() {
              if (_currentIndex < widget.songs.length - 1) {
                _currentIndex++;
                _playCurrentSong();
              }
            }

            void _prevSong() {
              if (_currentIndex > 0) {
                _currentIndex--;
                _playCurrentSong();
              }
            }

            @override
            void dispose() { _player.dispose(); super.dispose(); }

            @override
            Widget build(BuildContext context) {
              final song = widget.songs[_currentIndex];
              return Scaffold(
                appBar: AppBar(title: const Text("Now Playing")),
                body: Padding(
                  padding: const EdgeInsets.all(25),
                  child: Column(
                    mainAxisAlignment: MainAxisAlignment.center,
                    children: [
                      Container(
                        height: 250, width: 250,
                        decoration: BoxDecoration(color: Colors.blueGrey[900], borderRadius: BorderRadius.circular(20)),
                        child: const Icon(Icons.music_note, size: 100, color: Colors.blueAccent),
                      ),
                      const SizedBox(height: 30),
                      Text(song.title, textAlign: TextAlign.center, style: GoogleFonts.poppins(fontSize: 20, fontWeight: FontWeight.bold)),
                      Text(song.artist ?? "Unknown Artist", style: const TextStyle(color: Colors.grey)),
                      Slider(
                        value: _position.inSeconds.toDouble(),
                        max: _duration.inSeconds.toDouble() > 0 ? _duration.inSeconds.toDouble() : 1.0,
                        onChanged: (v) => _player.seek(Duration(seconds: v.toInt())),
                      ),
                      Row(
                        mainAxisAlignment: MainAxisAlignment.spaceEvenly,
                        children: [
                          IconButton(icon: const Icon(Icons.skip_previous, size: 45), onPressed: _prevSong),
                          Semantics(
                            label: _isPlaying ? "Pause" : "Play",
                            child: IconButton(
                              icon: Icon(_isPlaying ? Icons.pause_circle_filled : Icons.play_circle_filled, size: 70, color: Colors.blueAccent),
                              onPressed: _togglePlay
                            ),
                          ),
                          IconButton(icon: const Icon(Icons.skip_next, size: 45), onPressed: _nextSong),
                        ],
                      ),
                    ],
                  ),
                ),
              );
            }
          }
          EOF

      - name: Build APK
        run: |
          flutter pub get
          flutter build apk --release

      - name: Upload NKPlayer APK
        uses: actions/upload-artifact@v4
        with:
          name: NKPlayer-Library-v2
          path: build/app/outputs/flutter-apk/app-release.apk
