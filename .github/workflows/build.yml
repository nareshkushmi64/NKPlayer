            // Custom folder browser — reads /storage/emulated/0 directly
            Future<String?> _browseFolders(BuildContext context, String title, String op) async {
              String currentPath = '/storage/emulated/0';
              String? selected;

              await showModalBottomSheet(
                context: context,
                isScrollControlled: true,
                backgroundColor: const Color(0xFF111827),
                shape: const RoundedRectangleBorder(
                  borderRadius: BorderRadius.vertical(top: Radius.circular(16)),
                ),
                builder: (ctx) => StatefulBuilder(
                  builder: (ctx, setModal) {
                    List<FileSystemEntity> dirs = [];
                    try {
                      dirs = Directory(currentPath)
                          .listSync()
                          .whereType<Directory>()
                          .where((d) {
                            final name = d.path.split('/').last;
                            return !name.startsWith('.');
                          })
                          .toList()
                          ..sort((a, b) => a.path
                              .split('/').last
                              .compareTo(b.path.split('/').last));
                    } catch (_) {}

                    final parts = currentPath
                        .replaceFirst('/storage/emulated/0', 'Storage')
                        .split('/');

                    return SizedBox(
                      height: MediaQuery.of(context).size.height * 0.75,
                      child: Column(
                        children: [
                          // Header
                          Padding(
                            padding: const EdgeInsets.fromLTRB(16, 16, 16, 0),
                            child: Row(children: [
                              Expanded(
                                child: Text(title,
                                    style: const TextStyle(
                                        fontSize: 16,
                                        fontWeight: FontWeight.bold)),
                              ),
                              TextButton(
                                onPressed: () {
                                  selected = currentPath;
                                  Navigator.pop(ctx);
                                },
                                child: Text(op == 'copy' ? 'Copy here' : 'Move here',
                                    style: const TextStyle(color: Color(0xFF00D4FF))),
                              ),
                            ]),
                          ),
                          // Breadcrumb
                          SingleChildScrollView(
                            scrollDirection: Axis.horizontal,
                            padding: const EdgeInsets.symmetric(
                                horizontal: 16, vertical: 4),
                            child: Row(
                              children: parts.asMap().entries.map((e) {
                                final idx = e.key;
                                final part = e.value;
                                final isLast = idx == parts.length - 1;
                                return GestureDetector(
                                  onTap: isLast ? null : () {
                                    // Navigate to that breadcrumb level
                                    final newParts = parts.sublist(0, idx + 1);
                                    String newPath = newParts.join('/');
                                    if (newPath == 'Storage') {
                                      newPath = '/storage/emulated/0';
                                    } else {
                                      newPath = newPath.replaceFirst(
                                          'Storage', '/storage/emulated/0');
                                    }
                                    setModal(() => currentPath = newPath);
                                  },
                                  child: Row(children: [
                                    Text(part,
                                        style: TextStyle(
                                            color: isLast
                                                ? Colors.white
                                                : const Color(0xFF00D4FF),
                                            fontSize: 13)),
                                    if (!isLast)
                                      const Icon(Icons.chevron_right,
                                          size: 16, color: Colors.grey),
                                  ]),
                                );
                              }).toList(),
                            ),
                          ),
                          const Divider(height: 1),
                          // Folder list
                          Expanded(
                            child: dirs.isEmpty
                                ? const Center(
                                    child: Text('No subfolders',
                                        style: TextStyle(color: Colors.grey)))
                                : ListView.builder(
                                    itemCount: dirs.length,
                                    itemBuilder: (_, i) {
                                      final name =
                                          dirs[i].path.split('/').last;
                                      return ListTile(
                                        leading: const Icon(Icons.folder,
                                            color: Colors.amber),
                                        title: Text(name),
                                        trailing: const Icon(
                                            Icons.chevron_right,
                                            color: Colors.grey),
                                        onTap: () => setModal(
                                            () => currentPath = dirs[i].path),
                                      );
                                    },
                                  ),
                          ),
                        ],
                      ),
                    );
                  },
                ),
              );
              return selected;
            }

            Future<void> _pickFolderAndOperate(
                BuildContext context, SongModel song, String op) async {
              final destDir = await _browseFolders(
                context,
                op == 'copy' ? 'Copy to folder' : 'Move to folder',
                op,
              );
              if (destDir == null || !context.mounted) return;
              try {
                final srcFile  = File(song.data);
                final fileName = srcFile.uri.pathSegments.last;
                final destFile = File(destDir + '/' + fileName);
                if (op == 'copy') {
                  await srcFile.copy(destFile.path);
                  // Scan new file so media library picks it up with metadata
                  try { await _ch.invokeMethod('scanFile', {'path': destFile.path}); } catch (_) {}
                  if (context.mounted)
                    ScaffoldMessenger.of(context).showSnackBar(
                        const SnackBar(content: Text('Copied successfully')));
                } else {
                  await srcFile.rename(destFile.path);
                  try { await _ch.invokeMethod('scanFile', {'path': destFile.path}); } catch (_) {}
                  setState(() => _filtered.removeWhere((s) => s.data == song.data));
                  if (context.mounted)
                    ScaffoldMessenger.of(context).showSnackBar(
                        const SnackBar(content: Text('Moved successfully')));
                }
              } catch (e) {
                if (context.mounted)
                  ScaffoldMessenger.of(context).showSnackBar(
                      SnackBar(content: Text('Error: ' + e.toString())));
              }
            }

            // Confirm and delete
            Future<void> _confirmDelete(BuildContext context, SongModel song) async {
              final confirmed = await showDialog<bool>(
                context: context,
                builder: (dctx) => AlertDialog(
                  backgroundColor: const Color(0xFF111827),
                  title: const Text('Delete'),
                  content: Text('Delete "' + song.title + '"? This cannot be undone.'),
                  actions: [
                    TextButton(
                      onPressed: () => Navigator.pop(dctx, false),
                      child: const Text('Cancel'),
                    ),
                    TextButton(
                      onPressed: () => Navigator.pop(dctx, true),
                      child: const Text('Delete',
                          style: TextStyle(color: Colors.red)),
                    ),
                  ],
                ),
              );
              if (confirmed != true || !context.mounted) return;
              try {
                await File(song.data).delete();
                setState(() {
                  _filtered.removeWhere((s) => s.data == song.data);
                });
                if (context.mounted)
                  ScaffoldMessenger.of(context).showSnackBar(
                      const SnackBar(content: Text('Deleted successfully')));
              } catch (e) {
                if (context.mounted)
                  ScaffoldMessenger.of(context).showSnackBar(
                      SnackBar(content: Text('Cannot delete: $e')));
              }
            }

