            Future<void> _loadVideoDurations() async {
              for (final path in widget.folder.videoPaths) {
                if (_videoDurations.containsKey(path)) continue;
                try {
                  final ms = await _ch.invokeMethod<int>(
                      'getVideoDuration', {'path': path});
                  if (ms != null && ms > 0 && mounted) {
                    setState(() => _videoDurations[path] = ms);
                  }
                } catch (_) {}
              }
            }

            @override
            void dispose() {
              _sc.dispose();
              _focus.dispose();
