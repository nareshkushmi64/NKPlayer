          // ── Equalizer Screen ─────────────────────────────────────────────────
          class EqualizerScreen extends StatefulWidget {
            const EqualizerScreen({super.key});
            @override
            State<EqualizerScreen> createState() => _EqualizerScreenState();
          }

          class _EqualizerScreenState extends State<EqualizerScreen> {
            int _bands = 0;
            int _minLevel = -1500;
            int _maxLevel = 1500;
            List<int> _freqs = [];
            List<int> _levels = [];
            bool _loading = true;

            @override
            void initState() {
              super.initState();
              _loadEq();
            }

            Future<void> _loadEq() async {
              final info = await EqService.getInfo();
              if (info == null || !mounted) return;
              setState(() {
                _bands    = info['bands']    as int;
                _minLevel = info['minLevel'] as int;
                _maxLevel = info['maxLevel'] as int;
                _freqs    = info['freqs']    as List<int>;
                _levels   = List<int>.from(info['levels'] as List<int>);
                _loading  = false;
              });
            }

            String _fmtFreq(int hz) {
              if (hz >= 1000) return '${(hz / 1000).toStringAsFixed(hz % 1000 == 0 ? 0 : 1)}kHz';
              return '${hz}Hz';
            }

            String _fmtLevel(int milliDb) {
              final db = milliDb / 100.0;
              return (db >= 0 ? '+' : '') + db.toStringAsFixed(0) + 'dB';
            }

            Future<void> _resetAll() async {
              for (int i = 0; i < _bands; i++) {
                await EqService.setBand(i, 0);
              }
              setState(() { _levels = List.filled(_bands, 0); });
            }

            @override
            Widget build(BuildContext context) {
              return Scaffold(
                appBar: AppBar(
                  title: const Text('Equalizer'),
                  actions: [
                    Semantics(
                      label: 'reset equalizer button',
                      button: true,
                      excludeSemantics: true,
                      child: TextButton(
                        onPressed: _resetAll,
                        child: const Text('Reset',
                            style: TextStyle(color: Color(0xFF00D4FF))),
                      ),
                    ),
                  ],
                ),
                body: _loading
                    ? const Center(child: CircularProgressIndicator())
                    : _bands == 0
                        ? const Center(child: Text('Equalizer not available'))
                        : Container(
                            decoration: const BoxDecoration(
                              gradient: LinearGradient(
                                begin: Alignment.topCenter,
                                end: Alignment.bottomCenter,
                                colors: [Color(0xFF0D1830), Color(0xFF0A0E1A)],
                              ),
                            ),
                            child: Padding(
                              padding: const EdgeInsets.all(16),
                              child: Column(
                                children: [
                                  const SizedBox(height: 8),
                                  // EQ bars
                                  Expanded(
                                    child: Row(
                                      crossAxisAlignment: CrossAxisAlignment.stretch,
                                      children: List.generate(_bands, (i) {
                                        final level = _levels[i];
                                        final norm = (_maxLevel - _minLevel) > 0
                                            ? (level - _minLevel) /
                                              (_maxLevel - _minLevel)
                                            : 0.5;
                                        return Expanded(
                                          child: Padding(
                                            padding: const EdgeInsets.symmetric(
                                                horizontal: 6),
                                            child: Column(
                                              children: [
                                                // dB label
                                                Text(_fmtLevel(level),
                                                    style: const TextStyle(
                                                        color: Color(0xFF00D4FF),
                                                        fontSize: 10,
                                                        fontWeight: FontWeight.w600)),
                                                const SizedBox(height: 4),
                                                // Vertical slider
                                                Expanded(
                                                  child: Semantics(
                                                    label: _fmtFreq(_freqs[i]) + ' band equalizer slider',
                                                    slider: true,
                                                    value: _fmtLevel(level),
                                                    increasedValue: _fmtLevel(level + 100),
                                                    decreasedValue: _fmtLevel(level - 100),
                                                    onIncrease: () async {
                                                      final v = (level + 100).clamp(_minLevel, _maxLevel);
                                                      setState(() => _levels[i] = v);
                                                      await EqService.setBand(i, v);
                                                    },
                                                    onDecrease: () async {
                                                      final v = (level - 100).clamp(_minLevel, _maxLevel);
                                                      setState(() => _levels[i] = v);
                                                      await EqService.setBand(i, v);
                                                    },
                                                    explicitChildNodes: false,
                                                    child: RotatedBox(
                                                      quarterTurns: 3,
                                                      child: SliderTheme(
                                                        data: SliderTheme.of(context).copyWith(
                                                          trackHeight: 4,
                                                          thumbShape: const RoundSliderThumbShape(
                                                              enabledThumbRadius: 8),
                                                          overlayShape: const RoundSliderOverlayShape(
                                                              overlayRadius: 16),
                                                          activeTrackColor: const Color(0xFF00D4FF),
                                                          inactiveTrackColor: const Color(0xFF1E2A3A),
                                                          thumbColor: const Color(0xFF00D4FF),
                                                        ),
                                                        child: Slider(
                                                          value: norm.toDouble(),
                                                          min: 0, max: 1,
                                                          onChanged: (v) {
                                                            final newLevel = (_minLevel +
                                                                (v * (_maxLevel - _minLevel)))
                                                                .round();
                                                            setState(() => _levels[i] = newLevel);
                                                          },
                                                          onChangeEnd: (v) async {
                                                            final newLevel = (_minLevel +
                                                                (v * (_maxLevel - _minLevel)))
                                                                .round();
                                                            await EqService.setBand(i, newLevel);
                                                          },
                                                        ),
                                                      ),
                                                    ),
                                                  ),
                                                ),
                                                const SizedBox(height: 8),
                                                // Frequency label
                                                Text(_fmtFreq(_freqs[i]),
                                                    style: TextStyle(
                                                        color: Colors.white.withOpacity(0.6),
                                                        fontSize: 10)),
                                              ],
                                            ),
                                          ),
                                        );
                                      }),
                                    ),
                                  ),
                                ],
                              ),
                            ),
                          ),
              );
            }
          }

          class PlayerScreen extends StatefulWidget {
            final List<SongModel> songs;
            final int initialIndex;
            final int seekOnStartMs;
            const PlayerScreen({
              super.key,
              required this.songs,
              required this.initialIndex,
              this.seekOnStartMs = 0,
            });
            @override
            State<PlayerScreen> createState() => _PlayerScreenState();
          }

          class _PlayerScreenState extends State<PlayerScreen> {
            late int _idx;
            bool _playing = true;
            Duration _pos = Duration.zero;
            Duration _dur = Duration.zero;
            double _speed = 1.0;
            bool _seekDone = false;

            @override
            void initState() {
              super.initState();
              _idx = widget.initialIndex;
              startMusic(widget.songs, _idx);
              _ch.setMethodCallHandler((call) async {
                if (!mounted) return;
                if (call.method == 'onSongChanged') {
                  setState(() {
                    _idx     = call.arguments['index']     as int;
                    _playing = call.arguments['isPlaying'] as bool;
                    _pos = Duration.zero;
                  });
                } else if (call.method == 'onPosition') {
                  final ms = call.arguments['ms'] as int;
                  setState(() { _pos = Duration(milliseconds: ms); });

                } else if (call.method == 'onDuration') {
                  final durMs = call.arguments['ms'] as int;
                  setState(() { _dur = Duration(milliseconds: durMs); });
                  // Seek to saved position once duration is known (song is ready)
                  if (!_seekDone && widget.seekOnStartMs > 0 && durMs > 0) {
                    _seekDone = true;
                    await _ch.invokeMethod('seek', {'ms': widget.seekOnStartMs});
                  }
                }
              });
            }

            String _fmt(Duration d) {
              final m = d.inMinutes.remainder(60).toString().padLeft(2, '0');
              final s = d.inSeconds.remainder(60).toString().padLeft(2, '0');
              return '$m:$s';
            }

            void _showSpeedSheet() {
              // slider: 0.0–1.0 maps to 0.5x–2x, default 0.5 = 1x
              double pendingSpeed = _speed;
              showModalBottomSheet(
                context: context,
                backgroundColor: const Color(0xFF111827),
                shape: const RoundedRectangleBorder(
                  borderRadius: BorderRadius.vertical(top: Radius.circular(20)),
                ),
                builder: (ctx) => StatefulBuilder(
                  builder: (ctx, setSheetState) {
                    // Convert speed (0.5–2.0) to slider value (0.0–1.0)
                    final sliderVal = (pendingSpeed - 0.5) / 1.5;
                    final pct = (sliderVal * 100).round();
                    final speedLabel = pendingSpeed.toStringAsFixed(2) + 'x';
                    return Padding(
                      padding: const EdgeInsets.fromLTRB(24, 20, 24, 32),
                      child: Column(
                        mainAxisSize: MainAxisSize.min,
                        children: [
                          // Title
                          Text('Playback Speed',
                              style: GoogleFonts.poppins(
                                  fontSize: 18, fontWeight: FontWeight.bold,
                                  color: Colors.white)),
                          const SizedBox(height: 4),
                          // Current speed label
                          Text(speedLabel,
                              style: TextStyle(
                                  fontSize: 28, fontWeight: FontWeight.bold,
                                  color: Color(0xFF00D4FF))),
                          const SizedBox(height: 8),
                          // Slow / Fast labels
                          Row(
                            mainAxisAlignment: MainAxisAlignment.spaceBetween,
                            children: const [
                              Text('0.5x Slow', style: TextStyle(color: Colors.grey, fontSize: 12)),
                              Text('2x Fast',   style: TextStyle(color: Colors.grey, fontSize: 12)),
                            ],
                          ),
                          // Slider — 50% = 1x
                          Semantics(
                            label: 'playback speed slider',
                            slider: true,
                            value: pct.toString() + '%',
                            child: Slider(
                              value: sliderVal,
                              min: 0.0,
                              max: 1.0,
                              divisions: 30,
                              semanticFormatterCallback: (v) {
                                final p = (v * 100).round();
                                return p.toString() + '%';
                              },
                              onChanged: (v) {
                                setSheetState(() {
                                  pendingSpeed = 0.5 + v * 1.5;
                                });
                              },
                            ),
                          ),
                          const SizedBox(height: 16),
                          // Apply / Cancel buttons
                          Row(
                            children: [
                              Expanded(
                                child: Semantics(
                                  label: 'cancel button',
                                  button: true,
                                  excludeSemantics: true,
                                  child: OutlinedButton(
                                    onPressed: () => Navigator.pop(ctx),
                                    child: const Text('Cancel',
                                        style: TextStyle(color: Colors.grey)),
                                  ),
                                ),
                              ),
                              const SizedBox(width: 16),
                              Expanded(
                                child: Semantics(
                                  label: 'apply button',
                                  button: true,
                                  excludeSemantics: true,
                                  child: ElevatedButton(
                                    style: ElevatedButton.styleFrom(
                                        backgroundColor: const Color(0xFF00D4FF)),
                                    onPressed: () async {
                                      setState(() => _speed = pendingSpeed);
                                      await setPlaybackSpeed(pendingSpeed);
                                      if (ctx.mounted) Navigator.pop(ctx);
                                    },
                                    child: const Text('Apply',
                                        style: TextStyle(color: Colors.white)),
                                  ),
                                ),
                              ),
                            ],
                          ),
                        ],
                      ),
                    );
                  },
                ),
              );
            }

