name: NKPlayer - Background Playback (v1.0.80)
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'

      - name: Generate NKPlayer Project
        run: |
          flutter create --org com.nareshkushmi --project-name nkplayer .

          sed -i 's/android:label="nkplayer"/android:label="NKPlayer"/' android/app/src/main/AndroidManifest.xml
          sed -i 's/targetSdkVersion .*/targetSdkVersion 36/' android/app/build.gradle || true
          sed -i 's/minSdkVersion .*/minSdkVersion 21/' android/app/build.gradle || true

          # Upgrade Kotlin plugin version in root build.gradle
          python3 -c "
          path = 'android/build.gradle'
          with open(path) as f: c = f.read()
          import re
          c = re.sub(r'kotlin-gradle-plugin:[0-9.]+', 'kotlin-gradle-plugin:1.8.22', c)
          c = re.sub(r\"ext\.kotlin_version\s*=\s*'[^']+'\", \"ext.kotlin_version = '1.8.22'\", c)
          with open(path, 'w') as f: f.write(c)
          print('Root build.gradle updated')
          "

          # ── pubspec.yaml ──────────────────────────────────────────────────────
          cat <<'PUBSPEC' > pubspec.yaml
          name: nkplayer
          description: NKPlayer Pro - Accessible Media Player with Background Playback.
          version: 1.0.80+81
          publish_to: 'none'
          environment:
            sdk: '>=3.0.0 <4.0.0'
          dependencies:
            flutter:
              sdk: flutter
            on_audio_query: ^2.9.0
            permission_handler: ^11.3.0
            google_fonts: ^6.1.0
            device_info_plus: ^10.1.0
          flutter:
            uses-material-design: true
          PUBSPEC

          # ── AndroidManifest.xml ───────────────────────────────────────────────
          python3 -c "
          path = 'android/app/src/main/AndroidManifest.xml'
          with open(path) as f: c = f.read()
          perms = '''    <uses-permission android:name=\"android.permission.WRITE_EXTERNAL_STORAGE\"/>
              <uses-permission android:name=\"android.permission.READ_EXTERNAL_STORAGE\"/>
              <uses-permission android:name=\"android.permission.MANAGE_EXTERNAL_STORAGE\"/>
              <uses-permission android:name=\"android.permission.READ_MEDIA_AUDIO\" />
              <uses-permission android:name=\"android.permission.POST_NOTIFICATIONS\" />
              <uses-permission android:name=\"android.permission.FOREGROUND_SERVICE\" />
              <uses-permission android:name=\"android.permission.FOREGROUND_SERVICE_MEDIA_PLAYBACK\" />\n'''
          service = '''
              <service
                  android:name=\".MusicService\"
                  android:foregroundServiceType=\"mediaPlayback\"
                  android:stopWithTask=\"false\"
                  android:exported=\"false\" />
              <receiver android:name=\".MusicReceiver\" android:exported=\"false\">
                  <intent-filter>
                      <action android:name=\"com.nareshkushmi.nkplayer.PREV\" />
                      <action android:name=\"com.nareshkushmi.nkplayer.PLAY_PAUSE\" />
                      <action android:name=\"com.nareshkushmi.nkplayer.NEXT\" />
                      <action android:name=\"com.nareshkushmi.nkplayer.STOP\" />
                  </intent-filter>
              </receiver>\n'''
          c = c.replace('<application', perms + '    <application android:requestLegacyExternalStorage=\"true\"')
          c = c.replace('</application>', service + '    </application>')
          with open(path, 'w') as f: f.write(c)
          "

          mkdir -p android/app/src/main/kotlin/com/nareshkushmi/nkplayer

          # ── MusicReceiver.kt ──────────────────────────────────────────────────
          cat <<'KT' > android/app/src/main/kotlin/com/nareshkushmi/nkplayer/MusicReceiver.kt
          package com.nareshkushmi.nkplayer
          import android.content.BroadcastReceiver
          import android.content.Context
          import android.content.Intent
          import android.os.Build

          class MusicReceiver : BroadcastReceiver() {
              override fun onReceive(context: Context, intent: Intent) {
                  val si = Intent(context, MusicService::class.java)
                  si.action = intent.action
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O)
                      context.startForegroundService(si)
                  else
                      context.startService(si)
              }
          }
          KT

          # ── MusicService.kt ───────────────────────────────────────────────────
          cat <<'KT' > android/app/src/main/kotlin/com/nareshkushmi/nkplayer/MusicService.kt
          package com.nareshkushmi.nkplayer

          import android.app.*
          import android.content.Intent
          import android.media.AudioAttributes
          import android.media.AudioFocusRequest
          import android.media.AudioManager
          import android.media.MediaPlayer
          import android.media.session.MediaSession
          import android.media.session.PlaybackState
          import android.os.Build
          import android.os.IBinder

          class MusicService : Service() {

              companion object {
                  const val CHANNEL_ID        = "nkplayer_ch"
                  const val NOTIF_ID          = 1
                  const val ACTION_PREV       = "com.nareshkushmi.nkplayer.PREV"
                  const val ACTION_PLAY_PAUSE = "com.nareshkushmi.nkplayer.PLAY_PAUSE"
                  const val ACTION_NEXT       = "com.nareshkushmi.nkplayer.NEXT"
                  const val ACTION_STOP       = "com.nareshkushmi.nkplayer.STOP"
                  const val ACTION_UPDATE     = "com.nareshkushmi.nkplayer.UPDATE"
                  const val EXTRA_PATHS       = "paths"
                  const val EXTRA_TITLES      = "titles"
                  const val EXTRA_ARTISTS     = "artists"
                  const val EXTRA_INDEX       = "index"

                  var currentIndex: Int = 0
                  var playing: Boolean = false
                  var onSongChanged: ((Int, Boolean) -> Unit)? = null
                  var onPosition: ((Int, Int) -> Unit)? = null
              }

              private var mp: MediaPlayer? = null
              private var mediaSession: MediaSession? = null
              private var paths:   ArrayList<String> = arrayListOf()
              private var titles:  ArrayList<String> = arrayListOf()
              private var artists: ArrayList<String> = arrayListOf()
              private var title  = "NKPlayer"
              private var artist = "Unknown"
              private var isDucked = false

              private lateinit var audioManager: AudioManager
              private var focusRequest: AudioFocusRequest? = null

              // Audio focus listener — handles ducking for screen reader
              private val focusListener = AudioManager.OnAudioFocusChangeListener { focusChange ->
                  when (focusChange) {
                      AudioManager.AUDIOFOCUS_LOSS_TRANSIENT_CAN_DUCK -> {
                          // Screen reader speaking — lower volume to 20%
                          mp?.setVolume(0.2f, 0.2f)
                          isDucked = true
                      }
                      AudioManager.AUDIOFOCUS_GAIN -> {
                          // Screen reader done — restore full volume
                          mp?.setVolume(1.0f, 1.0f)
                          isDucked = false
                      }
                      AudioManager.AUDIOFOCUS_LOSS_TRANSIENT -> {
                          // Another app needs audio briefly — pause
                          if (mp?.isPlaying == true) togglePause()
                      }
                      AudioManager.AUDIOFOCUS_LOSS -> {
                          // Another app took audio permanently — pause
                          if (mp?.isPlaying == true) togglePause()
                      }
                  }
              }

              override fun onBind(intent: Intent?): IBinder? = null

              override fun onCreate() {
                  super.onCreate()
                  createChannel()
                  audioManager = getSystemService(AUDIO_SERVICE) as AudioManager
                  requestAudioFocus()
                  mediaSession = MediaSession(this, "NKPlayer").apply {
                      setCallback(object : MediaSession.Callback() {
                          override fun onPlay()         { if (mp?.isPlaying == false) togglePause() }
                          override fun onPause()        { if (mp?.isPlaying == true)  togglePause() }
                          override fun onSkipToNext()   { if (currentIndex < paths.size - 1) { currentIndex++; playTrack() } }
                          override fun onSkipToPrevious() { if (currentIndex > 0) { currentIndex--; playTrack() } }
                          override fun onStop()         { stopAll() }
                      })
                      isActive = true
                  }
              }

              override fun onStartCommand(intent: Intent?, flags: Int, startId: Int): Int {
                  when (intent?.action) {
                      ACTION_STOP -> { stopAll(); return START_NOT_STICKY }
                      ACTION_PREV -> { if (currentIndex > 0) { currentIndex--; playTrack() } }
                      ACTION_PLAY_PAUSE -> { togglePause() }
                      ACTION_NEXT -> { if (currentIndex < paths.size - 1) { currentIndex++; playTrack() } }
                      "com.nareshkushmi.nkplayer.SEEK" -> {
                          val ms = intent?.getIntExtra("seek_ms", 0) ?: 0
                          mp?.seekTo(ms)
                      }
                      "com.nareshkushmi.nkplayer.SPEED" -> {
                          val speed = intent?.getFloatExtra("speed", 1.0f) ?: 1.0f
                          if (android.os.Build.VERSION.SDK_INT >= android.os.Build.VERSION_CODES.M) {
                              mp?.playbackParams = mp?.playbackParams?.setSpeed(speed) ?: return START_STICKY
                          }
                      }
                      else -> {
                          val p = intent?.getStringArrayListExtra(EXTRA_PATHS)
                          if (p != null && p.isNotEmpty()) {
                              paths   = p
                              titles  = intent.getStringArrayListExtra(EXTRA_TITLES)  ?: arrayListOf()
                              artists = intent.getStringArrayListExtra(EXTRA_ARTISTS) ?: arrayListOf()
                              currentIndex = intent.getIntExtra(EXTRA_INDEX, 0)
                              playTrack()
                          }
                      }
                  }
                  return START_STICKY
              }

              private fun playTrack() {
                  mp?.release(); mp = null
                  title  = titles.getOrElse(currentIndex)  { "Unknown" }
                  artist = artists.getOrElse(currentIndex) { "Unknown" }
                  try {
                      mp = MediaPlayer().apply {
                          setDataSource(paths[currentIndex])
                          prepare()
                          start()
                          setOnCompletionListener {
                              if (currentIndex < paths.size - 1) { currentIndex++; playTrack() }
                              else { playing = false; updateMediaSession(false); updateNotif() }
                          }
                      }
                      playing = true
                      updateMediaSession(true)
                      onSongChanged?.invoke(currentIndex, true)
                      startForeground(NOTIF_ID, buildNotif())
                      startPositionUpdater()
                  } catch (e: Exception) { e.printStackTrace() }
              }

              private val handler = android.os.Handler(android.os.Looper.getMainLooper())
              private val positionRunnable = object : Runnable {
                  override fun run() {
                      mp?.let { m ->
                          if (m.isPlaying) {
                              onPosition?.invoke(m.currentPosition, m.duration)
                          }
                      }
                      handler.postDelayed(this, 500)
                  }
              }

              private fun startPositionUpdater() {
                  handler.removeCallbacks(positionRunnable)
                  handler.post(positionRunnable)
              }

              private fun togglePause() {
                  val m = mp ?: return
                  if (m.isPlaying) { m.pause(); playing = false }
                  else             { m.start(); playing = true  }
                  updateMediaSession(playing)
                  onSongChanged?.invoke(currentIndex, playing)
                  updateNotif()
              }

              private fun requestAudioFocus() {
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
                      val attrs = AudioAttributes.Builder()
                          .setUsage(AudioAttributes.USAGE_MEDIA)
                          .setContentType(AudioAttributes.CONTENT_TYPE_MUSIC)
                          .build()
                      focusRequest = AudioFocusRequest.Builder(AudioManager.AUDIOFOCUS_GAIN)
                          .setAudioAttributes(attrs)
                          .setWillPauseWhenDucked(false)   // we handle ducking manually
                          .setOnAudioFocusChangeListener(focusListener)
                          .build()
                      audioManager.requestAudioFocus(focusRequest!!)
                  } else {
                      @Suppress("DEPRECATION")
                      audioManager.requestAudioFocus(
                          focusListener,
                          AudioManager.STREAM_MUSIC,
                          AudioManager.AUDIOFOCUS_GAIN
                      )
                  }
              }

              private fun abandonAudioFocus() {
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
                      focusRequest?.let { audioManager.abandonAudioFocusRequest(it) }
                  } else {
                      @Suppress("DEPRECATION")
                      audioManager.abandonAudioFocus(focusListener)
                  }
              }

              private fun stopAll() {
                  handler.removeCallbacks(positionRunnable)
                  abandonAudioFocus()
                  mp?.apply { if (isPlaying) stop(); release() }; mp = null
                  playing = false
                  stopForeground(true)
                  stopSelf()
              }

              private fun updateMediaSession(isPlaying: Boolean) {
                  val state = if (isPlaying) PlaybackState.STATE_PLAYING
                              else          PlaybackState.STATE_PAUSED
                  val ps = PlaybackState.Builder()
                      .setActions(
                          PlaybackState.ACTION_PLAY or
                          PlaybackState.ACTION_PAUSE or
                          PlaybackState.ACTION_SKIP_TO_NEXT or
                          PlaybackState.ACTION_SKIP_TO_PREVIOUS or
                          PlaybackState.ACTION_STOP
                      )
                      .setState(state, PlaybackState.PLAYBACK_POSITION_UNKNOWN, 1f)
                      .build()
                  mediaSession?.setPlaybackState(ps)
              }

              private fun updateNotif() {
                  val nm = getSystemService(NOTIFICATION_SERVICE) as NotificationManager
                  nm.notify(NOTIF_ID, buildNotif())
              }

              private fun pi(req: Int, action: String) = PendingIntent.getBroadcast(
                  this, req,
                  Intent(action).setPackage(packageName),
                  PendingIntent.FLAG_IMMUTABLE or PendingIntent.FLAG_UPDATE_CURRENT
              )

              private fun buildNotif(): Notification {
                  val playIcon = if (playing) android.R.drawable.ic_media_pause
                                 else         android.R.drawable.ic_media_play
                  val playLabel = if (playing) "Pause" else "Play"

                  val builder = Notification.Builder(this, CHANNEL_ID)
                      .setContentTitle(title)
                      .setContentText(artist)
                      .setSmallIcon(android.R.drawable.ic_media_play)
                      .setOngoing(playing)
                      .setVisibility(Notification.VISIBILITY_PUBLIC)
                      .addAction(Notification.Action.Builder(
                          android.R.drawable.ic_media_previous, "Prev", pi(0, ACTION_PREV)).build())
                      .addAction(Notification.Action.Builder(
                          playIcon, playLabel, pi(1, ACTION_PLAY_PAUSE)).build())
                      .addAction(Notification.Action.Builder(
                          android.R.drawable.ic_media_next, "Next", pi(2, ACTION_NEXT)).build())
                      .addAction(Notification.Action.Builder(
                          android.R.drawable.ic_delete, "Stop", pi(3, ACTION_STOP)).build())

                  val style = Notification.MediaStyle()
                      .setShowActionsInCompactView(0, 1, 2)
                  mediaSession?.sessionToken?.let { style.setMediaSession(it) }
                  builder.setStyle(style)

                  return builder.build()
              }

              private fun createChannel() {
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
                      val ch = NotificationChannel(CHANNEL_ID, "NKPlayer",
                          NotificationManager.IMPORTANCE_LOW).apply { setSound(null, null) }
                      (getSystemService(NOTIFICATION_SERVICE) as NotificationManager)
                          .createNotificationChannel(ch)
                  }
              }

              override fun onTaskRemoved(rootIntent: Intent?) {
                  // App swiped from recents:
                  // - If paused → remove notification and stop service
                  // - If playing → keep going in background
                  if (!playing) {
                      stopForeground(true)
                      stopSelf()
                  }
              }

              override fun onDestroy() {
                  handler.removeCallbacks(positionRunnable)
                  abandonAudioFocus()
                  mp?.release(); mp = null
                  mediaSession?.isActive = false
                  mediaSession?.release()
                  mediaSession = null
                  super.onDestroy()
              }
          }
          KT

          # ── MainActivity.kt ───────────────────────────────────────────────────
          cat <<'KT' > android/app/src/main/kotlin/com/nareshkushmi/nkplayer/MainActivity.kt
          package com.nareshkushmi.nkplayer

          import android.content.Intent
          import android.os.Build
          import io.flutter.embedding.android.FlutterActivity
          import io.flutter.embedding.engine.FlutterEngine
          import io.flutter.plugin.common.MethodChannel

          class MainActivity : FlutterActivity() {
              private val CH = "com.nareshkushmi.nkplayer/music"

              override fun configureFlutterEngine(fe: FlutterEngine) {
                  super.configureFlutterEngine(fe)
                  val ch = MethodChannel(fe.dartExecutor.binaryMessenger, CH)

                  MusicService.onSongChanged = { idx, isPlaying ->
                      runOnUiThread {
                          ch.invokeMethod("onSongChanged",
                              mapOf("index" to idx, "isPlaying" to isPlaying))
                      }
                  }

                  MusicService.onPosition = { pos, dur ->
                      runOnUiThread {
                          ch.invokeMethod("onPosition", mapOf("ms" to pos))
                          ch.invokeMethod("onDuration", mapOf("ms" to dur))
                      }
                  }

                  ch.setMethodCallHandler { call, result ->
                      when (call.method) {
                          "start" -> {
                              val i = Intent(this, MusicService::class.java).apply {
                                  action = MusicService.ACTION_UPDATE
                                  putStringArrayListExtra(MusicService.EXTRA_PATHS,
                                      ArrayList(call.argument<List<String>>("paths") ?: emptyList()))
                                  putStringArrayListExtra(MusicService.EXTRA_TITLES,
                                      ArrayList(call.argument<List<String>>("titles") ?: emptyList()))
                                  putStringArrayListExtra(MusicService.EXTRA_ARTISTS,
                                      ArrayList(call.argument<List<String>>("artists") ?: emptyList()))
                                  putExtra(MusicService.EXTRA_INDEX, call.argument<Int>("index") ?: 0)
                              }
                              if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O)
                                  startForegroundService(i)
                              else startService(i)
                              result.success(null)
                          }
                          "stop" -> {
                              startService(Intent(this, MusicService::class.java).apply {
                                  action = MusicService.ACTION_STOP })
                              result.success(null)
                          }
                          "togglePlayPause" -> {
                              startService(Intent(this, MusicService::class.java).apply {
                                  action = MusicService.ACTION_PLAY_PAUSE })
                              result.success(null)
                          }
                          "seek" -> {
                              val ms = call.argument<Int>("ms") ?: 0
                              startService(Intent(this, MusicService::class.java).apply {
                                  action = "com.nareshkushmi.nkplayer.SEEK"
                                  putExtra("seek_ms", ms)
                              })
                              result.success(null)
                          }
                          "setSpeed" -> {
                              val speed = (call.argument<Double>("speed") ?: 1.0).toFloat()
                              startService(Intent(this, MusicService::class.java).apply {
                                  action = "com.nareshkushmi.nkplayer.SPEED"
                                  putExtra("speed", speed)
                              })
                              result.success(null)
                          }
                          else -> result.notImplemented()
                      }
                  }
              }
          }
          KT

          # ── lib/main.dart ─────────────────────────────────────────────────────
          cat <<'DART' > lib/main.dart
          import 'dart:io';
          import 'package:flutter/material.dart';
          import 'package:flutter/services.dart';
          import 'package:on_audio_query/on_audio_query.dart';
          import 'package:permission_handler/permission_handler.dart';
          import 'package:google_fonts/google_fonts.dart';
          import 'package:device_info_plus/device_info_plus.dart';

          const _ch = MethodChannel('com.nareshkushmi.nkplayer/music');

          Future<void> startMusic(List<SongModel> songs, int index) async {
            try {
              await _ch.invokeMethod('start', {
                'paths':   songs.map((s) => s.data).toList(),
                'titles':  songs.map((s) => s.title).toList(),
                'artists': songs.map((s) => s.artist ?? 'Unknown').toList(),
                'index':   index,
              });
            } catch (e) { debugPrint('startMusic: $e'); }
          }

          Future<void> stopMusic() async {
            try { await _ch.invokeMethod('stop'); } catch (_) {}
          }

          Future<void> togglePlayPause() async {
            try { await _ch.invokeMethod('togglePlayPause'); } catch (_) {}
          }

          Future<void> setPlaybackSpeed(double speed) async {
            try { await _ch.invokeMethod('setSpeed', {'speed': speed}); } catch (_) {}
          }

          void main() {
            WidgetsFlutterBinding.ensureInitialized();
            runApp(const NKPlayerApp());
          }

          class NKPlayerApp extends StatelessWidget {
            const NKPlayerApp({super.key});
            @override
            Widget build(BuildContext context) => MaterialApp(
                  title: 'NKPlayer',
                  debugShowCheckedModeBanner: false,
                  theme: ThemeData.dark().copyWith(
                    primaryColor: Colors.blueAccent,
                    scaffoldBackgroundColor: const Color(0xFF0F0F0F),
                  ),
                  home: const PermissionHandlerScreen(),
                );
          }

          class PermissionHandlerScreen extends StatefulWidget {
            const PermissionHandlerScreen({super.key});
            @override
            State<PermissionHandlerScreen> createState() =>
                _PermissionHandlerScreenState();
          }

          class _PermissionHandlerScreenState
              extends State<PermissionHandlerScreen> {
            @override
            void initState() { super.initState(); _check(); }

            Future<void> _check() async {
              if (Platform.isAndroid) {
                final sdk = (await DeviceInfoPlugin().androidInfo).version.sdkInt;
                if (sdk >= 30) {
                  await Permission.manageExternalStorage.request();
                  if (sdk >= 33) {
                    await Permission.audio.request();
                    await Permission.notification.request();
                  }
                } else {
                  await Permission.storage.request();
                }
              }
              if (mounted) Navigator.pushReplacement(context,
                  MaterialPageRoute(builder: (_) => const FolderListScreen()));
            }

            @override
            Widget build(BuildContext context) =>
                const Scaffold(body: Center(child: CircularProgressIndicator()));
          }

          class CustomFolder {
            final String name;
            final List<SongModel> songs;
            CustomFolder({required this.name, required this.songs});
          }

          class FolderListScreen extends StatefulWidget {
            const FolderListScreen({super.key});
            @override
            State<FolderListScreen> createState() => _FolderListScreenState();
          }

          class _FolderListScreenState extends State<FolderListScreen> {
            final _sc = TextEditingController();
            final _focus = FocusNode();
            bool _searching = false;
            List<CustomFolder> _folders = [];
            List<SongModel> _all = [], _filtered = [];
            bool _loading = true;

            @override
            void initState() {
              super.initState();
              _load();
              _sc.addListener(() => setState(() {
                    _filtered = _all.where((s) => s.title.toLowerCase()
                        .contains(_sc.text.toLowerCase())).toList();
                  }));
            }

            @override
            void dispose() {
              _sc.dispose();
              _focus.dispose();
              super.dispose();
            }

            // Back press: 1st → close keyboard, 2nd → close search
            bool _handleBack() {
              if (_searching) {
                if (_focus.hasFocus) {
                  _focus.unfocus();
                  return true;
                }
                setState(() { _searching = false; _sc.clear(); });
                return true;
              }
              return false;
            }

            Future<void> _load() async {
              final songs = await OnAudioQuery().querySongs();
              final Map<String, List<SongModel>> map = {};
              for (var s in songs) {
                if (s.data.isEmpty) continue;
                map.putIfAbsent(File(s.data).parent.path, () => []).add(s);
              }
              setState(() {
                _all = songs;
                _folders = map.entries.map((e) =>
                    CustomFolder(name: e.key.split('/').last, songs: e.value)).toList();
                _loading = false;
              });
            }

            @override
            Widget build(BuildContext context) => PopScope(
                  canPop: !_searching,
                  onPopInvoked: (didPop) { if (!didPop) _handleBack(); },
                  child: Scaffold(
                  appBar: AppBar(
                    title: _searching
                        ? TextField(
                            controller: _sc,
                            focusNode: _focus,
                            autofocus: true,
                            decoration: InputDecoration(
                              hintText: 'Search songs...',
                              border: InputBorder.none,
                              suffixIcon: _sc.text.isNotEmpty
                                  ? Semantics(
                                      label: 'clear search button',
                                      button: true,
                                      container: true,
                                      excludeSemantics: true,
                                      child: IconButton(
                                        icon: const Icon(Icons.clear),
                                        onPressed: () => _sc.clear(),
                                      ),
                                    )
                                  : null,
                            ),
                          )
                        : Text('Folders', style: GoogleFonts.poppins()),
                    actions: [
                      if (!_searching)
                        Semantics(
                          label: 'search button',
                          button: true,
                          excludeSemantics: true,
                          child: IconButton(
                            icon: const Icon(Icons.search),
                            onPressed: () => setState(() => _searching = true),
                          ),
                        ),
                    ],
                  ),
                  body: _loading
                      ? const Center(child: CircularProgressIndicator())
                      : _searching
                          ? ListView.builder(
                              itemCount: _filtered.length,
                              itemBuilder: (_, i) => ListTile(
                                leading: const Icon(Icons.music_note,
                                    color: Colors.blueAccent),
                                title: Text(_filtered[i].title, maxLines: 1),
                                onTap: () => Navigator.push(context, MaterialPageRoute(
                                    builder: (_) => PlayerScreen(
                                        songs: _filtered, initialIndex: i))),
                              ))
                          : ListView.builder(
                              itemCount: _folders.length,
                              itemBuilder: (_, i) {
                                final f = _folders[i];
                                return ListTile(
                                  leading: const Icon(Icons.folder,
                                      color: Colors.amber),
                                  title: Text(f.name),
                                  subtitle: Text('${f.songs.length} files'),
                                  onTap: () => Navigator.push(context,
                                      MaterialPageRoute(builder: (_) =>
                                          SongListScreen(folder: f))),
                                );
                              }),
                ));
          }

          class SongListScreen extends StatefulWidget {
            final CustomFolder folder;
            const SongListScreen({super.key, required this.folder});
            @override
            State<SongListScreen> createState() => _SongListScreenState();
          }

          class _SongListScreenState extends State<SongListScreen> {
            final _sc = TextEditingController();
            final _focus = FocusNode();
            final Set<int> _sel = {};
            bool _isSel = false;
            List<SongModel> _filtered = [];

            @override
            void initState() {
              super.initState();
              _filtered = widget.folder.songs;
              _sc.addListener(() => setState(() {
                    _filtered = widget.folder.songs.where((s) => s.title
                        .toLowerCase().contains(_sc.text.toLowerCase())).toList();
                  }));
            }

            @override
            void dispose() {
              _sc.dispose();
              _focus.dispose();
              super.dispose();
            }

            bool _handleBack() {
              if (_isSel) {
                setState(() { _sel.clear(); _isSel = false; });
                return true;
              }
              if (_focus.hasFocus) {
                _focus.unfocus();
                return true;
              }
              if (_sc.text.isNotEmpty) {
                _sc.clear();
                return true;
              }
              return false;
            }

            @override
            Widget build(BuildContext context) => PopScope(
                  canPop: !_isSel && !_focus.hasFocus && _sc.text.isEmpty,
                  onPopInvoked: (didPop) { if (!didPop) _handleBack(); },
                  child: Scaffold(
                  appBar: AppBar(
                    leading: _isSel
                        ? Semantics(
                            label: 'close selection button',
                            button: true,
                            excludeSemantics: true,
                            child: IconButton(
                                icon: const Icon(Icons.close),
                                onPressed: () =>
                                    setState(() { _sel.clear(); _isSel = false; })))
                        : null,
                    title: _isSel
                        ? Text('${_sel.length} Selected')
                        : TextField(
                            controller: _sc,
                            focusNode: _focus,
                            decoration: InputDecoration(
                              hintText: 'Search in folder...',
                              border: InputBorder.none,
                              suffixIcon: _sc.text.isNotEmpty
                                  ? Semantics(
                                      label: 'clear search button',
                                      button: true,
                                      container: true,
                                      excludeSemantics: true,
                                      child: IconButton(
                                        icon: const Icon(Icons.clear),
                                        onPressed: () => _sc.clear(),
                                      ),
                                    )
                                  : null,
                            ),
                          ),
                    actions: _isSel
                        ? [
                            Semantics(
                              label: 'select all button',
                              button: true,
                              excludeSemantics: true,
                              child: IconButton(
                                icon: const Icon(Icons.select_all),
                                onPressed: () => setState(() =>
                                    _sel.addAll(Iterable.generate(_filtered.length))),
                              ),
                            ),
                            Semantics(
                              label: 'play selected songs button',
                              button: true,
                              excludeSemantics: true,
                              child: IconButton(
                                icon: const Icon(Icons.play_circle),
                                onPressed: () => Navigator.push(context,
                                    MaterialPageRoute(builder: (_) => PlayerScreen(
                                        songs: _sel.map((i) => _filtered[i]).toList(),
                                        initialIndex: 0))),
                              ),
                            ),
                          ]
                        : null,
                  ),
                  body: ListView.builder(
                    itemCount: _filtered.length,
                    itemBuilder: (_, i) {
                      final isS = _sel.contains(i);
                      return ListTile(
                        tileColor: isS ? Colors.blueAccent.withOpacity(0.1) : null,
                        leading: Icon(isS ? Icons.check_circle : Icons.music_note,
                            color: i % 2 == 0 ? Colors.blueAccent : Colors.grey),
                        title: Text(_filtered[i].title, maxLines: 1),
                        onLongPress: () =>
                            setState(() { _sel.add(i); _isSel = true; }),
                        onTap: () {
                          if (_isSel) {
                            setState(() {
                              if (isS) _sel.remove(i); else _sel.add(i);
                              _isSel = _sel.isNotEmpty;
                            });
                          } else {
                            Navigator.push(context, MaterialPageRoute(
                                builder: (_) => PlayerScreen(
                                    songs: _filtered, initialIndex: i)));
                          }
                        },
                      );
                    },
                  ),
                ));
          }

          class PlayerScreen extends StatefulWidget {
            final List<SongModel> songs;
            final int initialIndex;
            const PlayerScreen(
                {super.key, required this.songs, required this.initialIndex});
            @override
            State<PlayerScreen> createState() => _PlayerScreenState();
          }

          class _PlayerScreenState extends State<PlayerScreen> {
            late int _idx;
            bool _playing = true;
            Duration _pos = Duration.zero;
            Duration _dur = Duration.zero;
            double _speed = 1.0;

            @override
            void initState() {
              super.initState();
              _idx = widget.initialIndex;
              startMusic(widget.songs, _idx);
              _ch.setMethodCallHandler((call) async {
                if (!mounted) return;
                if (call.method == 'onSongChanged') {
                  setState(() {
                    _idx     = call.arguments['index']     as int;
                    _playing = call.arguments['isPlaying'] as bool;
                    _pos = Duration.zero;
                  });
                } else if (call.method == 'onPosition') {
                  setState(() {
                    _pos = Duration(milliseconds: call.arguments['ms'] as int);
                  });
                } else if (call.method == 'onDuration') {
                  setState(() {
                    _dur = Duration(milliseconds: call.arguments['ms'] as int);
                  });
                }
              });
            }

            String _fmt(Duration d) {
              final m = d.inMinutes.remainder(60).toString().padLeft(2, '0');
              final s = d.inSeconds.remainder(60).toString().padLeft(2, '0');
              return m + ':' + s;
            }

            void _showSpeedSheet() {
              // slider: 0.0–1.0 maps to 0.5x–2x, default 0.5 = 1x
              double pendingSpeed = _speed;
              showModalBottomSheet(
                context: context,
                backgroundColor: const Color(0xFF1E1E1E),
                shape: const RoundedRectangleBorder(
                  borderRadius: BorderRadius.vertical(top: Radius.circular(20)),
                ),
                builder: (ctx) => StatefulBuilder(
                  builder: (ctx, setSheetState) {
                    // Convert speed (0.5–2.0) to slider value (0.0–1.0)
                    final sliderVal = (pendingSpeed - 0.5) / 1.5;
                    final pct = (sliderVal * 100).round();
                    final speedLabel = pendingSpeed.toStringAsFixed(2) + 'x';
                    return Padding(
                      padding: const EdgeInsets.fromLTRB(24, 20, 24, 32),
                      child: Column(
                        mainAxisSize: MainAxisSize.min,
                        children: [
                          // Title
                          Text('Playback Speed',
                              style: GoogleFonts.poppins(
                                  fontSize: 18, fontWeight: FontWeight.bold,
                                  color: Colors.white)),
                          const SizedBox(height: 4),
                          // Current speed label
                          Text(speedLabel,
                              style: TextStyle(
                                  fontSize: 28, fontWeight: FontWeight.bold,
                                  color: Colors.blueAccent)),
                          const SizedBox(height: 8),
                          // Slow / Fast labels
                          Row(
                            mainAxisAlignment: MainAxisAlignment.spaceBetween,
                            children: const [
                              Text('0.5x Slow', style: TextStyle(color: Colors.grey, fontSize: 12)),
                              Text('2x Fast',   style: TextStyle(color: Colors.grey, fontSize: 12)),
                            ],
                          ),
                          // Slider — 50% = 1x
                          Semantics(
                            label: 'playback speed slider',
                            slider: true,
                            value: pct.toString() + '%',
                            child: Slider(
                              value: sliderVal,
                              min: 0.0,
                              max: 1.0,
                              divisions: 30,
                              semanticFormatterCallback: (v) {
                                final p = (v * 100).round();
                                return p.toString() + '%';
                              },
                              onChanged: (v) {
                                setSheetState(() {
                                  pendingSpeed = 0.5 + v * 1.5;
                                });
                              },
                            ),
                          ),
                          const SizedBox(height: 16),
                          // Apply / Cancel buttons
                          Row(
                            children: [
                              Expanded(
                                child: Semantics(
                                  label: 'cancel button',
                                  button: true,
                                  excludeSemantics: true,
                                  child: OutlinedButton(
                                    onPressed: () => Navigator.pop(ctx),
                                    child: const Text('Cancel',
                                        style: TextStyle(color: Colors.grey)),
                                  ),
                                ),
                              ),
                              const SizedBox(width: 16),
                              Expanded(
                                child: Semantics(
                                  label: 'apply button',
                                  button: true,
                                  excludeSemantics: true,
                                  child: ElevatedButton(
                                    style: ElevatedButton.styleFrom(
                                        backgroundColor: Colors.blueAccent),
                                    onPressed: () async {
                                      setState(() => _speed = pendingSpeed);
                                      await setPlaybackSpeed(pendingSpeed);
                                      if (ctx.mounted) Navigator.pop(ctx);
                                    },
                                    child: const Text('Apply',
                                        style: TextStyle(color: Colors.white)),
                                  ),
                                ),
                              ),
                            ],
                          ),
                        ],
                      ),
                    );
                  },
                ),
              );
            }

            @override
            Widget build(BuildContext context) {
              final song = widget.songs[_idx];
              final maxSec = _dur.inSeconds.toDouble() > 0 ? _dur.inSeconds.toDouble() : 1.0;
              final curSec = _pos.inSeconds.toDouble().clamp(0.0, maxSec);
              return Scaffold(
                appBar: AppBar(
                  title: const Text('Now Playing'),
                  actions: [
                    Semantics(
                      label: 'more options button',
                      button: true,
                      excludeSemantics: true,
                      child: PopupMenuButton<String>(
                        icon: const Icon(Icons.more_vert),
                        tooltip: 'More options',
                        onSelected: (value) {
                          if (value == 'speed') _showSpeedSheet();
                        },
                        itemBuilder: (ctx) => [
                          const PopupMenuItem(
                            value: 'speed',
                            child: Row(
                              children: [
                                Icon(Icons.speed, color: Colors.blueAccent),
                                SizedBox(width: 12),
                                Text('Playback Speed'),
                              ],
                            ),
                          ),
                        ],
                      ),
                    ),
                  ],
                ),
                body: Column(
                  children: [
                    const Spacer(),
                    const Icon(Icons.music_note, size: 100, color: Colors.blueAccent),
                    const SizedBox(height: 24),
                    Padding(
                      padding: const EdgeInsets.symmetric(horizontal: 16),
                      child: Text(song.title,
                          textAlign: TextAlign.center,
                          maxLines: 2,
                          style: GoogleFonts.poppins(
                              fontSize: 18, fontWeight: FontWeight.bold)),
                    ),
                    const SizedBox(height: 8),
                    Text(song.artist ?? 'Unknown Artist',
                        style: const TextStyle(color: Colors.grey, fontSize: 14)),
                    const Spacer(),
                    // ── Slider ───────────────────────────────────────────
                    Slider(
                      value: curSec,
                      max: maxSec,
                      semanticFormatterCallback: (v) {
                        final pct = maxSec > 0 ? (v / maxSec * 100).round() : 0;
                        return pct.toString() + '%';
                      },
                      onChanged: (v) {
                        setState(() => _pos = Duration(seconds: v.toInt()));
                      },
                      onChangeEnd: (v) async {
                        try {
                          await _ch.invokeMethod('seek', {'ms': (v * 1000).toInt()});
                        } catch (_) {}
                      },
                    ),
                    Padding(
                      padding: const EdgeInsets.symmetric(horizontal: 20),
                      child: Row(
                        mainAxisAlignment: MainAxisAlignment.spaceBetween,
                        children: [
                          Text(_fmt(_pos),
                              style: const TextStyle(color: Colors.grey, fontSize: 12)),
                          Text(_fmt(_dur),
                              style: const TextStyle(color: Colors.grey, fontSize: 12)),
                        ],
                      ),
                    ),
                    const SizedBox(height: 20),
                    // ── Controls ─────────────────────────────────────────
                    Row(
                      mainAxisAlignment: MainAxisAlignment.spaceEvenly,
                      children: [
                        Semantics(
                          label: 'previous song button',
                          button: true,
                          excludeSemantics: true,
                          child: IconButton(
                            icon: const Icon(Icons.skip_previous, size: 45),
                            onPressed: _idx > 0
                                ? () => startMusic(widget.songs, _idx - 1)
                                : null,
                          ),
                        ),
                        Semantics(
                          label: _playing ? 'pause button' : 'play button',
                          button: true,
                          excludeSemantics: true,
                          child: FloatingActionButton.large(
                            backgroundColor: Colors.blueAccent,
                            onPressed: () => togglePlayPause(),
                            child: Icon(
                                _playing ? Icons.pause : Icons.play_arrow,
                                size: 50),
                          ),
                        ),
                        Semantics(
                          label: 'next song button',
                          button: true,
                          excludeSemantics: true,
                          child: IconButton(
                            icon: const Icon(Icons.skip_next, size: 45),
                            onPressed: _idx < widget.songs.length - 1
                                ? () => startMusic(widget.songs, _idx + 1)
                                : null,
                          ),
                        ),
                      ],
                    ),
                    const SizedBox(height: 40),
                  ],
                ),
              );
            }
          }
          DART

      - name: Build APK
        run: |
          flutter pub get
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: NKPlayer-v1.0.80
          path: build/app/outputs/flutter-apk/app-release.apk
