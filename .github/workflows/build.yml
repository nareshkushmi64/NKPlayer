name: NKPlayer - Background Playback (v1.0.52)
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'

      - name: Generate NKPlayer Project
        run: |
          flutter create --org com.nareshkushmi --project-name nkplayer .

          sed -i 's/android:label="nkplayer"/android:label="NKPlayer"/' android/app/src/main/AndroidManifest.xml
          sed -i 's/targetSdkVersion .*/targetSdkVersion 36/' android/app/build.gradle || true
          sed -i 's/minSdkVersion .*/minSdkVersion 21/' android/app/build.gradle || true

          sed -i "s/ext.kotlin_version = .*/ext.kotlin_version = '1.8.22'/" android/build.gradle || true

          # Add androidx.media + fix stdlib conflict
          python3 -c "
          path = 'android/app/build.gradle'
          with open(path, 'r') as f: c = f.read()
          dep = \"    implementation 'androidx.media:media:1.7.0'\\n    implementation 'androidx.core:core-ktx:1.12.0'\\n\"
          c = c.replace('dependencies {', 'dependencies {\\n' + dep)
          with open(path, 'w') as f: f.write(c)
          rp = 'android/build.gradle'
          with open(rp, 'r') as f: r = f.read()
          res = \"\\nsubprojects {\\n    configurations.all {\\n        resolutionStrategy {\\n            force 'org.jetbrains.kotlin:kotlin-stdlib:1.8.22'\\n            force 'org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.8.22'\\n            force 'org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.8.22'\\n        }\\n    }\\n}\\n\"
          r = r + res if 'resolutionStrategy' not in r else r
          with open(rp, 'w') as f: f.write(r)
          "

          # ── pubspec.yaml ──────────────────────────────────────────────────────
          cat <<'PUBSPEC' > pubspec.yaml
          name: nkplayer
          description: NKPlayer Pro - Accessible Media Player with Background Playback.
          version: 1.0.52+53
          publish_to: 'none'
          environment:
            sdk: '>=3.0.0 <4.0.0'
          dependencies:
            flutter:
              sdk: flutter

            on_audio_query: ^2.9.0
            permission_handler: ^11.3.0
            google_fonts: ^6.1.0
            device_info_plus: ^10.1.0
          flutter:
            uses-material-design: true
          PUBSPEC

          # ── AndroidManifest.xml ───────────────────────────────────────────────
          python3 -c "
          path = 'android/app/src/main/AndroidManifest.xml'
          with open(path, 'r') as f:
              content = f.read()

          perms = '''    <uses-permission android:name=\"android.permission.WRITE_EXTERNAL_STORAGE\"/>
              <uses-permission android:name=\"android.permission.READ_EXTERNAL_STORAGE\"/>
              <uses-permission android:name=\"android.permission.MANAGE_EXTERNAL_STORAGE\"/>
              <uses-permission android:name=\"android.permission.READ_MEDIA_AUDIO\" />
              <uses-permission android:name=\"android.permission.POST_NOTIFICATIONS\" />
              <uses-permission android:name=\"android.permission.FOREGROUND_SERVICE\" />
              <uses-permission android:name=\"android.permission.FOREGROUND_SERVICE_MEDIA_PLAYBACK\" />\n'''

          service = '''
              <service
                  android:name=\".MusicService\"
                  android:foregroundServiceType=\"mediaPlayback\"
                  android:stopWithTask=\"false\"
                  android:exported=\"false\" />\n
              <receiver android:name=\".MusicReceiver\" android:exported=\"false\">
                  <intent-filter>
                      <action android:name=\"com.nareshkushmi.nkplayer.PREV\" />
                      <action android:name=\"com.nareshkushmi.nkplayer.PLAY_PAUSE\" />
                      <action android:name=\"com.nareshkushmi.nkplayer.NEXT\" />
                      <action android:name=\"com.nareshkushmi.nkplayer.STOP\" />
                  </intent-filter>
              </receiver>\n'''

          content = content.replace('<application', perms + '    <application android:requestLegacyExternalStorage=\"true\"')
          content = content.replace('</application>', service + '    </application>')
          with open(path, 'w') as f:
              f.write(content)
          "

          mkdir -p android/app/src/main/kotlin/com/nareshkushmi/nkplayer

          # ── MusicReceiver.kt ──────────────────────────────────────────────────
          cat <<'KT' > android/app/src/main/kotlin/com/nareshkushmi/nkplayer/MusicReceiver.kt
          package com.nareshkushmi.nkplayer

          import android.content.BroadcastReceiver
          import android.content.Context
          import android.content.Intent
          import android.os.Build

          class MusicReceiver : BroadcastReceiver() {
              override fun onReceive(context: Context, intent: Intent) {
                  val serviceIntent = Intent(context, MusicService::class.java)
                  serviceIntent.action = intent.action
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
                      context.startForegroundService(serviceIntent)
                  } else {
                      context.startService(serviceIntent)
                  }
              }
          }
          KT

          # ── MusicService.kt ───────────────────────────────────────────────────
          cat <<'KT' > android/app/src/main/kotlin/com/nareshkushmi/nkplayer/MusicService.kt
          package com.nareshkushmi.nkplayer

          import android.app.*
          import android.content.Intent
          import android.media.MediaPlayer
          import android.os.Build
          import android.os.IBinder
          import android.support.v4.media.MediaMetadataCompat
          import android.support.v4.media.session.MediaSessionCompat
          import android.support.v4.media.session.PlaybackStateCompat
          import androidx.core.app.NotificationCompat
          import androidx.media.app.NotificationCompat.MediaStyle

          class MusicService : Service() {

              companion object {
                  const val CHANNEL_ID         = "nkplayer_channel"
                  const val NOTIF_ID           = 1
                  const val ACTION_PREV        = "com.nareshkushmi.nkplayer.PREV"
                  const val ACTION_PLAY_PAUSE  = "com.nareshkushmi.nkplayer.PLAY_PAUSE"
                  const val ACTION_NEXT        = "com.nareshkushmi.nkplayer.NEXT"
                  const val ACTION_STOP        = "com.nareshkushmi.nkplayer.STOP"
                  const val ACTION_UPDATE      = "com.nareshkushmi.nkplayer.UPDATE"
                  const val EXTRA_TITLE        = "title"
                  const val EXTRA_ARTIST       = "artist"
                  const val EXTRA_IS_PLAYING   = "is_playing"
                  const val EXTRA_PATHS        = "paths"
                  const val EXTRA_INDEX        = "index"

                  // Shared state so MainActivity can sync UI
                  var playlist: ArrayList<String> = arrayListOf()
                  var currentIndex: Int = 0
                  var isPlaying: Boolean = false

                  // Callback to update Flutter UI when song changes
                  var onSongChanged: ((index: Int, isPlaying: Boolean) -> Unit)? = null
              }

              private var mediaPlayer: MediaPlayer? = null
              private lateinit var mediaSession: MediaSessionCompat
              private var songTitle  = "NKPlayer"
              private var songArtist = "Unknown"
              private var songTitles: ArrayList<String> = arrayListOf()
              private var songArtists: ArrayList<String> = arrayListOf()

              override fun onBind(intent: Intent?): IBinder? = null

              override fun onCreate() {
                  super.onCreate()
                  createNotificationChannel()
                  mediaSession = MediaSessionCompat(this, "NKPlayer")
                  mediaSession.setActive(true)
              }

              override fun onStartCommand(intent: Intent?, flags: Int, startId: Int): Int {
                  when (intent?.action) {
                      ACTION_STOP -> {
                          stopPlayback()
                          stopForeground(true)
                          stopSelf()
                          return START_NOT_STICKY
                      }
                      ACTION_PREV -> {
                          if (currentIndex > 0) {
                              currentIndex--
                              playCurrentTrack()
                          }
                      }
                      ACTION_PLAY_PAUSE -> {
                          togglePlayPause()
                      }
                      ACTION_NEXT -> {
                          if (currentIndex < playlist.size - 1) {
                              currentIndex++
                              playCurrentTrack()
                          }
                      }
                      ACTION_UPDATE, null -> {
                          // New playlist from Flutter
                          val paths = intent?.getStringArrayListExtra(EXTRA_PATHS)
                          val titles = intent?.getStringArrayListExtra("titles")
                          val artists = intent?.getStringArrayListExtra("artists")
                          val index = intent?.getIntExtra(EXTRA_INDEX, 0) ?: 0
                          if (paths != null) {
                              playlist = paths
                              songTitles = titles ?: arrayListOf()
                              songArtists = artists ?: arrayListOf()
                              currentIndex = index
                              playCurrentTrack()
                          } else {
                              // Just update notification text
                              songTitle  = intent?.getStringExtra(EXTRA_TITLE)  ?: songTitle
                              songArtist = intent?.getStringExtra(EXTRA_ARTIST) ?: songArtist
                              isPlaying  = intent?.getBooleanExtra(EXTRA_IS_PLAYING, true) ?: isPlaying
                              updateNotification()
                          }
                      }
                  }
                  return START_STICKY
              }

              private fun playCurrentTrack() {
                  if (playlist.isEmpty()) return
                  stopPlayback()

                  songTitle  = if (currentIndex < songTitles.size) songTitles[currentIndex] else "Unknown"
                  songArtist = if (currentIndex < songArtists.size) songArtists[currentIndex] else "Unknown"

                  mediaPlayer = MediaPlayer().apply {
                      setDataSource(playlist[currentIndex])
                      prepare()
                      start()
                      setOnCompletionListener {
                          if (currentIndex < playlist.size - 1) {
                              currentIndex++
                              playCurrentTrack()
                          } else {
                              isPlaying = false
                              updateNotification()
                          }
                      }
                  }
                  isPlaying = true
                  MusicService.currentIndex = currentIndex
                  MusicService.isPlaying = true
                  onSongChanged?.invoke(currentIndex, true)
                  startForeground(NOTIF_ID, buildNotification())
              }

              private fun togglePlayPause() {
                  val mp = mediaPlayer ?: return
                  if (mp.isPlaying) {
                      mp.pause()
                      isPlaying = false
                  } else {
                      mp.start()
                      isPlaying = true
                  }
                  MusicService.isPlaying = isPlaying
                  onSongChanged?.invoke(currentIndex, isPlaying)
                  updateNotification()
              }

              private fun stopPlayback() {
                  mediaPlayer?.apply {
                      if (isPlaying) stop()
                      release()
                  }
                  mediaPlayer = null
                  isPlaying = false
              }

              private fun updateNotification() {
                  updateMediaSession()
                  val nm = getSystemService(NotificationManager::class.java)
                  nm.notify(NOTIF_ID, buildNotification())
              }

              private fun updateMediaSession() {
                  val metadata = MediaMetadataCompat.Builder()
                      .putString(MediaMetadataCompat.METADATA_KEY_TITLE, songTitle)
                      .putString(MediaMetadataCompat.METADATA_KEY_ARTIST, songArtist)
                      .build()
                  mediaSession.setMetadata(metadata)

                  val state = PlaybackStateCompat.Builder()
                      .setActions(
                          PlaybackStateCompat.ACTION_PLAY or
                          PlaybackStateCompat.ACTION_PAUSE or
                          PlaybackStateCompat.ACTION_SKIP_TO_NEXT or
                          PlaybackStateCompat.ACTION_SKIP_TO_PREVIOUS
                      )
                      .setState(
                          if (isPlaying) PlaybackStateCompat.STATE_PLAYING
                          else PlaybackStateCompat.STATE_PAUSED,
                          PlaybackStateCompat.PLAYBACK_POSITION_UNKNOWN, 1f
                      )
                      .build()
                  mediaSession.setPlaybackState(state)
              }

              private fun buildNotification(): Notification {
                  updateMediaSession()

                  fun pi(requestCode: Int, action: String) = PendingIntent.getBroadcast(
                      this, requestCode,
                      Intent(action).setPackage(packageName),
                      PendingIntent.FLAG_IMMUTABLE or PendingIntent.FLAG_UPDATE_CURRENT
                  )

                  val playPauseIcon = if (isPlaying)
                      android.R.drawable.ic_media_pause
                  else
                      android.R.drawable.ic_media_play

                  return NotificationCompat.Builder(this, CHANNEL_ID)
                      .setContentTitle(songTitle)
                      .setContentText(songArtist)
                      .setSmallIcon(android.R.drawable.ic_media_play)
                      .setOngoing(isPlaying)
                      .setVisibility(NotificationCompat.VISIBILITY_PUBLIC)
                      .setPriority(NotificationCompat.PRIORITY_LOW)
                      .addAction(android.R.drawable.ic_media_previous, "Prev",      pi(0, ACTION_PREV))
                      .addAction(playPauseIcon, if (isPlaying) "Pause" else "Play", pi(1, ACTION_PLAY_PAUSE))
                      .addAction(android.R.drawable.ic_media_next,     "Next",      pi(2, ACTION_NEXT))
                      .addAction(android.R.drawable.ic_delete,         "Stop",      pi(3, ACTION_STOP))
                      .setStyle(
                          MediaStyle()
                              .setMediaSession(mediaSession.sessionToken)
                              .setShowActionsInCompactView(0, 1, 2)
                      )
                      .build()
              }

              private fun createNotificationChannel() {
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
                      val ch = NotificationChannel(
                          CHANNEL_ID, "NKPlayer", NotificationManager.IMPORTANCE_LOW
                      ).apply {
                          description = "NKPlayer music playback"
                          setSound(null, null)
                      }
                      getSystemService(NotificationManager::class.java).createNotificationChannel(ch)
                  }
              }

              override fun onTaskRemoved(rootIntent: Intent?) {
                  super.onTaskRemoved(rootIntent)
                  // Keep playing — do NOT stop
              }

              override fun onDestroy() {
                  stopPlayback()
                  mediaSession.release()
                  super.onDestroy()
              }
          }
          KT

          # ── MainActivity.kt ───────────────────────────────────────────────────
          cat <<'KT' > android/app/src/main/kotlin/com/nareshkushmi/nkplayer/MainActivity.kt
          package com.nareshkushmi.nkplayer

          import android.content.Intent
          import android.os.Build
          import io.flutter.embedding.android.FlutterActivity
          import io.flutter.embedding.engine.FlutterEngine
          import io.flutter.plugin.common.MethodChannel

          class MainActivity : FlutterActivity() {
              private val CHANNEL = "com.nareshkushmi.nkplayer/music_service"

              override fun configureFlutterEngine(flutterEngine: FlutterEngine) {
                  super.configureFlutterEngine(flutterEngine)

                  val ch = MethodChannel(flutterEngine.dartExecutor.binaryMessenger, CHANNEL)

                  // When service changes song/state → update Flutter UI
                  MusicService.onSongChanged = { index, playing ->
                      runOnUiThread {
                          ch.invokeMethod("onSongChanged", mapOf("index" to index, "isPlaying" to playing))
                      }
                  }

                  ch.setMethodCallHandler { call, result ->
                      when (call.method) {
                          "startService" -> {
                              val intent = Intent(this, MusicService::class.java).apply {
                                  action = MusicService.ACTION_UPDATE
                                  putStringArrayListExtra(MusicService.EXTRA_PATHS,   call.argument("paths")   ?: arrayListOf<String>())
                                  putStringArrayListExtra("titles",                   call.argument("titles")  ?: arrayListOf<String>())
                                  putStringArrayListExtra("artists",                  call.argument("artists") ?: arrayListOf<String>())
                                  putExtra(MusicService.EXTRA_INDEX, call.argument<Int>("index") ?: 0)
                              }
                              startFg(intent)
                              result.success(null)
                          }
                          "stopService" -> {
                              startService(Intent(this, MusicService::class.java).apply {
                                  action = MusicService.ACTION_STOP
                              })
                              result.success(null)
                          }
                          else -> result.notImplemented()
                      }
                  }
              }

              private fun startFg(intent: Intent) {
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O)
                      startForegroundService(intent)
                  else
                      startService(intent)
              }
          }
          KT

          # ── lib/main.dart ─────────────────────────────────────────────────────
          cat <<'DART' > lib/main.dart
          import 'dart:io';
          import 'package:flutter/material.dart';
          import 'package:flutter/services.dart';
          import 'package:on_audio_query/on_audio_query.dart';
          import 'package:permission_handler/permission_handler.dart';
          import 'package:google_fonts/google_fonts.dart';
          import 'package:device_info_plus/device_info_plus.dart';

          // ─────────────────────────────────────────────────────────────────────
          //  Music Service Bridge  — Service handles audio, Flutter handles UI
          // ─────────────────────────────────────────────────────────────────────
          class MusicServiceBridge {
            static const _ch = MethodChannel('com.nareshkushmi.nkplayer/music_service');

            // Start service with full playlist — service plays audio natively
            static Future<void> start({
              required List<SongModel> songs,
              required int index,
            }) async {
              try {
                await _ch.invokeMethod('startService', {
                  'paths':   songs.map((s) => s.data).toList(),
                  'titles':  songs.map((s) => s.title).toList(),
                  'artists': songs.map((s) => s.artist ?? 'Unknown').toList(),
                  'index':   index,
                });
              } catch (e) {
                debugPrint('startService error: $e');
              }
            }

            static Future<void> stop() async {
              try { await _ch.invokeMethod('stopService'); } catch (_) {}
            }

            // Called when notification buttons (prev/next/play-pause) are tapped
            static void setOnSongChanged(void Function(int index, bool isPlaying) cb) {
              _ch.setMethodCallHandler((call) async {
                if (call.method == 'onSongChanged') {
                  final idx      = call.arguments['index']     as int;
                  final playing  = call.arguments['isPlaying'] as bool;
                  cb(idx, playing);
                }
              });
            }
          }

          // ─────────────────────────────────────────────────────────────────────
          //  Main
          // ─────────────────────────────────────────────────────────────────────
          void main() {
            WidgetsFlutterBinding.ensureInitialized();
            runApp(const NKPlayerApp());
          }

          class NKPlayerApp extends StatelessWidget {
            const NKPlayerApp({super.key});
            @override
            Widget build(BuildContext context) => MaterialApp(
                  title: 'NKPlayer',
                  debugShowCheckedModeBanner: false,
                  theme: ThemeData.dark().copyWith(
                    primaryColor: Colors.blueAccent,
                    scaffoldBackgroundColor: const Color(0xFF0F0F0F),
                  ),
                  home: const PermissionHandlerScreen(),
                );
          }

          // ─────────────────────────────────────────────────────────────────────
          //  Permission Screen
          // ─────────────────────────────────────────────────────────────────────
          class PermissionHandlerScreen extends StatefulWidget {
            const PermissionHandlerScreen({super.key});
            @override
            State<PermissionHandlerScreen> createState() =>
                _PermissionHandlerScreenState();
          }

          class _PermissionHandlerScreenState
              extends State<PermissionHandlerScreen> {
            @override
            void initState() {
              super.initState();
              _checkPermissions();
            }

            Future<void> _checkPermissions() async {
              if (Platform.isAndroid) {
                final info = await DeviceInfoPlugin().androidInfo;
                final sdk = info.version.sdkInt;
                if (sdk >= 30) {
                  await Permission.manageExternalStorage.request();
                  if (sdk >= 33) {
                    await Permission.audio.request();
                    await Permission.notification.request();
                  }
                } else {
                  await Permission.storage.request();
                }
              }
              if (mounted) {
                Navigator.pushReplacement(
                  context,
                  MaterialPageRoute(builder: (_) => const FolderListScreen()),
                );
              }
            }

            @override
            Widget build(BuildContext context) =>
                const Scaffold(body: Center(child: CircularProgressIndicator()));
          }

          // ─────────────────────────────────────────────────────────────────────
          //  Folder Model
          // ─────────────────────────────────────────────────────────────────────
          class CustomFolder {
            final String name;
            final List<SongModel> songs;
            CustomFolder({required this.name, required this.songs});
          }

          // ─────────────────────────────────────────────────────────────────────
          //  Folder List Screen
          // ─────────────────────────────────────────────────────────────────────
          class FolderListScreen extends StatefulWidget {
            const FolderListScreen({super.key});
            @override
            State<FolderListScreen> createState() => _FolderListScreenState();
          }

          class _FolderListScreenState extends State<FolderListScreen> {
            final TextEditingController _searchCtrl = TextEditingController();
            bool _isSearching = false;
            List<CustomFolder> _folders = [];
            List<SongModel> _allSongs = [];
            List<SongModel> _filteredSongs = [];
            bool _loading = true;

            @override
            void initState() {
              super.initState();
              _loadData();
              _searchCtrl.addListener(() => setState(() {
                    _filteredSongs = _allSongs
                        .where((s) => s.title
                            .toLowerCase()
                            .contains(_searchCtrl.text.toLowerCase()))
                        .toList();
                  }));
            }

            Future<void> _loadData() async {
              final songs = await OnAudioQuery().querySongs();
              final Map<String, List<SongModel>> paths = {};
              for (var s in songs) {
                if (s.data.isEmpty) continue;
                paths.putIfAbsent(File(s.data).parent.path, () => []).add(s);
              }
              setState(() {
                _allSongs = songs;
                _folders = paths.entries
                    .map((e) =>
                        CustomFolder(name: e.key.split('/').last, songs: e.value))
                    .toList();
                _loading = false;
              });
            }

            @override
            Widget build(BuildContext context) {
              return Scaffold(
                appBar: AppBar(
                  title: _isSearching
                      ? TextField(
                          controller: _searchCtrl,
                          autofocus: true,
                          decoration: InputDecoration(
                            hintText: 'Search all songs...',
                            border: InputBorder.none,
                            suffixIcon: _searchCtrl.text.isNotEmpty
                                ? IconButton(
                                    icon: const Icon(Icons.clear),
                                    onPressed: () => _searchCtrl.clear())
                                : null,
                          ),
                        )
                      : Text('Folders', style: GoogleFonts.poppins()),
                  actions: [
                    IconButton(
                      icon: Icon(_isSearching ? Icons.close : Icons.search),
                      onPressed: () => setState(() {
                        _isSearching = !_isSearching;
                        if (!_isSearching) _searchCtrl.clear();
                      }),
                    ),
                  ],
                ),
                body: _loading
                    ? const Center(child: CircularProgressIndicator())
                    : _isSearching
                        ? ListView.builder(
                            itemCount: _filteredSongs.length,
                            itemBuilder: (_, i) => ListTile(
                              leading: const Icon(Icons.music_note,
                                  color: Colors.blueAccent),
                              title: Text(_filteredSongs[i].title, maxLines: 1),
                              onTap: () => Navigator.push(
                                  context,
                                  MaterialPageRoute(
                                      builder: (_) => PlayerScreen(
                                          songs: _filteredSongs, initialIndex: i))),
                            ),
                          )
                        : ListView.builder(
                            itemCount: _folders.length,
                            itemBuilder: (_, i) {
                              final f = _folders[i];
                              return ListTile(
                                leading: const Icon(Icons.folder,
                                    color: Colors.amber),
                                title: Text(f.name),
                                subtitle: Text('${f.songs.length} media files'),
                                onTap: () => Navigator.push(
                                    context,
                                    MaterialPageRoute(
                                        builder: (_) =>
                                            SongListScreen(folder: f))),
                              );
                            },
                          ),
              );
            }
          }

          // ─────────────────────────────────────────────────────────────────────
          //  Song List Screen
          // ─────────────────────────────────────────────────────────────────────
          class SongListScreen extends StatefulWidget {
            final CustomFolder folder;
            const SongListScreen({super.key, required this.folder});
            @override
            State<SongListScreen> createState() => _SongListScreenState();
          }

          class _SongListScreenState extends State<SongListScreen> {
            final TextEditingController _searchCtrl = TextEditingController();
            final Set<int> _selected = {};
            bool _isSel = false;
            List<SongModel> _filtered = [];

            @override
            void initState() {
              super.initState();
              _filtered = widget.folder.songs;
              _searchCtrl.addListener(() => setState(() {
                    _filtered = widget.folder.songs
                        .where((s) => s.title
                            .toLowerCase()
                            .contains(_searchCtrl.text.toLowerCase()))
                        .toList();
                  }));
            }

            @override
            Widget build(BuildContext context) {
              return Scaffold(
                appBar: AppBar(
                  leading: _isSel
                      ? IconButton(
                          icon: const Icon(Icons.close),
                          onPressed: () =>
                              setState(() { _selected.clear(); _isSel = false; }))
                      : null,
                  title: _isSel
                      ? Text('${_selected.length} Selected')
                      : TextField(
                          controller: _searchCtrl,
                          decoration: InputDecoration(
                            hintText: 'Search in folder...',
                            border: InputBorder.none,
                            suffixIcon: _searchCtrl.text.isNotEmpty
                                ? IconButton(
                                    icon: const Icon(Icons.clear),
                                    onPressed: () => _searchCtrl.clear())
                                : null,
                          ),
                        ),
                  actions: _isSel
                      ? [
                          IconButton(
                            icon: const Icon(Icons.select_all),
                            onPressed: () => setState(() => _selected
                                .addAll(Iterable.generate(_filtered.length))),
                          ),
                          IconButton(
                            icon: const Icon(Icons.play_circle),
                            onPressed: () => Navigator.push(
                                context,
                                MaterialPageRoute(
                                    builder: (_) => PlayerScreen(
                                        songs: _selected
                                            .map((i) => _filtered[i])
                                            .toList(),
                                        initialIndex: 0))),
                          ),
                        ]
                      : null,
                ),
                body: ListView.builder(
                  itemCount: _filtered.length,
                  itemBuilder: (_, i) {
                    final isS = _selected.contains(i);
                    return ListTile(
                      tileColor:
                          isS ? Colors.blueAccent.withOpacity(0.1) : null,
                      leading: Icon(
                          isS ? Icons.check_circle : Icons.music_note,
                          color: i % 2 == 0 ? Colors.blueAccent : Colors.grey),
                      title: Text(_filtered[i].title, maxLines: 1),
                      onLongPress: () =>
                          setState(() { _selected.add(i); _isSel = true; }),
                      onTap: () {
                        if (_isSel) {
                          setState(() {
                            if (isS) _selected.remove(i); else _selected.add(i);
                            _isSel = _selected.isNotEmpty;
                          });
                        } else {
                          Navigator.push(
                              context,
                              MaterialPageRoute(
                                  builder: (_) =>
                                      PlayerScreen(songs: _filtered, initialIndex: i)));
                        }
                      },
                    );
                  },
                ),
              );
            }
          }

          // ─────────────────────────────────────────────────────────────────────
          //  Player Screen — UI only, audio is handled by MusicService
          // ─────────────────────────────────────────────────────────────────────
          class PlayerScreen extends StatefulWidget {
            final List<SongModel> songs;
            final int initialIndex;
            const PlayerScreen(
                {super.key, required this.songs, required this.initialIndex});
            @override
            State<PlayerScreen> createState() => _PlayerScreenState();
          }

          class _PlayerScreenState extends State<PlayerScreen> {
            late int _currentIdx;
            bool _playing = true;

            @override
            void initState() {
              super.initState();
              _currentIdx = widget.initialIndex;

              // Start native service with full playlist
              MusicServiceBridge.start(songs: widget.songs, index: widget.initialIndex);

              // Listen for changes from notification buttons
              MusicServiceBridge.setOnSongChanged((idx, isPlaying) {
                if (mounted) setState(() { _currentIdx = idx; _playing = isPlaying; });
              });
            }

            SongModel get _song => widget.songs[_currentIdx];

            void _prev() {
              if (_currentIdx > 0) {
                MusicServiceBridge.start(songs: widget.songs, index: _currentIdx - 1);
              }
            }

            void _next() {
              if (_currentIdx < widget.songs.length - 1) {
                MusicServiceBridge.start(songs: widget.songs, index: _currentIdx + 1);
              }
            }

            void _togglePlay() {
              // Send play-pause directly via broadcast
              const platform = MethodChannel('com.nareshkushmi.nkplayer/music_service');
              platform.invokeMethod('startService', {
                'paths':   widget.songs.map((s) => s.data).toList(),
                'titles':  widget.songs.map((s) => s.title).toList(),
                'artists': widget.songs.map((s) => s.artist ?? 'Unknown').toList(),
                'index':   _currentIdx,
              });
            }

            @override
            Widget build(BuildContext context) {
              return Scaffold(
                appBar: AppBar(title: const Text('Now Playing')),
                body: Column(
                  mainAxisAlignment: MainAxisAlignment.center,
                  children: [
                    const Icon(Icons.music_note,
                        size: 100, color: Colors.blueAccent),
                    const SizedBox(height: 30),
                    Padding(
                      padding: const EdgeInsets.symmetric(horizontal: 16),
                      child: Text(
                        _song.title,
                        textAlign: TextAlign.center,
                        maxLines: 2,
                        style: GoogleFonts.poppins(
                            fontSize: 18, fontWeight: FontWeight.bold),
                      ),
                    ),
                    const SizedBox(height: 8),
                    Text(_song.artist ?? 'Unknown Artist',
                        style:
                            const TextStyle(color: Colors.grey, fontSize: 14)),
                    const SizedBox(height: 40),
                    Row(
                      mainAxisAlignment: MainAxisAlignment.spaceEvenly,
                      children: [
                        IconButton(
                            icon: const Icon(Icons.skip_previous, size: 45),
                            onPressed: _prev),
                        FloatingActionButton.large(
                          backgroundColor: Colors.blueAccent,
                          onPressed: _togglePlay,
                          child: Icon(
                              _playing ? Icons.pause : Icons.play_arrow,
                              size: 50),
                        ),
                        IconButton(
                            icon: const Icon(Icons.skip_next, size: 45),
                            onPressed: _next),
                      ],
                    ),
                  ],
                ),
              );
            }
          }
          DART

      - name: Build APK
        run: |
          flutter pub get
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: NKPlayer-v1.0.52
          path: build/app/outputs/flutter-apk/app-release.apk
