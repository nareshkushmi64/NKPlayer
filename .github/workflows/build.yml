name: NKPlayer - Final Accessibility and Features Fix
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'

      - name: Generate NKPlayer Project
        run: |
          flutter create --org com.nareshkushmi --project-name nkplayer .
          
          # App Label and Version Update (Version 1.0.2, Code 16)
          sed -i 's/android:label="nkplayer"/android:label="NKPlayer"/' android/app/src/main/AndroidManifest.xml
          
          cat <<EOF > pubspec.yaml
          name: nkplayer
          description: NKPlayer Pro - Final Accessibility Fix.
          version: 1.0.2+16
          publish_to: 'none'
          environment:
            sdk: '>=3.0.0 <4.0.0'
          dependencies:
            flutter:
              sdk: flutter
            audioplayers: ^5.2.1
            on_audio_query: ^2.9.0
            permission_handler: ^11.3.0
            google_fonts: ^6.1.0
          flutter:
            uses-material-design: true
          EOF

          python3 -c "
          import os
          path = 'android/app/src/main/AndroidManifest.xml'
          with open(path, 'r') as f:
              content = f.read()
          perms = '    <uses-permission android:name=\"android.permission.READ_EXTERNAL_STORAGE\" />\n    <uses-permission android:name=\"android.permission.READ_MEDIA_AUDIO\" />\n    <uses-permission android:name=\"android.permission.WRITE_EXTERNAL_STORAGE\" />\n'
          new_content = content.replace('<application', perms + '    <application')
          with open(path, 'w') as f:
              f.write(new_content)
          "

          cat <<'EOF' > lib/main.dart
          import 'dart:io';
          import 'package:flutter/material.dart';
          import 'package:on_audio_query/on_audio_query.dart';
          import 'package:audioplayers/audioplayers.dart';
          import 'package:permission_handler/permission_handler.dart';
          import 'package:google_fonts/google_fonts.dart';

          // Persistent Player Manager
          class PlayerManager {
            static final AudioPlayer player = AudioPlayer();
            static List<SongModel> currentPlaylist = [];
            static int currentIndex = 0;
          }

          void main() => runApp(MaterialApp(
                title: 'NKPlayer',
                debugShowCheckedModeBanner: false,
                theme: ThemeData.dark().copyWith(
                  primaryColor: Colors.blueAccent,
                  scaffoldBackgroundColor: const Color(0xFF0F0F0F),
                ),
                home: const PermissionHandlerScreen(),
              ));

          class PermissionHandlerScreen extends StatefulWidget {
            const PermissionHandlerScreen({super.key});
            @override
            State<PermissionHandlerScreen> createState() => _PermissionHandlerScreenState();
          }

          class _PermissionHandlerScreenState extends State<PermissionHandlerScreen> {
            @override
            void initState() {
              super.initState();
              _checkPermissions();
            }

            Future<void> _checkPermissions() async {
              if (await Permission.audio.request().isGranted || await Permission.storage.request().isGranted) {
                if (mounted) Navigator.of(context).pushReplacement(MaterialPageRoute(builder: (_) => const FolderListScreen()));
              }
            }

            @override
            Widget build(BuildContext context) {
              return const Scaffold(body: Center(child: CircularProgressIndicator()));
            }
          }

          class CustomFolder {
            final String name;
            final String path;
            final List<SongModel> songs;
            CustomFolder({required this.name, required this.path, required this.songs});
          }

          class FolderListScreen extends StatefulWidget {
            const FolderListScreen({super.key});
            @override
            State<FolderListScreen> createState() => _FolderListScreenState();
          }

          class _FolderListScreenState extends State<FolderListScreen> {
            final OnAudioQuery _audioQuery = OnAudioQuery();

            Future<List<CustomFolder>> _getFolders() async {
              List<SongModel> allSongs = await _audioQuery.querySongs();
              Map<String, List<SongModel>> parentPaths = {};
              for (var song in allSongs) {
                if (song.data == null) continue;
                final parentPath = File(song.data).parent.path;
                if (!parentPaths.containsKey(parentPath)) parentPaths[parentPath] = [];
                parentPaths[parentPath]!.add(song);
              }
              List<CustomFolder> folders = [];
              parentPaths.forEach((path, songs) {
                folders.add(CustomFolder(name: path.split(Platform.pathSeparator).last, path: path, songs: songs));
              });
              folders.sort((a, b) => a.name.toLowerCase().compareTo(b.name.toLowerCase()));
              return folders;
            }

            @override
            Widget build(BuildContext context) {
              return Scaffold(
                appBar: AppBar(title: Text("Folders", style: GoogleFonts.poppins(fontWeight: FontWeight.bold))),
                body: FutureBuilder<List<CustomFolder>>(
                  future: _getFolders(),
                  builder: (context, item) {
                    if (item.data == null) return const Center(child: CircularProgressIndicator());
                    return ListView.builder(
                      itemCount: item.data!.length,
                      itemBuilder: (context, index) {
                        final folder = item.data![index];
                        return ListTile(
                          leading: const Icon(Icons.folder_rounded, color: Colors.amber, size: 30),
                          title: Text(folder.name),
                          subtitle: Text("${folder.songs.length} media files"),
                          onTap: () => Navigator.push(context, MaterialPageRoute(builder: (_) => SongListScreen(folder: folder))),
                        );
                      },
                    );
                  },
                ),
              );
            }
          }

          class SongListScreen extends StatefulWidget {
            final CustomFolder folder;
            const SongListScreen({super.key, required this.folder});
            @override
            State<SongListScreen> createState() => _SongListScreenState();
          }

          class _SongListScreenState extends State<SongListScreen> {
            final Set<int> _selectedIndices = {};
            bool _isSelectionMode = false;
            final TextEditingController _searchController = TextEditingController();
            List<SongModel> _filteredSongs = [];

            @override
            void initState() {
              super.initState();
              _filteredSongs = widget.folder.songs;
            }

            void _onSearch(String query) {
              setState(() {
                _filteredSongs = widget.folder.songs
                    .where((song) => song.title.toLowerCase().contains(query.toLowerCase()))
                    .toList();
              });
            }

            void _toggleSelection(int index) {
              setState(() {
                if (_selectedIndices.contains(index)) {
                  _selectedIndices.remove(index);
                  if (_selectedIndices.isEmpty) _isSelectionMode = false;
                } else {
                  _selectedIndices.add(index);
                  _isSelectionMode = true;
                }
              });
            }

            void _selectAll() {
              setState(() {
                if (_selectedIndices.length == _filteredSongs.length) {
                  _selectedIndices.clear();
                  _isSelectionMode = false;
                } else {
                  _selectedIndices.addAll(Iterable.generate(_filteredSongs.length));
                  _isSelectionMode = true;
                }
              });
            }

            Future<void> _confirmDelete() async {
              showDialog(
                context: context,
                builder: (context) => AlertDialog(
                  title: const Text("Delete Permanently?"),
                  content: const Text("This media will be deleted permanently. This action cannot be undone."),
                  actions: [
                    TextButton(onPressed: () => Navigator.pop(context), child: const Text("Cancel")),
                    TextButton(
                      onPressed: () {
                        for (var index in _selectedIndices) {
                          try { File(_filteredSongs[index].data).deleteSync(); } catch (_) {}
                        }
                        Navigator.pop(context);
                        Navigator.pop(context);
                      },
                      child: const Text("OK", style: TextStyle(color: Colors.red)),
                    ),
                  ],
                ),
              );
            }

            @override
            Widget build(BuildContext context) {
              return Scaffold(
                appBar: AppBar(
                  leading: _isSelectionMode ? IconButton(icon: const Icon(Icons.close), onPressed: () => setState(() { _selectedIndices.clear(); _isSelectionMode = false; })) : null,
                  title: _isSelectionMode 
                    ? Text("${_selectedIndices.length} / ${_filteredSongs.length} Selected") 
                    : TextField(
                        controller: _searchController,
                        onChanged: _onSearch,
                        decoration: const InputDecoration(hintText: "Search media...", border: InputBorder.none),
                      ),
                  actions: _isSelectionMode ? [
                    IconButton(icon: const Icon(Icons.select_all), onPressed: _selectAll, tooltip: "Select All"),
                    IconButton(icon: const Icon(Icons.play_circle_fill), onPressed: () {
                      List<SongModel> selected = _selectedIndices.map((i) => _filteredSongs[i]).toList();
                      Navigator.push(context, MaterialPageRoute(builder: (_) => PlayerScreen(songs: selected, initialIndex: 0)));
                    }, tooltip: "Play Selected"),
                    IconButton(icon: const Icon(Icons.delete), onPressed: _confirmDelete, tooltip: "Delete Selected"),
                  ] : null,
                ),
                body: ListView.builder(
                  itemCount: _filteredSongs.length,
                  itemBuilder: (context, index) {
                    final song = _filteredSongs[index];
                    final isSelected = _selectedIndices.contains(index);
                    return ListTile(
                      tileColor: isSelected ? Colors.blueAccent.withOpacity(0.2) : null,
                      leading: Icon(isSelected ? Icons.check_circle : Icons.music_note_rounded, color: isSelected ? Colors.blueAccent : Colors.grey),
                      title: Text(song.title, maxLines: 1, overflow: TextOverflow.ellipsis),
                      onLongPress: () => _toggleSelection(index),
                      onTap: () {
                        if (_isSelectionMode) { _toggleSelection(index); }
                        else { Navigator.push(context, MaterialPageRoute(builder: (_) => PlayerScreen(songs: _filteredSongs, initialIndex: index))); }
                      },
                    );
                  },
                ),
              );
            }
          }

          class PlayerScreen extends StatefulWidget {
            final List<SongModel> songs;
            final int initialIndex;
            const PlayerScreen({super.key, required this.songs, required this.initialIndex});
            @override
            State<PlayerScreen> createState() => _PlayerScreenState();
          }

          class _PlayerScreenState extends State<PlayerScreen> {
            bool _isPlaying = false;
            Duration _position = Duration.zero;
            Duration _duration = Duration.zero;

            @override
            void initState() {
              super.initState();
              PlayerManager.currentPlaylist = widget.songs;
              PlayerManager.currentIndex = widget.initialIndex;
              _setupPlayer();
              _playCurrent();
            }

            void _setupPlayer() {
              PlayerManager.player.onPositionChanged.listen((p) => setState(() => _position = p));
              PlayerManager.player.onDurationChanged.listen((d) => setState(() => _duration = d));
              PlayerManager.player.onPlayerComplete.listen((_) => _next());
            }

            void _playCurrent() async {
              await PlayerManager.player.stop();
              await PlayerManager.player.play(DeviceFileSource(PlayerManager.currentPlaylist[PlayerManager.currentIndex].data));
              setState(() => _isPlaying = true);
            }

            void _next() { if (PlayerManager.currentIndex < PlayerManager.currentPlaylist.length - 1) { PlayerManager.currentIndex++; _playCurrent(); } }
            void _prev() { if (PlayerManager.currentIndex > 0) { PlayerManager.currentIndex--; _playCurrent(); } }

            String _formatTime(Duration d) => d.toString().split('.').first.padLeft(8, "0").substring(2);

            @override
            Widget build(BuildContext context) {
              final song = PlayerManager.currentPlaylist[PlayerManager.currentIndex];
              return PopScope(
                canPop: true,
                child: Scaffold(
                  appBar: AppBar(title: const Text("Now Playing")),
                  body: Padding(
                    padding: const EdgeInsets.all(25),
                    child: Column(
                      mainAxisAlignment: MainAxisAlignment.center,
                      children: [
                        const Icon(Icons.music_note_rounded, size: 120, color: Colors.blueAccent),
                        const SizedBox(height: 30),
                        Text(song.title, textAlign: TextAlign.center, style: GoogleFonts.poppins(fontSize: 20, fontWeight: FontWeight.bold)),
                        const SizedBox(height: 40),
                        Slider(
                          value: _position.inSeconds.toDouble(),
                          max: _duration.inSeconds.toDouble() > 0 ? _duration.inSeconds.toDouble() : 1.0,
                          onChanged: (v) => PlayerManager.player.seek(Duration(seconds: v.toInt())),
                        ),
                        Padding(
                          padding: const EdgeInsets.symmetric(horizontal: 10),
                          child: Row(
                            mainAxisAlignment: MainAxisAlignment.spaceBetween,
                            children: [
                              Text(_formatTime(_position)),
                              Text(_formatTime(_duration - _position)),
                            ],
                          ),
                        ),
                        const SizedBox(height: 40),
                        Row(
                          mainAxisAlignment: MainAxisAlignment.spaceEvenly,
                          children: [
                            // FIXED ACCESSIBILITY BUTTONS
                            Semantics(
                              label: "Previous button",
                              button: true,
                              excludeSemantics: true,
                              child: IconButton(icon: const Icon(Icons.skip_previous_rounded, size: 55), onPressed: _prev),
                            ),
                            Semantics(
                              label: _isPlaying ? "Pause button" : "Play button",
                              button: true,
                              excludeSemantics: true,
                              child: FloatingActionButton.large(
                                backgroundColor: Colors.blueAccent,
                                onPressed: () { if (_isPlaying) PlayerManager.player.pause(); else PlayerManager.player.resume(); setState(() => _isPlaying = !_isPlaying); },
                                child: Icon(_isPlaying ? Icons.pause_rounded : Icons.play_arrow_rounded, size: 50),
                              ),
                            ),
                            Semantics(
                              label: "Next button",
                              button: true,
                              excludeSemantics: true,
                              child: IconButton(icon: const Icon(Icons.skip_next_rounded, size: 55), onPressed: _next),
                            ),
                          ],
                        ),
                      ],
                    ),
                  ),
                ),
              );
            }
          }
          EOF

      - name: Build APK
        run: |
          flutter pub get
          flutter build apk --release

      - name: Upload NKPlayer APK
        uses: actions/upload-artifact@v4
        with:
          name: NKPlayer-v1.0.2-Fixed
          path: build/app/outputs/flutter-apk/app-release.apk
