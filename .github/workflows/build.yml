                                  builder: (ctx, showPos, _) => AnimatedContainer(
                                    duration: const Duration(milliseconds: 200),
                                    decoration: BoxDecoration(
                                      color: isFSel
                                          ? const Color(0xFF00D4FF).withOpacity(0.08)
                                          : Colors.transparent,
                                      border: isFSel ? const Border(
                                          left: BorderSide(
                                              color: Color(0xFF00D4FF), width: 3))
