name: NKPlayer - Background & Notification (v1.0.21)
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'

      - name: Generate NKPlayer Project
        run: |
          flutter create --org com.nareshkushmi --project-name nkplayer .
          
          # App Label and Target SDK 36 (Android 16 Compatible)
          sed -i 's/android:label="nkplayer"/android:label="NKPlayer"/' android/app/src/main/AndroidManifest.xml
          sed -i 's/targetSdkVersion .*/targetSdkVersion 36/' android/app/build.gradle || true
          
          cat <<EOF > pubspec.yaml
          name: nkplayer
          description: NKPlayer Pro - Accessible Media Player.
          version: 1.0.21+111
          publish_to: 'none'
          environment:
            sdk: '>=3.0.0 <4.0.0'
          dependencies:
            flutter:
              sdk: flutter
            just_audio: ^0.9.36
            just_audio_background: ^0.0.1-beta.11
            on_audio_query: ^2.9.0
            permission_handler: ^11.3.0
            google_fonts: ^6.1.0
            device_info_plus: ^10.1.0
          flutter:
            uses-material-design: true
          EOF

          # Injecting Permissions, Background Service and Legacy Storage Fix
          python3 -c "
          import os
          path = 'android/app/src/main/AndroidManifest.xml'
          with open(path, 'r') as f:
              content = f.read()
          
          perms = '''    <uses-permission android:name=\"android.permission.WRITE_EXTERNAL_STORAGE\"/>
              <uses-permission android:name=\"android.permission.READ_EXTERNAL_STORAGE\"/>
              <uses-permission android:name=\"android.permission.MANAGE_EXTERNAL_STORAGE\"/>
              <uses-permission android:name=\"android.permission.READ_MEDIA_AUDIO\" />
              <uses-permission android:name=\"android.permission.POST_NOTIFICATIONS\" />
              <uses-permission android:name=\"android.permission.FOREGROUND_SERVICE\" />
              <uses-permission android:name=\"android.permission.FOREGROUND_SERVICE_MEDIA_PLAYBACK\" />\n'''
          
          service_tag = '''
                  <service android:name=\"com.ryanheise.audioservice.AudioService\"
                      android:foregroundServiceType=\"mediaPlayback\"
                      android:exported=\"true\">
                      <intent-filter>
                          <action android:name=\"android.media.browse.MediaBrowserService\" />
                      </intent-filter>
                  </service>\n'''
          
          content = content.replace('<application', perms + '    <application android:requestLegacyExternalStorage=\"true\"')
          content = content.replace('</activity>', '</activity>' + service_tag)
          
          with open(path, 'w') as f:
              f.write(content)
          "

          cat <<'EOF' > lib/main.dart
          import 'dart:io';
          import 'package:flutter/material.dart';
          import 'package:on_audio_query/on_audio_query.dart';
          import 'package:just_audio/just_audio.dart';
          import 'package:just_audio_background/just_audio_background.dart';
          import 'package:permission_handler/permission_handler.dart';
          import 'package:google_fonts/google_fonts.dart';
          import 'package:device_info_plus/device_info_plus.dart';

          class PlayerManager {
            static final AudioPlayer player = AudioPlayer();
            static List<SongModel> currentPlaylist = [];
          }

          Future<void> main() async {
            WidgetsFlutterBinding.ensureInitialized();
            await JustAudioBackground.init(
              androidNotificationChannelId: 'com.nareshkushmi.nkplayer.channel.audio',
              androidNotificationChannelName: 'NKPlayer Audio Playback',
              androidNotificationOngoing: true,
            );
            runApp(MaterialApp(
              title: 'NKPlayer',
              debugShowCheckedModeBanner: false,
              theme: ThemeData.dark().copyWith(
                primaryColor: Colors.blueAccent,
                scaffoldBackgroundColor: const Color(0xFF0F0F0F),
              ),
              home: const PermissionHandlerScreen(),
            ));
          }

          class PermissionHandlerScreen extends StatefulWidget {
            const PermissionHandlerScreen({super.key});
            @override
            State<PermissionHandlerScreen> createState() => _PermissionHandlerScreenState();
          }

          class _PermissionHandlerScreenState extends State<PermissionHandlerScreen> {
            @override
            void initState() {
              super.initState();
              _checkPermissions();
            }

            Future<void> _checkPermissions() async {
              if (Platform.isAndroid) {
                final info = await DeviceInfoPlugin().androidInfo;
                if (info.version.sdkInt >= 30) {
                  await Permission.manageExternalStorage.request();
                  if (info.version.sdkInt >= 33) {
                    await Permission.audio.request();
                    await Permission.notification.request();
                  }
                } else {
                  await Permission.storage.request();
                }
              }
              if (mounted) Navigator.pushReplacement(context, MaterialPageRoute(builder: (_) => const FolderListScreen()));
            }

            @override
            Widget build(BuildContext context) => const Scaffold(body: Center(child: CircularProgressIndicator()));
          }

          class CustomFolder {
            final String name;
            final List<SongModel> songs;
            CustomFolder({required this.name, required this.songs});
          }

          class FolderListScreen extends StatefulWidget {
            const FolderListScreen({super.key});
            @override
            State<FolderListScreen> createState() => _FolderListScreenState();
          }

          class _FolderListScreenState extends State<FolderListScreen> {
            final TextEditingController _searchCtrl = TextEditingController();
            bool _isSearching = false;
            List<CustomFolder> _folders = [];
            List<SongModel> _allSongs = [];
            List<SongModel> _filteredSongs = [];
            bool _loading = true;

            @override
            void initState() {
              super.initState();
              _loadData();
              _searchCtrl.addListener(() {
                setState(() {
                  _filteredSongs = _allSongs.where((s) => s.title.toLowerCase().contains(_searchCtrl.text.toLowerCase())).toList();
                });
              });
            }

            Future<void> _loadData() async {
              List<SongModel> songs = await OnAudioQuery().querySongs();
              Map<String, List<SongModel>> paths = {};
              for (var s in songs) {
                if (s.data == null) continue;
                paths.putIfAbsent(File(s.data).parent.path, () => []).add(s);
              }
              setState(() {
                _allSongs = songs;
                _folders = paths.entries.map((e) => CustomFolder(name: e.key.split('/').last, songs: e.value)).toList();
                _loading = false;
              });
            }

            @override
            Widget build(BuildContext context) {
              return Scaffold(
                appBar: AppBar(
                  title: _isSearching
                      ? TextField(
                          controller: _searchCtrl,
                          autofocus: true,
                          decoration: InputDecoration(
                            hintText: "Search all songs...",
                            border: InputBorder.none,
                            suffixIcon: _searchCtrl.text.isNotEmpty
                                ? Semantics(
                                    label: "clear search button",
                                    button: true,
                                    container: true,
                                    excludeSemantics: true,
                                    child: IconButton(icon: const Icon(Icons.clear), onPressed: () => _searchCtrl.clear()),
                                  )
                                : null,
                          ),
                        )
                      : Text("Folders", style: GoogleFonts.poppins()),
                  actions: [
                    Semantics(
                      label: _isSearching ? "close search button" : "search button",
                      button: true,
                      excludeSemantics: true,
                      child: IconButton(
                        icon: Icon(_isSearching ? Icons.close : Icons.search),
                        onPressed: () => setState(() {
                          _isSearching = !_isSearching;
                          if (!_isSearching) _searchCtrl.clear();
                        }),
                      ),
                    )
                  ],
                ),
                body: _loading
                    ? const Center(child: CircularProgressIndicator())
                    : _isSearching
                        ? ListView.builder(
                            itemCount: _filteredSongs.length,
                            itemBuilder: (context, i) => ListTile(
                              leading: const Icon(Icons.music_note, color: Colors.blueAccent),
                              title: Text(_filteredSongs[i].title, maxLines: 1),
                              onTap: () => Navigator.push(context, MaterialPageRoute(builder: (_) => PlayerScreen(songs: _filteredSongs, initialIndex: i))),
                            ),
                          )
                        : ListView.builder(
                            itemCount: _folders.length,
                            itemBuilder: (context, i) {
                              final f = _folders[i];
                              return ListTile(
                                leading: const Icon(Icons.folder, color: Colors.amber),
                                title: Text(f.name),
                                subtitle: Text("${f.songs.length} media files"),
                                onTap: () => Navigator.push(context, MaterialPageRoute(builder: (_) => SongListScreen(folder: f))),
                              );
                            },
                          ),
              );
            }
          }

          class SongListScreen extends StatefulWidget {
            final CustomFolder folder;
            const SongListScreen({super.key, required this.folder});
            @override
            State<SongListScreen> createState() => _SongListScreenState();
          }

          class _SongListScreenState extends State<SongListScreen> {
            final TextEditingController _searchCtrl = TextEditingController();
            final Set<int> _selected = {};
            bool _isSel = false;
            List<SongModel> _filtered = [];

            @override
            void initState() {
              super.initState();
              _filtered = widget.folder.songs;
              _searchCtrl.addListener(() {
                setState(() {
                  _filtered = widget.folder.songs.where((s) => s.title.toLowerCase().contains(_searchCtrl.text.toLowerCase())).toList();
                });
              });
            }

            @override
            Widget build(BuildContext context) {
              return Scaffold(
                appBar: AppBar(
                  leading: _isSel
                      ? Semantics(
                          label: "close selection button",
                          button: true,
                          excludeSemantics: true,
                          child: IconButton(icon: const Icon(Icons.close), onPressed: () => setState(() { _selected.clear(); _isSel = false; })),
                        )
                      : null,
                  title: _isSel
                      ? Text("${_selected.length} Selected")
                      : TextField(
                          controller: _searchCtrl,
                          decoration: InputDecoration(
                            hintText: "Search in folder...",
                            border: InputBorder.none,
                            suffixIcon: _searchCtrl.text.isNotEmpty
                                ? Semantics(
                                    label: "clear search button",
                                    button: true,
                                    container: true,
                                    excludeSemantics: true,
                                    child: IconButton(icon: const Icon(Icons.clear), onPressed: () => _searchCtrl.clear()),
                                  )
                                : null,
                          ),
                        ),
                  actions: _isSel
                      ? [
                          Semantics(
                            label: "select all button",
                            button: true,
                            excludeSemantics: true,
                            child: IconButton(icon: const Icon(Icons.select_all), onPressed: () => setState(() => _selected.addAll(Iterable.generate(_filtered.length)))),
                          ),
                          Semantics(
                            label: "play selected button",
                            button: true,
                            excludeSemantics: true,
                            child: IconButton(
                                icon: const Icon(Icons.play_circle),
                                onPressed: () {
                                  Navigator.push(context, MaterialPageRoute(builder: (_) => PlayerScreen(songs: _selected.map((i) => _filtered[i]).toList(), initialIndex: 0)));
                                }),
                          ),
                        ]
                      : null,
                ),
                body: ListView.builder(
                  itemCount: _filtered.length,
                  itemBuilder: (context, i) {
                    final isS = _selected.contains(i);
                    return ListTile(
                      tileColor: isS ? Colors.blueAccent.withOpacity(0.1) : null,
                      leading: Icon(isS ? Icons.check_circle : Icons.music_note, color: isS ? Colors.blueAccent : Colors.grey),
                      title: Text(_filtered[i].title, maxLines: 1),
                      onLongPress: () => setState(() { _selected.add(i); _isSel = true; }),
                      onTap: () {
                        if (_isSel)
                          setState(() {
                            if (isS) _selected.remove(i);
                            else _selected.add(i);
                            _isSel = _selected.isNotEmpty;
                          });
                        else
                          Navigator.push(context, MaterialPageRoute(builder: (_) => PlayerScreen(songs: _filtered, initialIndex: i)));
                      },
                    );
                  },
                ),
              );
            }
          }

          class PlayerScreen extends StatefulWidget {
            final List<SongModel> songs;
            final int initialIndex;
            const PlayerScreen({super.key, required this.songs, required this.initialIndex});
            @override
            State<PlayerScreen> createState() => _PlayerScreenState();
          }

          class _PlayerScreenState extends State<PlayerScreen> {
            int _idx = 0;

            @override
            void initState() {
              super.initState();
              _idx = widget.initialIndex;
              PlayerManager.currentPlaylist = widget.songs;
              _setupPlaylist();
            }

            void _setupPlaylist() async {
              final playlist = ConcatenatingAudioSource(
                children: PlayerManager.currentPlaylist.map((s) => AudioSource.uri(
                  Uri.parse(s.data),
                  tag: MediaItem(
                    id: s.id.toString(),
                    title: s.title,
                    artist: s.artist ?? "Unknown Artist",
                  ),
                )).toList(),
              );
              await PlayerManager.player.setAudioSource(playlist, initialIndex: _idx);
              PlayerManager.player.play();
            }

            String _fmt(Duration d) => d.toString().split('.').first.padLeft(8, "0").substring(2);

            @override
            Widget build(BuildContext context) {
              return Scaffold(
                app_bar: AppBar(title: const Text("Now Playing")),
                body: StreamBuilder<SequenceState?>(
                  stream: PlayerManager.player.sequenceStateStream,
                  builder: (context, snapshot) {
                    final state = snapshot.data;
                    if (state == null) return const Center(child: CircularProgressIndicator());
                    final metadata = state.currentSource!.tag as MediaItem;
                    return Column(
                      mainAxisAlignment: MainAxisAlignment.center,
                      children: [
                        const Icon(Icons.music_note, size: 100, color: Colors.blueAccent),
                        const SizedBox(height: 30),
                        Text(metadata.title, textAlign: TextAlign.center, style: GoogleFonts.poppins(fontSize: 18, fontWeight: FontWeight.bold)),
                        Text(metadata.artist ?? "", style: const TextStyle(color: Colors.grey)),
                        StreamBuilder<Duration>(
                          stream: PlayerManager.player.positionStream,
                          builder: (context, snap) {
                            final pos = snap.data ?? Duration.zero;
                            final dur = PlayerManager.player.duration ?? Duration.zero;
                            return Column(
                              children: [
                                Slider(
                                  value: pos.inSeconds.toDouble(),
                                  max: dur.inSeconds.toDouble() > 0 ? dur.inSeconds.toDouble() : 1.0,
                                  onChanged: (v) => PlayerManager.player.seek(Duration(seconds: v.toInt())),
                                ),
                                Padding(
                                  padding: const EdgeInsets.symmetric(horizontal: 20),
                                  child: Row(
                                    mainAxisAlignment: MainAxisAlignment.spaceBetween,
                                    children: [Text(_fmt(pos)), Text(_fmt(dur))],
                                  ),
                                ),
                              ],
                            );
                          },
                        ),
                        const SizedBox(height: 20),
                        Row(
                          mainAxisAlignment: MainAxisAlignment.spaceEvenly,
                          children: [
                            Semantics(
                              label: "previous button",
                              button: true,
                              excludeSemantics: true,
                              child: IconButton(icon: const Icon(Icons.skip_previous, size: 45), onPressed: PlayerManager.player.seekToPrevious),
                            ),
                            StreamBuilder<PlayerState>(
                              stream: PlayerManager.player.playerStateStream,
                              builder: (context, snap) {
                                final playing = snap.data?.playing ?? false;
                                return Semantics(
                                  label: playing ? "pause button" : "play button",
                                  button: true,
                                  excludeSemantics: true,
                                  child: FloatingActionButton.large(
                                    backgroundColor: Colors.blueAccent,
                                    onPressed: playing ? PlayerManager.player.pause : PlayerManager.player.play,
                                    child: Icon(playing ? Icons.pause : Icons.play_arrow, size: 50),
                                  ),
                                );
                              },
                            ),
                            Semantics(
                              label: "next button",
                              button: true,
                              excludeSemantics: true,
                              child: IconButton(icon: const Icon(Icons.skip_next, size: 45), onPressed: PlayerManager.player.seekToNext),
                            ),
                          ],
                        ),
                      ],
                    );
                  },
                ),
              );
            }
          }
          EOF

      - name: Build APK
        run: |
          flutter pub get
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: NKPlayer-v1.0.21
          path: build/app/outputs/flutter-apk/app-release.apk
