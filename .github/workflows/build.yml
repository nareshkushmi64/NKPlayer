name: NKPlayer - Version 1.0.14 Build
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'

      - name: Generate NKPlayer Project
        run: |
          flutter create --org com.nareshkushmi --project-name nkplayer .

          # Android 16 Support
          sed -i 's/android:label="nkplayer"/android:label="NKPlayer"/' android/app/src/main/AndroidManifest.xml
          sed -i 's/targetSdkVersion .*/targetSdkVersion 36/' android/app/build.gradle || true
          sed -i 's/compileSdkVersion .*/compileSdkVersion 36/' android/app/build.gradle || true

          cat <<EOF > pubspec.yaml
          name: nkplayer
          description: NKPlayer Pro - Accessible Media Player.
          version: 1.0.14+104
          publish_to: 'none'
          environment:
            sdk: '>=3.0.0 <4.0.0'
          dependencies:
            flutter:
              sdk: flutter
            audioplayers: ^5.2.1
            on_audio_query: ^2.9.0
            permission_handler: ^11.3.0
            google_fonts: ^6.1.0
            device_info_plus: ^10.1.0
            just_audio: ^0.9.36
            audio_service: ^0.18.12
            audio_session: ^0.1.16
          flutter:
            uses-material-design: true
          EOF

          # Permissions (UNCHANGED)
          python3 -c "
          path = 'android/app/src/main/AndroidManifest.xml'
          with open(path, 'r') as f:
              content = f.read()
          perms = '''    <uses-permission android:name=\"android.permission.WRITE_EXTERNAL_STORAGE\"/>
              <uses-permission android:name=\"android.permission.READ_EXTERNAL_STORAGE\"/>
              <uses-permission android:name=\"android.permission.MANAGE_EXTERNAL_STORAGE\"/>
              <uses-permission android:name=\"android.permission.READ_MEDIA_AUDIO\" />
              <uses-permission android:name=\"android.permission.POST_NOTIFICATIONS\" />\n'''
          content = content.replace('<application', perms + '    <application')
          with open(path, 'w') as f:
              f.write(content)
          "

          # Add Audio Service
          sed -i '/<application/a \
              <service android:name="com.ryanheise.audioservice.AudioService" android:exported="true" android:foregroundServiceType="mediaPlayback">\
              <intent-filter>\
              <action android:name="android.media.browse.MediaBrowserService"/>\
              </intent-filter>\
              </service>' android/app/src/main/AndroidManifest.xml

          cat <<'EOF' > lib/main.dart
import 'dart:io';
import 'package:flutter/material.dart';
import 'package:on_audio_query/on_audio_query.dart';
import 'package:permission_handler/permission_handler.dart';
import 'package:google_fonts/google_fonts.dart';
import 'package:device_info_plus/device_info_plus.dart';
import 'package:audio_service/audio_service.dart';
import 'package:just_audio/just_audio.dart';

late final AudioHandler _audioHandler;

class MyAudioHandler extends BaseAudioHandler {
  final _player = AudioPlayer();

  Future<void> playSong(String uri, String title) async {
    mediaItem.add(MediaItem(id: uri, title: title));
    await _player.setUrl(uri);
    _player.play();
  }

  @override
  Future<void> play() => _player.play();

  @override
  Future<void> pause() => _player.pause();
}

void main() async {
  WidgetsFlutterBinding.ensureInitialized();

  _audioHandler = await AudioService.init(
    builder: () => MyAudioHandler(),
    config: const AudioServiceConfig(
      androidNotificationChannelId: 'nkplayer.channel.audio',
      androidNotificationChannelName: 'NKPlayer Playback',
      androidNotificationOngoing: true,
    ),
  );

  runApp(MaterialApp(
    debugShowCheckedModeBanner: false,
    theme: ThemeData.dark(),
    home: const PermissionHandlerScreen(),
  ));
}

class PermissionHandlerScreen extends StatefulWidget {
  const PermissionHandlerScreen({super.key});
  @override
  State<PermissionHandlerScreen> createState() => _PermissionHandlerScreenState();
}

class _PermissionHandlerScreenState extends State<PermissionHandlerScreen> {
  @override
  void initState() {
    super.initState();
    _checkPermissions();
  }

  Future<void> _checkPermissions() async {
    if (Platform.isAndroid) {
      final info = await DeviceInfoPlugin().androidInfo;

      if (info.version.sdkInt >= 30) {
        await Permission.manageExternalStorage.request();

        if (info.version.sdkInt >= 33) {
          await Permission.audio.request();
          await Permission.notification.request();
        }
      } else {
        await Permission.storage.request();
      }
    }

    if (mounted) {
      Navigator.pushReplacement(
        context,
        MaterialPageRoute(builder: (_) => const FolderListScreen()),
      );
    }
  }

  @override
  Widget build(BuildContext context) =>
      const Scaffold(body: Center(child: CircularProgressIndicator()));
}

class CustomFolder {
  final String name;
  final List<SongModel> songs;
  CustomFolder({required this.name, required this.songs});
}

class FolderListScreen extends StatelessWidget {
  const FolderListScreen({super.key});

  Future<List<CustomFolder>> _getFolders() async {
    List<SongModel> songs = await OnAudioQuery().querySongs();
    Map<String, List<SongModel>> paths = {};
    for (var s in songs) {
      if (s.data == null) continue;
      paths.putIfAbsent(File(s.data).parent.path, () => []).add(s);
    }
    return paths.entries
        .map((e) =>
            CustomFolder(name: e.key.split('/').last, songs: e.value))
        .toList();
  }

  @override
  Widget build(BuildContext context) {
    return Scaffold(
      appBar: AppBar(title: Text("Folders", style: GoogleFonts.poppins())),
      body: FutureBuilder<List<CustomFolder>>(
        future: _getFolders(),
        builder: (context, snap) {
          if (!snap.hasData)
            return const Center(child: CircularProgressIndicator());
          return ListView.builder(
            itemCount: snap.data!.length,
            itemBuilder: (context, i) {
              final f = snap.data![i];
              return ListTile(
                leading: const Icon(Icons.folder),
                title: Text(f.name),
                onTap: () => Navigator.push(
                    context,
                    MaterialPageRoute(
                        builder: (_) => SongListScreen(folder: f))),
              );
            },
          );
        },
      ),
    );
  }
}

class SongListScreen extends StatelessWidget {
  final CustomFolder folder;
  const SongListScreen({super.key, required this.folder});

  @override
  Widget build(BuildContext context) {
    return Scaffold(
      appBar: AppBar(title: const Text("Songs")),
      body: ListView.builder(
        itemCount: folder.songs.length,
        itemBuilder: (context, i) {
          final s = folder.songs[i];
          return ListTile(
            title: Text(s.title),
            onTap: () async {
              final info = await DeviceInfoPlugin().androidInfo;

              if (info.version.sdkInt <= 29) {
                await _audioHandler.playSong(s.uri ?? '', s.title);
              } else {
                await _audioHandler.playSong(s.uri ?? '', s.title);
              }
            },
          );
        },
      ),
    );
  }
}
EOF

      - name: Build APK
        run: |
          flutter pub get
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: NKPlayer-v1.0.14
          path: build/app/outputs/flutter-apk/app-release.apk
