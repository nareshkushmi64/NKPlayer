name: NKPlayer - All Files Access Permissions
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'

      - name: Generate NKPlayer Project
        run: |
          flutter create --org com.nareshkushmi --project-name nkplayer .
          
          # App Label and Version Update
          sed -i 's/android:label="nkplayer"/android:label="NKPlayer"/' android/app/src/main/AndroidManifest.xml
          sed -i 's/targetSdkVersion .*/targetSdkVersion 35/' android/app/build.gradle || true
          
          cat <<EOF > pubspec.yaml
          name: nkplayer
          description: NKPlayer Pro - Manage Storage Fix.
          version: 1.0.4+18
          publish_to: 'none'
          environment:
            sdk: '>=3.0.0 <4.0.0'
          dependencies:
            flutter:
              sdk: flutter
            audioplayers: ^5.2.1
            on_audio_query: ^2.9.0
            permission_handler: ^11.3.0
            google_fonts: ^6.1.0
            device_info_plus: ^10.1.0
          flutter:
            uses-material-design: true
          EOF

          # Injecting ALL Requested Permissions
          python3 -c "
          import os
          path = 'android/app/src/main/AndroidManifest.xml'
          with open(path, 'r') as f:
              content = f.read()
          perms = '''    <uses-permission android:name=\"android.permission.WRITE_EXTERNAL_STORAGE\"/>
              <uses-permission android:name=\"android.permission.READ_EXTERNAL_STORAGE\"/>
              <uses-permission android:name=\"android.permission.MANAGE_EXTERNAL_STORAGE\"/>
              <uses-permission android:name=\"android.permission.READ_MEDIA_AUDIO\" />
              <uses-permission android:name=\"android.permission.POST_NOTIFICATIONS\" />\n'''
          new_content = content.replace('<application', perms + '    <application')
          with open(path, 'w') as f:
              f.write(new_content)
          "

          cat <<'EOF' > lib/main.dart
          import 'dart:io';
          import 'package:flutter/material.dart';
          import 'package:on_audio_query/on_audio_query.dart';
          import 'package:audioplayers/audioplayers.dart';
          import 'package:permission_handler/permission_handler.dart';
          import 'package:google_fonts/google_fonts.dart';
          import 'package:device_info_plus/device_info_plus.dart';

          // Persistent Player Manager
          class PlayerManager {
            static final AudioPlayer player = AudioPlayer();
            static List<SongModel> currentPlaylist = [];
            static int currentIndex = 0;
          }

          void main() => runApp(MaterialApp(
                title: 'NKPlayer',
                debugShowCheckedModeBanner: false,
                theme: ThemeData.dark().copyWith(
                  primaryColor: Colors.blueAccent,
                  scaffoldBackgroundColor: const Color(0xFF0F0F0F),
                ),
                home: const PermissionHandlerScreen(),
              ));

          class PermissionHandlerScreen extends StatefulWidget {
            const PermissionHandlerScreen({super.key});
            @override
            State<PermissionHandlerScreen> createState() => _PermissionHandlerScreenState();
          }

          class _PermissionHandlerScreenState extends State<PermissionHandlerScreen> {
            bool _needsPermission = false;

            @override
            void initState() {
              super.initState();
              _checkPermissions();
            }

            Future<void> _checkPermissions() async {
              bool isGranted = false;
              
              if (Platform.isAndroid) {
                final androidInfo = await DeviceInfoPlugin().androidInfo;
                
                // Android 11 (API 30) र सोभन्दा माथि MANAGE_EXTERNAL_STORAGE माग्ने
                if (androidInfo.version.sdkInt >= 30) {
                  final manageStatus = await Permission.manageExternalStorage.request();
                  isGranted = manageStatus.isGranted;
                  
                  // Android 13+ को लागि अडियो र नोटिफिकेसन पनि माग्ने
                  if (androidInfo.version.sdkInt >= 33) {
                    await Permission.audio.request();
                    await Permission.notification.request();
                  }
                } else {
                  // Android 10 र तलको लागि
                  final storageStatus = await Permission.storage.request();
                  isGranted = storageStatus.isGranted;
                }
              }

              if (isGranted && mounted) {
                Navigator.of(context).pushReplacement(MaterialPageRoute(builder: (_) => const FolderListScreen()));
              } else {
                setState(() => _needsPermission = true);
              }
            }

            @override
            Widget build(BuildContext context) {
              return Scaffold(
                body: Center(
                  child: _needsPermission
                      ? Column(
                          mainAxisAlignment: MainAxisAlignment.center,
                          children: [
                            const Icon(Icons.folder_special_rounded, size: 80, color: Colors.blueAccent),
                            const SizedBox(height: 20),
                            Text("All Files Access आवश्यक छ", style: GoogleFonts.poppins(fontSize: 18, fontWeight: FontWeight.bold)),
                            const SizedBox(height: 10),
                            const Padding(
                              padding: EdgeInsets.symmetric(horizontal: 40),
                              child: Text("गीतहरू प्ले गर्न र हटाउन (Delete) को लागि कृपया सेटिङ्समा गएर 'Allow access to manage all files' अन गर्नुहोस्।", textAlign: TextAlign.center, style: TextStyle(color: Colors.grey)),
                            ),
                            const SizedBox(height: 30),
                            ElevatedButton.icon(
                              onPressed: () async {
                                await openAppSettings();
                                setState(() => _needsPermission = false);
                                _checkPermissions();
                              },
                              icon: const Icon(Icons.settings),
                              label: const Text("Settings खोल्नुहोस्"),
                              style: ElevatedButton.styleFrom(backgroundColor: Colors.blueAccent, foregroundColor: Colors.white),
                            )
                          ],
                        )
                      : const CircularProgressIndicator(color: Colors.blueAccent),
                ),
              );
            }
          }

          class CustomFolder {
            final String name;
            final String path;
            final List<SongModel> songs;
            CustomFolder({required this.name, required this.path, required this.songs});
          }

          class FolderListScreen extends StatefulWidget {
            const FolderListScreen({super.key});
            @override
            State<FolderListScreen> createState() => _FolderListScreenState();
          }

          class _FolderListScreenState extends State<FolderListScreen> {
            final OnAudioQuery _audioQuery = OnAudioQuery();

            Future<List<CustomFolder>> _getFolders() async {
              List<SongModel> allSongs = await _audioQuery.querySongs();
              Map<String, List<SongModel>> parentPaths = {};
              for (var song in allSongs) {
                if (song.data == null) continue;
                final parentPath = File(song.data).parent.path;
                if (!parentPaths.containsKey(parentPath)) parentPaths[parentPath] = [];
                parentPaths[parentPath]!.add(song);
              }
              List<CustomFolder> folders = [];
              parentPaths.forEach((path, songs) {
                folders.add(CustomFolder(name: path.split(Platform.pathSeparator).last, path: path, songs: songs));
              });
              folders.sort((a, b) => a.name.toLowerCase().compareTo(b.name.toLowerCase()));
              return folders;
            }

            @override
            Widget build(BuildContext context) {
              return Scaffold(
                appBar: AppBar(title: Text("Folders", style: GoogleFonts.poppins(fontWeight: FontWeight.bold))),
                body: FutureBuilder<List<CustomFolder>>(
                  future: _getFolders(),
                  builder: (context, item) {
                    if (item.connectionState == ConnectionState.waiting) return const Center(child: CircularProgressIndicator(color: Colors.blueAccent));
                    if (!item.hasData || item.data!.isEmpty) return const Center(child: Text("कुनै मिडिया भेटिएन।"));
                    return ListView.builder(
                      itemCount: item.data!.length,
                      itemBuilder: (context, index) {
                        final folder = item.data![index];
                        return ListTile(
                          leading: const Icon(Icons.folder_rounded, color: Colors.amber, size: 40),
                          title: Text(folder.name, style: GoogleFonts.poppins(fontSize: 16)),
                          subtitle: Text("${folder.songs.length} media files", style: TextStyle(color: Colors.grey[400])),
                          onTap: () => Navigator.push(context, MaterialPageRoute(builder: (_) => SongListScreen(folder: folder))),
                        );
                      },
                    );
                  },
                ),
              );
            }
          }

          class SongListScreen extends StatefulWidget {
            final CustomFolder folder;
            const SongListScreen({super.key, required this.folder});
            @override
            State<SongListScreen> createState() => _SongListScreenState();
          }

          class _SongListScreenState extends State<SongListScreen> {
            final Set<int> _selectedIndices = {};
            bool _isSelectionMode = false;
            final TextEditingController _searchController = TextEditingController();
            List<SongModel> _filteredSongs = [];

            @override
            void initState() {
              super.initState();
              _filteredSongs = widget.folder.songs;
            }

            void _onSearch(String query) {
              setState(() {
                _filteredSongs = widget.folder.songs
                    .where((song) => song.title.toLowerCase().contains(query.toLowerCase()))
                    .toList();
              });
            }

            void _toggleSelection(int index) {
              setState(() {
                if (_selectedIndices.contains(index)) {
                  _selectedIndices.remove(index);
                  if (_selectedIndices.isEmpty) _isSelectionMode = false;
                } else {
                  _selectedIndices.add(index);
                  _isSelectionMode = true;
                }
              });
            }

            void _selectAll() {
              setState(() {
                if (_selectedIndices.length == _filteredSongs.length) {
                  _selectedIndices.clear();
                  _isSelectionMode = false;
                } else {
                  _selectedIndices.addAll(Iterable.generate(_filteredSongs.length));
                  _isSelectionMode = true;
                }
              });
            }

            Future<void> _confirmDelete() async {
              showDialog(
                context: context,
                builder: (context) => AlertDialog(
                  backgroundColor: const Color(0xFF1E1E1E),
                  title: Text("Delete Permanently?", style: GoogleFonts.poppins(color: Colors.white)),
                  content: Text("This media will be deleted permanently. This action cannot be undone.", style: TextStyle(color: Colors.grey[300])),
                  actions: [
                    TextButton(onPressed: () => Navigator.pop(context), child: const Text("Cancel", style: TextStyle(color: Colors.blueAccent))),
                    TextButton(
                      onPressed: () {
                        for (var index in _selectedIndices) {
                          try { File(_filteredSongs[index].data).deleteSync(); } catch (e) { debugPrint("Delete Error: \$e"); }
                        }
                        Navigator.pop(context);
                        Navigator.pop(context); // फोल्डर लिस्टमा फर्किन
                      },
                      child: const Text("Delete", style: TextStyle(color: Colors.redAccent)),
                    ),
                  ],
                ),
              );
            }

            @override
            Widget build(BuildContext context) {
              return Scaffold(
                appBar: AppBar(
                  leading: _isSelectionMode ? IconButton(icon: const Icon(Icons.close), onPressed: () => setState(() { _selectedIndices.clear(); _isSelectionMode = false; })) : null,
                  title: _isSelectionMode 
                    ? Text("${_selectedIndices.length} Selected") 
                    : TextField(
                        controller: _searchController,
                        onChanged: _onSearch,
                        style: const TextStyle(color: Colors.white),
                        decoration: InputDecoration(hintText: "Search media...", hintStyle: TextStyle(color: Colors.grey[400]), border: InputBorder.none),
                      ),
                  actions: _isSelectionMode ? [
                    IconButton(icon: const Icon(Icons.select_all), onPressed: _selectAll, tooltip: "Select All"),
                    IconButton(icon: const Icon(Icons.play_circle_fill), onPressed: () {
                      List<SongModel> selected = _selectedIndices.map((i) => _filteredSongs[i]).toList();
                      Navigator.push(context, MaterialPageRoute(builder: (_) => PlayerScreen(songs: selected, initialIndex: 0)));
                    }, tooltip: "Play Selected"),
                    IconButton(icon: const Icon(Icons.delete), onPressed: _confirmDelete, tooltip: "Delete Selected"),
                  ] : null,
                ),
                body: ListView.builder(
                  itemCount: _filteredSongs.length,
                  itemBuilder: (context, index) {
                    final song = _filteredSongs[index];
                    final isSelected = _selectedIndices.contains(index);
                    return ListTile(
                      tileColor: isSelected ? Colors.blueAccent.withOpacity(0.2) : null,
                      leading: Icon(isSelected ? Icons.check_circle : Icons.music_note_rounded, color: isSelected ? Colors.blueAccent : Colors.grey[400], size: 30),
                      title: Text(song.title, maxLines: 1, overflow: TextOverflow.ellipsis, style: GoogleFonts.poppins(fontSize: 15)),
                      onLongPress: () => _toggleSelection(index),
                      onTap: () {
                        if (_isSelectionMode) { _toggleSelection(index); }
                        else { Navigator.push(context, MaterialPageRoute(builder: (_) => PlayerScreen(songs: _filteredSongs, initialIndex: index))); }
                      },
                    );
                  },
                ),
              );
            }
          }

          class PlayerScreen extends StatefulWidget {
            final List<SongModel> songs;
            final int initialIndex;
            const PlayerScreen({super.key, required this.songs, required this.initialIndex});
            @override
            State<PlayerScreen> createState() => _PlayerScreenState();
          }

          class _PlayerScreenState extends State<PlayerScreen> {
            bool _isPlaying = false;
            Duration _position = Duration.zero;
            Duration _duration = Duration.zero;

            @override
            void initState() {
              super.initState();
              PlayerManager.currentPlaylist = widget.songs;
              PlayerManager.currentIndex = widget.initialIndex;
              _setupPlayer();
              _playCurrent();
            }

            void _setupPlayer() {
              PlayerManager.player.onPositionChanged.listen((p) => { if(mounted) setState(() => _position = p) });
              PlayerManager.player.onDurationChanged.listen((d) => { if(mounted) setState(() => _duration = d) });
              PlayerManager.player.onPlayerComplete.listen((_) => _next());
            }

            void _playCurrent() async {
              await PlayerManager.player.stop();
              await PlayerManager.player.play(DeviceFileSource(PlayerManager.currentPlaylist[PlayerManager.currentIndex].data));
              if(mounted) setState(() => _isPlaying = true);
            }

            void _next() { if (PlayerManager.currentIndex < PlayerManager.currentPlaylist.length - 1) { PlayerManager.currentIndex++; _playCurrent(); } }
            void _prev() { if (PlayerManager.currentIndex > 0) { PlayerManager.currentIndex--; _playCurrent(); } }

            String _formatTime(Duration d) => d.toString().split('.').first.padLeft(8, "0").substring(2);

            @override
            Widget build(BuildContext context) {
              final song = PlayerManager.currentPlaylist[PlayerManager.currentIndex];
              return PopScope(
                canPop: true,
                child: Scaffold(
                  appBar: AppBar(title: Text("Now Playing", style: GoogleFonts.poppins()), centerTitle: true, elevation: 0),
                  body: Padding(
                    padding: const EdgeInsets.all(25),
                    child: Column(
                      mainAxisAlignment: MainAxisAlignment.center,
                      children: [
                        Container(
                          padding: const EdgeInsets.all(40),
                          decoration: BoxDecoration(color: const Color(0xFF1E1E1E), shape: BoxShape.circle, boxShadow: [BoxShadow(color: Colors.blueAccent.withOpacity(0.2), blurRadius: 20, spreadRadius: 5)]),
                          child: const Icon(Icons.music_note_rounded, size: 100, color: Colors.blueAccent),
                        ),
                        const SizedBox(height: 40),
                        Text(song.title, textAlign: TextAlign.center, maxLines: 2, overflow: TextOverflow.ellipsis, style: GoogleFonts.poppins(fontSize: 22, fontWeight: FontWeight.bold)),
                        const SizedBox(height: 10),
                        Text(song.artist ?? "Unknown Artist", style: GoogleFonts.poppins(fontSize: 16, color: Colors.grey)),
                        const SizedBox(height: 40),
                        SliderTheme(
                          data: SliderTheme.of(context).copyWith(thumbColor: Colors.blueAccent, activeTrackColor: Colors.blueAccent, inactiveTrackColor: Colors.grey[800], trackHeight: 4),
                          child: Slider(
                            value: _position.inSeconds.toDouble(),
                            max: _duration.inSeconds.toDouble() > 0 ? _duration.inSeconds.toDouble() : 1.0,
                            onChanged: (v) => PlayerManager.player.seek(Duration(seconds: v.toInt())),
                          ),
                        ),
                        Padding(
                          padding: const EdgeInsets.symmetric(horizontal: 10),
                          child: Row(
                            mainAxisAlignment: MainAxisAlignment.spaceBetween,
                            children: [
                              Text(_formatTime(_position), style: TextStyle(color: Colors.grey[400])),
                              Text(_formatTime(_duration), style: TextStyle(color: Colors.grey[400])),
                            ],
                          ),
                        ),
                        const SizedBox(height: 40),
                        Row(
                          mainAxisAlignment: MainAxisAlignment.spaceEvenly,
                          children: [
                            IconButton(icon: const Icon(Icons.skip_previous_rounded, size: 45), color: Colors.white, onPressed: _prev),
                            FloatingActionButton.large(
                              backgroundColor: Colors.blueAccent,
                              onPressed: () { if (_isPlaying) PlayerManager.player.pause(); else PlayerManager.player.resume(); setState(() => _isPlaying = !_isPlaying); },
                              child: Icon(_isPlaying ? Icons.pause_rounded : Icons.play_arrow_rounded, size: 50, color: Colors.white),
                            ),
                            IconButton(icon: const Icon(Icons.skip_next_rounded, size: 45), color: Colors.white, onPressed: _next),
                          ],
                        ),
                      ],
                    ),
                  ),
                ),
              );
            }
          }
          EOF

      - name: Build APK
        run: |
          flutter pub get
          flutter build apk --release

      - name: Upload NKPlayer APK
        uses: actions/upload-artifact@v4
        with:
          name: NKPlayer-ManageStorage-Enabled
          path: build/app/outputs/flutter-apk/app-release.apk
