                                          button: true,
                                          container: true,
                                          excludeSemantics: true,
                                          child: IconButton(
                                            icon: const Icon(Icons.clear),
                                            onPressed: () => _sc.clear(),
                                          ),
                                        )
                                      : null,
                                ),
                              )
                            : Text('Folders', style: GoogleFonts.poppins()),
                    actions: [
                      if (_isFolderSel) ...[
                        Semantics(
                          label: 'select all folders button',
                          button: true,
                          excludeSemantics: true,
                          child: IconButton(
                            icon: const Icon(Icons.select_all),
                            onPressed: () => setState(() =>
                                _selFolders.addAll(Iterable.generate(_folders.length))),
                          ),
                        ),
                        Semantics(
                          label: 'play selected folders button',
                          button: true,
                          excludeSemantics: true,
                          child: IconButton(
                            icon: const Icon(Icons.play_circle),
                            onPressed: () {
                              final songs = _selFolders
                                  .expand((i) => _folders[i].songs)
