name: NKPlayer - Final Folder Grouping Fix
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'

      - name: Generate NKPlayer Project
        run: |
          # 1. Create project with Correct App Name
          flutter create --org com.nareshkushmi --project-name nkplayer .
          
          # Change Label in Android Manifest to NKPlayer
          sed -i 's/android:label="nkplayer"/android:label="NKPlayer"/' android/app/src/main/AndroidManifest.xml

          # 2. Update pubspec.yaml with full libraries
          cat <<EOF > pubspec.yaml
          name: nkplayer
          description: NKPlayer by Naresh Kushmi with physical folder grouping and final refinement.
          version: 1.0.0+1
          publish_to: 'none'
          environment:
            sdk: '>=3.0.0 <4.0.0'
          dependencies:
            flutter:
              sdk: flutter
            audioplayers: ^5.2.1
            on_audio_query: ^2.9.0
            permission_handler: ^11.3.0
            google_fonts: ^6.1.0
          flutter:
            uses-material-design: true
          EOF

          # 3. Add Permissions safely (Android 13+ support)
          python3 -c "
          import os
          path = 'android/app/src/main/AndroidManifest.xml'
          with open(path, 'r') as f:
              content = f.read()
          perms = '    <uses-permission android:name=\"android.permission.READ_EXTERNAL_STORAGE\" />\n    <uses-permission android:name=\"android.permission.READ_MEDIA_AUDIO\" />\n'
          new_content = content.replace('<application', perms + '    <application')
          with open(path, 'w') as f:
              f.write(new_content)
          "

          # 4. Create main.dart with physical folder grouping logic, A-Z sort, Full controls, Beautiful UI
          cat <<'EOF' > lib/main.dart
          import 'dart:io';
          import 'package:flutter/material.dart';
          import 'package:on_audio_query/on_audio_query.dart';
          import 'package:audioplayers/audioplayers.dart';
          import 'package:permission_handler/permission_handler.dart';
          import 'package:google_fonts/google_fonts.dart';

          void main() => runApp(MaterialApp(
                title: 'NKPlayer',
                debugShowCheckedModeBanner: false,
                theme: ThemeData.dark().copyWith(
                  primaryColor: Colors.blueAccent,
                  scaffoldBackgroundColor: const Color(0xFF0F0F0F),
                ),
                home: const PermissionHandlerScreen(),
              ));

          // Step 1: Handle Permissions Automatically
          class PermissionHandlerScreen extends StatefulWidget {
            const PermissionHandlerScreen({super.key});
            @override
            State<PermissionHandlerScreen> createState() => _PermissionHandlerScreenState();
          }

          class _PermissionHandlerScreenState extends State<PermissionHandlerScreen> {
            @override
            void initState() {
              super.initState();
              _checkPermissions();
            }

            Future<void> _checkPermissions() async {
              if (await Permission.audio.request().isGranted || await Permission.storage.request().isGranted) {
                if (mounted) Navigator.of(context).pushReplacement(MaterialPageRoute(builder: (_) => const FolderListScreen()));
              }
            }

            @override
            Widget build(BuildContext context) {
              return const Scaffold(body: Center(child: CircularProgressIndicator()));
            }
          }

          // Custom data class for our physical folder view
          class CustomFolder {
            final String name;
            final String path;
            final List<SongModel> songs;

            CustomFolder({required this.name, required this.path, required this.songs});
          }

          // Step 2: Show Folders List (custom grouping by physical parent path)
          class FolderListScreen extends StatefulWidget {
            const FolderListScreen({super.key});
            @override
            State<FolderListScreen> createState() => _FolderListScreenState();
          }

          class _FolderListScreenState extends State<FolderListScreen> {
            final OnAudioQuery _audioQuery = OnAudioQuery();

            Future<List<CustomFolder>> _getFolders() async {
              // 1. Query ALL songs
              List<SongModel> allSongs = await _audioQuery.querySongs();
              
              // 2. Map of ParentPath -> List of Songs
              Map<String, List<SongModel>> parentPaths = {};
              
              for (var song in allSongs) {
                if (song.data == null) continue; // Skip if no physical path
                final parentPath = File(song.data).parent.path;
                if (!parentPaths.containsKey(parentPath)) {
                  parentPaths[parentPath] = [];
                }
                parentPaths[parentPath]!.add(song);
              }
              
              // 3. Convert map to CustomFolder objects
              List<CustomFolder> validFolders = [];
              parentPaths.forEach((path, songs) {
                // Name is last part of the path
                final folderName = path.split(Platform.pathSeparator).last;
                validFolders.add(CustomFolder(
                  name: folderName,
                  path: path,
                  songs: songs,
                ));
              });
              
              // 4. Sort folders by name (A-Z)
              validFolders.sort((a, b) => a.name.toLowerCase().compareTo(b.name.toLowerCase()));
              
              return validFolders;
            }

            @override
            Widget build(BuildContext context) {
              return Scaffold(
                appBar: AppBar(
                  title: Text("Folders", style: GoogleFonts.poppins(fontWeight: FontWeight.bold)),
                  centerTitle: true,
                  backgroundColor: Colors.transparent,
                  elevation: 0,
                ),
                body: FutureBuilder<List<CustomFolder>>(
                  future: _getFolders(),
                  builder: (context, item) {
                    if (item.data == null) return const Center(child: CircularProgressIndicator());
                    if (item.data!.isEmpty) return const Center(child: Text("No Music Folders Found"));
                    
                    return ListView.builder(
                      itemCount: item.data!.length,
                      itemBuilder: (context, index) {
                        final folder = item.data![index];
                        return ListTile(
                          leading: Container(
                            height: 50, width: 50,
                            decoration: BoxDecoration(color: Colors.grey[900], borderRadius: BorderRadius.circular(10)),
                            child: const Icon(Icons.folder_rounded, color: Colors.amber, size: 30),
                          ),
                          title: Text(folder.name, style: GoogleFonts.poppins(fontSize: 18, fontWeight: FontWeight.w600)),
                          subtitle: Text("${folder.songs.length} Songs", style: const TextStyle(color: Colors.grey)),
                          onTap: () {
                            // Sort songs by title before navigation (A-Z)
                            folder.songs.sort((a, b) => a.title.toLowerCase().compareTo(b.title.toLowerCase()));
                            Navigator.push(context, MaterialPageRoute(
                              builder: (_) => SongListScreen(folder: folder)
                            ));
                          },
                        );
                      },
                    );
                  },
                ),
              );
            }
          }

          // Step 3: Show Songs List (from CustomFolder, sorted by Title A-Z)
          class SongListScreen extends StatelessWidget {
            final CustomFolder folder;
            const SongListScreen({super.key, required this.folder});

            @override
            Widget build(BuildContext context) {
              return Scaffold(
                appBar: AppBar(
                  title: Text(folder.name, style: GoogleFonts.poppins()),
                  centerTitle: true,
                  backgroundColor: Colors.transparent,
                  elevation: 0,
                ),
                body: ListView.builder(
                  itemCount: folder.songs.length,
                  itemBuilder: (context, index) {
                    final song = folder.songs[index];
                    return ListTile(
                      leading: Container(
                        height: 50, width: 50,
                        decoration: BoxDecoration(color: Colors.blueGrey[900], borderRadius: BorderRadius.circular(10)),
                        child: const Icon(Icons.music_note_rounded, size: 30, color: Colors.blueAccent),
                      ),
                      title: Text(song.title, maxLines: 1, overflow: TextOverflow.ellipsis, style: GoogleFonts.poppins(fontSize: 16)),
                      subtitle: Text(song.artist ?? "Unknown", style: const TextStyle(color: Colors.grey)),
                      onTap: () => Navigator.push(context, MaterialPageRoute(
                        builder: (_) => PlayerScreen(songs: folder.songs, initialIndex: index)
                      )),
                    );
                  },
                ),
              );
            }
          }

          // Step 4: Powerful Player Screen (beautiful UI, full controls, accessibility)
          class PlayerScreen extends StatefulWidget {
            final List<SongModel> songs;
            final int initialIndex;
            const PlayerScreen({super.key, required this.songs, required this.initialIndex});

            @override
            State<PlayerScreen> createState() => _PlayerScreenState();
          }

          class _PlayerScreenState extends State<PlayerScreen> {
            final AudioPlayer _player = AudioPlayer();
            late int _currentIndex;
            bool _isPlaying = false;
            Duration _position = Duration.zero;
            Duration _duration = Duration.zero;

            @override
            void initState() {
              super.initState();
              _currentIndex = widget.initialIndex;
              _playCurrentSong();
              _player.onPositionChanged.listen((p) => setState(() => _position = p));
              _player.onDurationChanged.listen((d) => setState(() => _duration = d));
              _player.onPlayerComplete.listen((_) => _nextSong());
            }

            Future<void> _playCurrentSong() async {
              await _player.stop();
              await _player.play(DeviceFileSource(widget.songs[_currentIndex].data));
              setState(() => _isPlaying = true);
            }

            void _togglePlay() async {
              if (_isPlaying) { await _player.pause(); } 
              else { await _player.resume(); }
              setState(() => _isPlaying = !_isPlaying);
            }

            void _nextSong() {
              if (_currentIndex < widget.songs.length - 1) {
                _currentIndex++;
                _playCurrentSong();
              }
            }

            void _prevSong() {
              if (_currentIndex > 0) {
                _currentIndex--;
                _playCurrentSong();
              }
            }

            String _formatTime(Duration d) {
              return d.toString().split('.').first.padLeft(8, "0").substring(2);
            }

            @override
            void dispose() { _player.dispose(); super.dispose(); }

            @override
            Widget build(BuildContext context) {
              final song = widget.songs[_currentIndex];
              return Scaffold(
                backgroundColor: const Color(0xFF0A0A0A),
                appBar: AppBar(
                  title: const Text("Now Playing"),
                  centerTitle: true,
                  backgroundColor: Colors.transparent,
                  elevation: 0,
                ),
                body: Semantics(
                  label: "Player Screen for ${song.title}",
                  child: Padding(
                    padding: const EdgeInsets.symmetric(horizontal: 25),
                    child: Column(
                      mainAxisAlignment: Main => _currentIndex = widget.initialIndex;
              _playCurrentSong();
              _player.onPositionChanged.listen((p) => setState(() => _position = p));
              _player.onDurationChanged.listen((d) => setState(() => _duration = d));
              _player.onPlayerComplete.listen((_) => _nextSong());
            }

            Future<void> _playCurrentSong() async {
              await _player.stop();
              await _player.play(DeviceFileSource(widget.songs[_currentIndex].data));
              setState(() => _isPlaying = true);
            }

            void _togglePlay() async {
              if (_isPlaying) { await _player.pause(); } 
              else { await _player.resume(); }
              setState(() => _isPlaying = !_isPlaying);
            }

            void _nextSong() {
              if (_currentIndex < widget.songs.length - 1) {
                _currentIndex++;
                _playCurrentSong();
              }
            }

            void _prevSong() {
              if (_currentIndex > 0) {
                _currentIndex--;
                _playCurrentSong();
              }
            }

            String _formatTime(Duration d) {
              return d.toString().split('.').first.padLeft(8, "0").substring(2);
            }

            @override
            void dispose() { _player.dispose(); super.dispose(); }

            @override
            Widget build(BuildContext context) {
              final song = widget.songs[_currentIndex];
              return Scaffold(
                backgroundColor: const Color(0xFF0A0A0A),
                appBar: AppBar(
                  title: const Text("Now Playing"),
                  centerTitle: true,
                  backgroundColor: Colors.transparent,
                  elevation: 0,
                ),
                body: Semantics(
                  label: "Player Screen for ${song.title}",
                  child: Padding(
                    padding: const EdgeInsets.symmetric(horizontal: 25),
                    child: Column(
                      mainAxisAlignment: MainAxisAlignment.center,
                      children: [
                        // Beautiful Visualization
                        Container(
                          height: 280, width: double.infinity,
                          decoration: BoxDecoration(
                            gradient: const LinearGradient(colors: [Colors.blueAccent, Colors.deepPurple], begin: Alignment.topLeft, end: Alignment.bottomRight),
                            borderRadius: BorderRadius.circular(30),
                            boxShadow: [BoxShadow(color: Colors.blueAccent.withOpacity(0.3), blurRadius: 20)],
                          ),
                          child: const Icon(Icons.music_note_rounded, size: 150, color: Colors.white),
                        ),
                        const SizedBox(height: 50),

                        // Track Info
                        Text(song.title, textAlign: TextAlign.center, maxLines: 2, overflow: TextOverflow.ellipsis, style: GoogleFonts.poppins(fontSize: 22, fontWeight: FontWeight.bold, color: Colors.white)),
                        Text(song.artist ?? "Unknown Artist", style: GoogleFonts.poppins(color: Colors.grey[400])),
                        
                        const SizedBox(height: 30),

                        // Slider Theme
                        SliderTheme(
                          data: SliderTheme.of(context).copyWith(trackHeight: 4, thumbShape: const RoundSliderThumbShape(enabledThumbRadius: 8)),
                          child: Slider(
                            activeColor: Colors.blueAccent,
                            inactiveColor: Colors.grey[800],
                            value: _position.inSeconds.toDouble(),
                            max: _duration.inSeconds.toDouble() > 0 ? _duration.inSeconds.toDouble() : 1.0,
                            onChanged: (v) => _player.seek(Duration(seconds: v.toInt())),
                          ),
                        ),
                        
                        // Time labels
                        Padding(
                          padding: const EdgeInsets.symmetric(horizontal: 10),
                          child: Row(
                            mainAxisAlignment: MainAxisAlignment.spaceBetween,
                            children: [
                              Text(_formatTime(_position), style: const TextStyle(color: Colors.white70)),
                              Text(_formatTime(_duration), style: const TextStyle(color: Colors.white70)),
                            ],
                          ),
                        ),
                        const SizedBox(height: 40),

                        // Controls Row with updated Semantics
                        Row(
                          mainAxisAlignment: MainAxisAlignment.spaceEvenly,
                          children: [
                            Semantics(
                              label: "Previous song", button: true,
                              child: IconButton(icon: const Icon(Icons.skip_previous_rounded, size: 50, color: Colors.white), onPressed: _prevSong),
                            ),
                            
                            // Beautiful Play/Pause Circle
                            Semantics(
                              label: _isPlaying ? "Pause button" : "Play button", button: true,
                              child: FloatingActionButton.large(
                                backgroundColor: Colors.blueAccent,
                                onPressed: _togglePlay,
                                child: Icon(_isPlaying ? Icons.pause_rounded : Icons.play_arrow_rounded, size: 60, color: Colors.white),
                              ),
                            ),
                            
                            Semantics(
                              label: "Next song", button: true,
                              child: IconButton(icon: const Icon(Icons.skip_next_rounded, size: 50, color: Colors.white), onPressed: _nextSong),
                            ),
                          ],
                        ),
                      ],
                    ),
                  ),
                ),
              );
            }
          }
          EOF

      - name: Build APK
        run: |
          flutter pub get
          flutter build apk --release

      - name: Upload NKPlayer APK
        uses: actions/upload-artifact@v4
        with:
          name: NKPlayer-Final-v4
          path: build/app/outputs/flutter-apk/app-release.apk
