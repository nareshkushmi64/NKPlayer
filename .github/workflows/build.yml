            void initState() {
              super.initState();
              _filtered = widget.folder.songs;
              _filteredVideos = widget.folder.videoPaths;
              _sc.addListener(() => setState(() {
                    final q = _sc.text.toLowerCase();
                    _filtered = widget.folder.songs.where((s) =>
                        s.title.toLowerCase().contains(q)).toList();
