          class _FolderListScreenState extends State<FolderListScreen> {
            final _sc = TextEditingController();
            final _focus = FocusNode();
            bool _searching = false;
            List<CustomFolder> _folders = [];
            List<SongModel> _all = [], _filtered = [];
            bool _loading = true;
            final Set<int> _selFolders = {};
            bool _isFolderSel = false;

            @override
            void initState() {
              super.initState();
              _load();
              _sc.addListener(() => setState(() {
                    _filtered = _all.where((s) => s.title.toLowerCase()
                        .contains(_sc.text.toLowerCase())).toList();
                  }));
            }

            @override
            void dispose() {
              _sc.dispose();
              _focus.dispose();
              super.dispose();
            }

            // Back press: 1st → close keyboard, 2nd → close search
            bool _handleBack() {
              if (_isFolderSel) {
                setState(() { _selFolders.clear(); _isFolderSel = false; });
                return true;
              }
              if (_searching) {
                if (_focus.hasFocus) { _focus.unfocus(); return true; }
                setState(() { _searching = false; _sc.clear(); });
                return true;
              }
              return false;
            }

            void _showSettings(BuildContext context) {
              Navigator.push(context, MaterialPageRoute(
                  builder: (_) => const SettingsScreen()));
            }

            Future<void> _load() async {
              final songs = await OnAudioQuery().querySongs();
              final videoExts = {'mp4','mkv','avi','mov','wmv','flv','webm','3gp','m4v','ts','mts','m2ts','vob','rmvb','rm','asf','divx','f4v','ogv','mxf','m2v','mpg','mpeg','mp2','m1v','m4b','3g2','3gpp','3gpp2','amv','nsv','nuv','qt'};
              final audioExts = {'mp3','m4a','aac','ogg','flac','wav','wma','opus','aiff','aif','ape','alac','ac3','dts','mp2','mka','ra','ram','mid','midi','amr','awb','m4b','m4r','oga','spx','caf','au','snd','gsm','vox','pcm','adts'};

              final Map<String, List<SongModel>> audioMap = {};
              for (var s in songs) {
                if (s.data.isEmpty) continue;
                audioMap.putIfAbsent(File(s.data).parent.path, () => []).add(s);
              }

              final Map<String, List<String>> videoMap = {};

              // Recursive scan — skip hidden/system folders
              final skipDirs = {
                'Android', 'data', 'obb', '.thumbnails',
                'cache', 'Cache', '.cache', 'tmp',
              };

              Future<void> scanRecursive(Directory dir, int depth) async {
                if (depth > 8) return; // max 8 levels deep
                try {
                  final entities = dir.listSync(followLinks: false);
                  for (final e in entities) {
                    if (e is File) {
                      final ext = e.path.toLowerCase().split('.').last;
                      if (videoExts.contains(ext)) {
                        videoMap.putIfAbsent(e.parent.path, () => []).add(e.path);
                      }
                    } else if (e is Directory) {
                      final name = e.path.split('/').last;
                      if (!name.startsWith('.') && !skipDirs.contains(name)) {
                        await scanRecursive(e, depth + 1);
                      }
                    }
                  }
                } catch (_) {}
              }

              try {
                await scanRecursive(Directory('/storage/emulated/0'), 0);
              } catch (_) {}

              final allDirs = <String>{...audioMap.keys, ...videoMap.keys};
              final folders = allDirs.map((dir) => CustomFolder(
                name: dir.split('/').last,
                songs: audioMap[dir] ?? [],
                videoPaths: videoMap[dir] ?? [],
              )).toList();
              folders.sort((a, b) => a.name.compareTo(b.name));

              setState(() {
                _all = songs;
                _folders = folders;
                _loading = false;
              });
            }

