name: NKPlayer - Voice Search and Playback Fix
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'

      - name: Generate NKPlayer Project
        run: |
          flutter create --org com.nareshkushmi --project-name nkplayer .
          
          # 1. Update pubspec.yaml with speech_to_text and core audio fixes
          cat <<EOF > pubspec.yaml
          name: nkplayer
          description: NKPlayer Pro with Voice Search and Background Play.
          version: 1.0.2+16
          publish_to: 'none'
          environment:
            sdk: '>=3.3.0 <4.0.0'
          dependencies:
            flutter:
              sdk: flutter
            just_audio: ^0.9.38
            audio_service: ^0.18.15
            on_audio_query: ^2.9.0
            permission_handler: ^11.3.0
            google_fonts: ^6.2.0
            speech_to_text: ^6.6.2
            rxdart: ^0.27.7
          flutter:
            uses-material-design: true
          EOF

          # 2. Update Android Manifest (Permissions for Voice & Media)
          cat <<EOF > android/app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET"/>
              <uses-permission android:name="android.permission.RECORD_AUDIO" />
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE_MEDIA_PLAYBACK" />
              <uses-permission android:name="android.permission.READ_MEDIA_AUDIO" />
              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" android:maxSdkVersion="32" />

              <queries>
                  <intent-filter>
                      <action android:name="android.speech.RecognitionService" />
                  </intent-filter>
              </queries>

              <application
                  android:label="NKPlayer"
                  android:name="\${applicationName}"
                  android:icon="@mipmap/ic_launcher"
                  android:requestLegacyExternalStorage="true"
                  android:usesCleartextTraffic="true">
                  <activity
                      android:name="com.nareshkushmi.nkplayer.MainActivity"
                      android:exported="true"
                      android:launchMode="singleTop"
                      android:theme="@style/LaunchTheme"
                      android:configChanges="orientation|keyboardHidden|keyboard|screenSize|smallestScreenSize|locale|layoutDirection|fontScale|screenLayout|density|uiMode"
                      android:hardwareAccelerated="true"
                      android:windowSoftInputMode="adjustResize">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
                  <service android:name="com.ryanheise.audioservice.AudioService"
                      android:foregroundServiceType="mediaPlayback"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MEDIA_BUTTON" />
                      </intent-filter>
                  </service>
              </application>
          </manifest>
          EOF

          # 3. Comprehensive main.dart logic
          cat <<'EOF' > lib/main.dart
          import 'dart:async';
          import 'dart:io';
          import 'package:flutter/material.dart';
          import 'package:just_audio/just_audio.dart';
          import 'package:audio_service/audio_service.dart';
          import 'package:on_audio_query/on_audio_query.dart';
          import 'package:permission_handler/permission_handler.dart';
          import 'package:google_fonts/google_fonts.dart';
          import 'package:speech_to_text/speech_to_text.dart';
          import 'package:rxdart/rxdart.dart';

          late AudioHandler _audioHandler;
          final _audioQuery = OnAudioQuery();

          Future<void> main() async {
            WidgetsFlutterBinding.ensureInitialized();
            _audioHandler = await AudioService.init(
              builder: () => MyAudioHandler(),
              config: const AudioServiceConfig(
                androidNotificationChannelId: 'com.nareshkushmi.nkplayer.audio',
                androidNotificationChannelName: 'NKPlayer Playback',
                androidNotificationOngoing: true,
              ),
            );
            runApp(const MaterialApp(
              title: 'NKPlayer',
              debugShowCheckedModeBanner: false,
              themeMode: ThemeMode.dark,
              home: PermissionGate(),
            ));
          }

          class MyAudioHandler extends BaseAudioHandler with QueueHandler, SeekHandler {
            final _player = AudioPlayer();
            MyAudioHandler() {
              _player.playbackStateStream.map(_transformEvent).pipe(playbackState);
              _player.currentIndexStream.listen((index) {
                if (index != null && queue.value.isNotEmpty) mediaItem.add(queue.value[index]);
              });
            }

            PlaybackState _transformEvent(PlayerState event) {
              return PlaybackState(
                controls: [MediaControl.skipToPrevious, if (_player.playing) MediaControl.pause else MediaControl.play, MediaControl.skipToNext],
                systemActions: const {MediaAction.seek},
                androidCompactIndices: const [0, 1, 2],
                processingState: const {
                  ProcessingState.idle: AudioProcessingState.idle,
                  ProcessingState.loading: AudioProcessingState.loading,
                  ProcessingState.buffering: AudioProcessingState.buffering,
                  ProcessingState.ready: AudioProcessingState.ready,
                  ProcessingState.completed: AudioProcessingState.completed,
                }[_player.processingState]!,
                playing: _player.playing,
                updatePosition: _player.position,
                bufferedPosition: _player.bufferedPosition,
                queueIndex: _player.currentIndex,
              );
            }

            @override Future<void> play() => _player.play();
            @override Future<void> pause() => _player.pause();
            @override Future<void> skipToNext() => _player.seekToNext();
            @override Future<void> skipToPrevious() => _player.seekToPrevious();
            @override Future<void> seek(Duration position) => _player.seek(position);

            Future<void> setPlaylist(List<MediaItem> items, int index) async {
              final sources = items.map((i) => AudioSource.uri(Uri.parse('file://${i.extras!['path']}'))).toList();
              queue.add(items);
              await _player.setAudioSource(ConcatenatingAudioSource(children: sources), initialIndex: index);
              _player.play();
            }
          }

          class PermissionGate extends StatefulWidget {
            const PermissionGate({super.key});
            @override State<PermissionGate> createState() => _PermissionGateState();
          }

          class _PermissionGateState extends State<PermissionGate> {
            @override void initState() { super.initState(); _init(); }
            _init() async {
              await [Permission.storage, Permission.audio, Permission.microphone].request();
              if (mounted) Navigator.pushReplacement(context, MaterialPageRoute(builder: (_) => const HomeScreen()));
            }
            @override Widget build(BuildContext context) => const Scaffold(body: Center(child: CircularProgressIndicator()));
          }

          class HomeScreen extends StatelessWidget {
            const HomeScreen({super.key});
            @override Widget build(BuildContext context) {
              return Scaffold(
                backgroundColor: Colors.black,
                appBar: AppBar(
                  backgroundColor: Colors.black,
                  title: const Text("NKPlayer"),
                  actions: [
                    IconButton(icon: const Icon(Icons.search), onPressed: () => showSearch(context: context, delegate: MusicSearch(allSongs: null))),
                  ],
                ),
                body: FutureBuilder<List<AlbumModel>>(
                  future: _audioQuery.queryAlbums(),
                  builder: (context, snap) {
                    if (!snap.hasData) return const Center(child: CircularProgressIndicator());
                    return ListView.builder(
                      itemCount: snap.data!.length,
                      itemBuilder: (context, i) {
                        final album = snap.data![i];
                        return ListTile(
                          leading: const Icon(Icons.folder, color: Colors.blueAccent),
                          title: Text(album.album),
                          subtitle: Text("${album.numOfSongs} files"),
                          onTap: () => Navigator.push(context, MaterialPageRoute(builder: (_) => FolderPage(album: album))),
                        );
                      },
                    );
                  },
                ),
              );
            }
          }

          class FolderPage extends StatefulWidget {
            final AlbumModel album;
            const FolderPage({super.key, required this.album});
            @override State<FolderPage> createState() => _FolderPageState();
          }

          class _FolderPageState extends State<FolderPage> {
            final Set<int> _selected = {};
            bool _isMulti = false;

            @override Widget build(BuildContext context) {
              return FutureBuilder<List<SongModel>>(
                future: _audioQuery.queryAudiosFrom(AudiosFromType.ALBUM_ID, widget.album.id),
                builder: (context, snap) {
                  if (!snap.hasData) return const Scaffold(body: Center(child: CircularProgressIndicator()));
                  final songs = snap.data!;
                  return Scaffold(
                    backgroundColor: Colors.black,
                    appBar: AppBar(
                      backgroundColor: Colors.black,
                      leading: _isMulti ? IconButton(icon: const Icon(Icons.close), onPressed: () => setState(() { _isMulti = false; _selected.clear(); })) : null,
                      title: Text(_isMulti ? "${_selected.length} Selected" : widget.album.album),
                      actions: [
                        if (_isMulti) ...[
                          IconButton(icon: const Icon(Icons.select_all), onPressed: () => setState(() => _selected.addAll(Iterable.generate(songs.length)))),
                          IconButton(icon: const Icon(Icons.delete), onPressed: () => _deleteDialog(context, songs)),
                        ] else IconButton(icon: const Icon(Icons.search), onPressed: () => showSearch(context: context, delegate: MusicSearch(allSongs: songs))),
                      ],
                    ),
                    body: ListView.builder(
                      itemCount: songs.length,
                      itemBuilder: (context, i) {
                        final s = songs[i];
                        final isSel = _selected.contains(i);
                        return ListTile(
                          selected: isSel,
                          leading: Icon(_isMulti ? (isSel ? Icons.check_circle : Icons.radio_button_unchecked) : Icons.music_note),
                          title: Text(s.title, maxLines: 1),
                          onLongPress: () => setState(() { _isMulti = true; _selected.add(i); }),
                          onTap: () {
                            if (_isMulti) setState(() => _selected.contains(i) ? _selected.remove(i) : _selected.add(i));
                            else Navigator.push(context, MaterialPageRoute(builder: (_) => PlayerPage(songs: songs, index: i)));
                          },
                        );
                      },
                    ),
                  );
                },
              );
            }

            void _deleteDialog(BuildContext context, List<SongModel> songs) {
              final isPlural = _selected.length > 1;
              showDialog(context: context, builder: (ctx) => AlertDialog(
                title: const Text("Delete Permanently?"),
                content: Text("${isPlural ? 'All media' : 'This media'} will be deleted permanently. This action cannot be undone."),
                actions: [
                  TextButton(onPressed: () => Navigator.pop(ctx), child: const Text("Cancel")),
                  TextButton(onPressed: () {
                    for (var i in _selected) { try { File(songs[i].data).deleteSync(); } catch (_) {} }
                    Navigator.pop(ctx);
                    setState(() { _isMulti = false; _selected.clear(); });
                  }, child: const Text("OK", style: TextStyle(color: Colors.red))),
                ],
              ));
            }
          }

          class MusicSearch extends SearchDelegate {
            final List<SongModel>? allSongs;
            final SpeechToText _speech = SpeechToText();
            MusicSearch({this.allSongs});

            @override List<Widget> buildActions(BuildContext context) => [
              if (query.isEmpty) Semantics(label: "Start voice search", child: IconButton(icon: const Icon(Icons.mic), onPressed: () async {
                bool avail = await _speech.initialize();
                if (avail) _speech.listen(onResult: (val) { query = val.recognizedWords; _speech.stop(); });
              })) else IconButton(icon: const Icon(Icons.clear), onPressed: () => query = ""),
            ];

            @override Widget buildLeading(BuildContext context) => IconButton(icon: const Icon(Icons.arrow_back), onPressed: () => close(context, null));

            @override Widget buildResults(BuildContext context) => _search(context);
            @override Widget buildSuggestions(BuildContext context) => _search(context);

            Widget _search(BuildContext context) {
              return FutureBuilder<List<SongModel>>(
                future: allSongs != null ? Future.value(allSongs) : _audioQuery.querySongs(),
                builder: (context, snap) {
                  if (!snap.hasData) return const SizedBox.shrink();
                  final res = snap.data!.where((s) => s.title.toLowerCase().contains(query.toLowerCase())).toList();
                  return ListView.builder(
                    itemCount: res.length,
                    itemBuilder: (context, i) => ListTile(title: Text(res[i].title), onTap: () => Navigator.push(context, MaterialPageRoute(builder: (_) => PlayerPage(songs: res, index: i)))),
                  );
                },
              );
            }
          }

          class PlayerPage extends StatelessWidget {
            final List<SongModel> songs;
            final int index;
            const PlayerPage({super.key, required this.songs, required this.index});

            @override Widget build(BuildContext context) {
              final mediaItems = songs.map((s) => MediaItem(id: s.id.toString(), title: s.title, artist: s.artist, extras: {'path': s.data})).toList();
              (_audioHandler as MyAudioHandler).setPlaylist(mediaItems, index);

              return Scaffold(
                backgroundColor: const Color(0xFF121212),
                appBar: AppBar(backgroundColor: Colors.transparent, title: const Text("Now Playing")),
                body: StreamBuilder<MediaItem?>(
                  stream: _audioHandler.mediaItem,
                  builder: (context, snap) {
                    final item = snap.data;
                    if (item == null) return const Center(child: CircularProgressIndicator());
                    return Column(
                      mainAxisAlignment: MainAxisAlignment.center,
                      children: [
                        const Icon(Icons.music_note, size: 150, color: Colors.blueAccent),
                        Padding(padding: const EdgeInsets.all(20), child: Text(item.title, style: const TextStyle(fontSize: 22, fontWeight: FontWeight.bold), textAlign: TextAlign.center)),
                        StreamBuilder<Duration>(
                          stream: AudioService.position,
                          builder: (context, posSnap) {
                            final pos = posSnap.data ?? Duration.zero;
                            final dur = item.duration ?? Duration.zero;
                            return Column(
                              children: [
                                Slider(value: pos.inSeconds.toDouble(), max: dur.inSeconds.toDouble() > 0 ? dur.inSeconds.toDouble() : 1.0, onChanged: (v) => _audioHandler.seek(Duration(seconds: v.toInt()))),
                                Padding(padding: const EdgeInsets.symmetric(horizontal: 20), child: Row(mainAxisAlignment: MainAxisAlignment.spaceBetween, children: [Text(_fmt(pos)), Text(_fmt(dur - pos))])),
                              ],
                            );
                          },
                        ),
                        const SizedBox(height: 20),
                        Row(mainAxisAlignment: MainAxisAlignment.spaceEvenly, children: [
                          Semantics(label: "Previous button", excludeSemantics: true, child: IconButton(icon: const Icon(Icons.skip_previous, size: 60), onPressed: _audioHandler.skipToPrevious)),
                          StreamBuilder<PlaybackState>(
                            stream: _audioHandler.playbackState,
                            builder: (context, pSnap) {
                              final playing = pSnap.data?.playing ?? false;
                              return Semantics(label: playing ? "Pause button" : "Play button", excludeSemantics: true, child: IconButton(icon: Icon(playing ? Icons.pause_circle : Icons.play_circle, size: 80), onPressed: playing ? _audioHandler.pause : _audioHandler.play));
                            },
                          ),
                          Semantics(label: "Next button", excludeSemantics: true, child: IconButton(icon: const Icon(Icons.skip_next, size: 60), onPressed: _audioHandler.skipToNext)),
                        ]),
                      ],
                    );
                  },
                ),
              );
            }
            String _fmt(Duration d) => d.toString().split('.').first.padLeft(8, "0").substring(2);
          }
          EOF

      - name: Build APK
        run: |
          flutter pub get
          flutter build apk --release

      - name: Upload NKPlayer APK
        uses: actions/upload-artifact@v4
        with:
          name: NKPlayer-v1.0.2-Complete
          path: build/app/outputs/flutter-apk/app-release.apk
